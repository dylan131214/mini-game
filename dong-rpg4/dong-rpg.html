function updatePhase2Transition() {
  boss.phase2Timer++;
  const t = boss.phase2Timer;
  if (boss.phase2State === 'moving') {
    const targetX = 590 - boss.w / 2;
    const dx = targetX - boss.x;
    boss.vx = dx * 0.08;
    boss.vy += 0.7;
    boss.x += boss.vx;
    boss.y += boss.vy;
    if (boss.y + boss.h >= FLOOR_Y) { boss.y = FLOOR_Y - boss.h; boss.vy = 0; boss.onGround = true; }
    if (boss.x < ARENA_LEFT) boss.x = ARENA_LEFT;
    if (boss.x + boss.w > ARENA_RIGHT) boss.x = ARENA_RIGHT - boss.w;
    boss.facing = player.x < boss.x ? -1 : 1;
    if (Math.abs(dx) < 10 && boss.onGround) {
      boss.vx = 0;
      boss.phase2State = 'rising';
      boss.phase2Timer = 0;
    }
  } else if (boss.phase2State === 'rising') {
    boss.x += (590 - boss.w/2 - boss.x) * 0.04;
    boss.y += (195 - boss.y) * 0.025;
    boss.vx = 0; boss.vy = 0;
    if (t % 5 === 0) {
      spawnParticles(boss.x + 30 + (Math.random()-0.5)*20, boss.y + boss.h, '#DAA520', 3, 2, 38);
      spawnParticles(boss.x + 30 + (Math.random()-0.5)*20, boss.y + boss.h, '#ffe', 2, 1, 28);
    }
    if (t > 160) {
      boss.phase2State = 'transform';
      boss.phase2Timer = 0;
      screenFlash = { color: '#fff', alpha: 0.55 };
    }
  } else if (boss.phase2State === 'transform') {
    boss.vx = 0; boss.vy = 0;
    if (t % 4 === 0) {
      spawnParticles(boss.x + 30, boss.y + 40, '#fff', 7, 5, 38);
      spawnParticles(boss.x + 30, boss.y + 40, '#DAA520', 5, 4, 32);
    }
    if (t === 55) screenFlash = { color: '#fff', alpha: 1 };
    if (t > 130) {
      boss.phase2Active = false;
      boss.isPhase2 = true;
      boss.maxHp = 90;
      boss.hp = boss.maxHp;
      boss.stagger = 0; boss.hitFlash = 0;
      boss.pattern = 'idle';
      boss.patternTimer = 130;
      boss.laserProjectiles = [];
      boss.phase2State = 'none';
      boss.phase2Timer = 0;
      screenFlash = { color: '#fff', alpha: 0.9 };
      screenShake = { power: 16, dur: 22 };
      spawnParticles(boss.x + 30, boss.y + 40, '#f44', 22, 8, 55);
      spawnParticles(boss.x + 30, boss.y + 40, '#DAA520', 16, 6, 48);
      sndPhase2Trigger();
      switchBGM('boss2', 0.4);
    }
  }
}

function updateArrows() {
  for (let i = player.arrows.length - 1; i >= 0; i--) {
    const a = player.arrows[i];
    if (a.homing && !boss.dead) {
      if (a.age === undefined) a.age = 0;
      a.age++;
      const tx = boss.x + boss.w/2, ty = boss.y + boss.h/2;
      const dx = tx - a.x, dy = ty - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      if (a.age >= 480) {
        // 8초 초과 시 보스에게 직선으로 날아감
        const spd = 14;
        a.vx = (dx/dist) * spd;
        a.vy = (dy/dist) * spd;
        a.homeStrength = 0;
      } else {
        a.vx += (dx/dist) * a.homeStrength;
        a.vy += (dy/dist) * a.homeStrength;
        const spd = Math.sqrt(a.vx*a.vx + a.vy*a.vy);
        if (spd > 8) { a.vx = a.vx/spd*8; a.vy = a.vy/spd*8; }
      }
      a.rot = Math.atan2(a.vy, a.vx);
    }
    a.x += a.vx; a.y += a.vy;
    a.life--;
    const outOfBounds = a.x < 0 || a.x > 1280 || a.y < -40 || a.y > 780;
    if (a.life <= 0 || (!a.homing && outOfBounds) || (a.homing && a.age >= 480 && outOfBounds)) {
      player.arrows.splice(i, 1);
    }
  }
}

function updateProjectiles(dt) {
  // 충격파
  for (let i = boss.shockwaves.length - 1; i >= 0; i--) {
    const s = boss.shockwaves[i];
    s.x += s.vx;
    s.life--;
    if (s.x < ARENA_LEFT || s.x > ARENA_RIGHT || s.life <= 0) { boss.shockwaves.splice(i, 1); continue; }
  }
  // 도끼 투사체
  for (let i = boss.axeProjectiles.length - 1; i >= 0; i--) {
    const a = boss.axeProjectiles[i];
    a.x += a.vx; a.y += a.vy; a.vy += 0.3; a.rot += 0.2;
    a.life--;
    if (a.y > FLOOR_Y || a.life <= 0) { boss.axeProjectiles.splice(i, 1); }
  }
  // 유도 레이저
  for (let i = boss.laserProjectiles.length - 1; i >= 0; i--) {
    const l = boss.laserProjectiles[i];
    const dx = (player.x + player.w/2) - l.x;
    const dy = (player.y + player.h/2) - l.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    l.vx += (dx/dist) * l.homeStrength;
    l.vy += (dy/dist) * l.homeStrength;
    const spd = Math.sqrt(l.vx*l.vx + l.vy*l.vy);
    if (spd > 7) { l.vx = l.vx/spd*7; l.vy = l.vy/spd*7; }
    l.rot = Math.atan2(l.vy, l.vx);
    l.x += l.vx; l.y += l.vy;
    l.life--;
    if (l.life <= 0 || l.x < 0 || l.x > 1280 || l.y > 760) boss.laserProjectiles.splice(i, 1);
  }
  // 드래곤 불덩어리
  for (let i = boss.dragonFireballs.length - 1; i >= 0; i--) {
    const fb = boss.dragonFireballs[i];
    fb.x += fb.vx; fb.y += fb.vy;
    fb.vy += 0.035;
    fb.rot += 0.07;
    // 벽 튕기기
    if (fb.x - fb.r < ARENA_LEFT && fb.vx < 0) {
      fb.vx = -fb.vx; fb.bounces++;
      spawnParticles(ARENA_LEFT + 10, fb.y, '#f80', 8, 4, 20);
      spawnParticles(ARENA_LEFT + 10, fb.y, '#f40', 5, 3, 14);
    }
    if (fb.x + fb.r > ARENA_RIGHT && fb.vx > 0) {
      fb.vx = -fb.vx; fb.bounces++;
      spawnParticles(ARENA_RIGHT - 10, fb.y, '#f80', 8, 4, 20);
      spawnParticles(ARENA_RIGHT - 10, fb.y, '#f40', 5, 3, 14);
    }
    // 바닥 튕기기
    if (fb.y + fb.r > FLOOR_Y - 22) {
      fb.vy = -Math.abs(fb.vy) * 0.85;
      fb.y = FLOOR_Y - 22 - fb.r;
    }
    // 천장 튕기기
    if (fb.y - fb.r < 20 && fb.vy < 0) {
      fb.vy = Math.abs(fb.vy) * 0.85;
      fb.y = 20 + fb.r;
    }
    fb.life--;
    if (fb.life <= 0 || fb.bounces >= fb.maxBounces) {
      spawnParticles(fb.x, fb.y, '#f80', 14, 5, 28);
      spawnParticles(fb.x, fb.y, '#f40', 8, 4, 20);
      boss.dragonFireballs.splice(i, 1);
    }
  }
}

function checkCollisions() {
  const transforming = boss.dragon2Active && boss.dragon2State === 'transform';
  // 플레이어 공격 → 보스
  if (!transforming && player.attackHitbox) {
    const a = player.attackHitbox;
    if (rectsOverlap(a, boss)) {
      boss.hp -= a.dmg;
      boss.hitFlash = 12;
      boss.stagger = selectedWeapon === 'war_axe' ? 28 : 8;
      if (selectedWeapon === 'flame_sword' && !boss.dead) {
        boss.hp -= 0.5;
        spawnParticles(a.x + a.w/2, a.y + a.h/2, '#ff6030', 8, 4, 14);
        spawnParticles(a.x + a.w/2, a.y + a.h/2, '#ffaa00', 4, 3, 10);
      }
      boss.attackBox = null;
      spawnParticles(a.x + 10, a.y + 17, '#ff8', 8, 5, 15);
      sndBossHit();

      if (player.dashAttacking) {
        player.vx = -player.dashDir * 10;
        player.vy = -5;
        player.dashDur = 0;
        player.dashAttacking = false;
        spawnParticles(a.x + 10, a.y + 17, '#fff', 14, 7, 22);
        spawnParticles(a.x + 10, a.y + 17, '#fa0', 10, 5, 18);
        screenShake = { power: 9, dur: 12 };
        screenFlash = { color: '#ff8', alpha: 0.3 };
      }

      player.attackHitbox = null;
    }
  }

  // 보스 근접 공격 → 플레이어
  if (boss.attackBox) {
    if (rectsOverlap(boss.attackBox, getPlayerRect())) {
      if (boss.attackBox.type === 'slam' && player.y + player.h < FLOOR_Y - 8) {
        // 점프로 회피
      } else if (boss.attackBox.type === 'sw_emerge') {
        damagePlayer(); boss.attackBox = null;
      } else if (player.parryActive || cheatAutoParry) {
        doParry(boss.attackBox.x + 20, boss.attackBox.y);
        if (boss.attackBox.type === 'eel_bite') boss.eelBiteHit = true;
        boss.attackBox = null;
      } else {
        damagePlayer();
        if (boss.attackBox.type !== 'slam') {
          if (boss.attackBox.type === 'eel_bite') boss.eelBiteHit = true;
          boss.attackBox = null;
        }
      }
    }
  }
  // 드래곤 물기 히트박스 → 플레이어
  for (let i = boss.biteBoxes.length - 1; i >= 0; i--) {
    const bb = boss.biteBoxes[i];
    if (rectsOverlap(bb, getPlayerRect())) {
      if (player.parryActive || cheatAutoParry) {
        doParry(bb.x + bb.w/2, bb.y + bb.h/2);
        boss.biteBoxes.splice(i, 1);
      } else {
        damagePlayer();
        boss.biteBoxes.splice(i, 1);
      }
    }
  }
  // 드래곤 불덩어리 → 플레이어
  for (let i = boss.dragonFireballs.length - 1; i >= 0; i--) {
    const fb = boss.dragonFireballs[i];
    const fr = { x: fb.x - fb.r, y: fb.y - fb.r, w: fb.r*2, h: fb.r*2 };
    if (rectsOverlap(fr, getPlayerRect())) {
      if (player.parryActive || cheatAutoParry) {
        doParry(fb.x, fb.y);
        boss.dragonFireballs.splice(i, 1);
      } else {
        damagePlayer();
        boss.dragonFireballs.splice(i, 1);
      }
    }
  }

  // 충격파 → 플레이어
  for (let i = boss.shockwaves.length - 1; i >= 0; i--) {
    const s = boss.shockwaves[i];
    const sr = { x: s.x, y: FLOOR_Y - s.h, w: s.w, h: s.h };
    if (rectsOverlap(sr, getPlayerRect())) {
      if (player.parryActive || cheatAutoParry) {
        doParry(s.x, FLOOR_Y - s.h);
        boss.shockwaves.splice(i, 1);
      } else if (s.type !== 'barrage' && player.y + player.h < FLOOR_Y - 5) {
        // 점프로 회피 (배리지는 점프 회피 불가)
      } else {
        damagePlayer();
        boss.shockwaves.splice(i, 1);
      }
    }
  }

  // 도끼 투사체 → 플레이어
  for (let i = boss.axeProjectiles.length - 1; i >= 0; i--) {
    const a = boss.axeProjectiles[i];
    const ar = { x: a.x - 16, y: a.y - 16, w: 32, h: 32 };
    if (rectsOverlap(ar, getPlayerRect())) {
      if (player.parryActive || cheatAutoParry) {
        doParry(a.x, a.y);
        boss.axeProjectiles.splice(i, 1);
      } else {
        damagePlayer();
        boss.axeProjectiles.splice(i, 1);
      }
    }
  }
  // 유도 레이저 → 플레이어
  for (let i = boss.laserProjectiles.length - 1; i >= 0; i--) {
    const l = boss.laserProjectiles[i];
    const lr = { x: l.x - 14, y: l.y - 14, w: 28, h: 28 };
    if (rectsOverlap(lr, getPlayerRect())) {
      if (player.parryActive || cheatAutoParry) {
        doParry(l.x, l.y);
        boss.laserProjectiles.splice(i, 1);
      } else {
        damagePlayer();
        boss.laserProjectiles.splice(i, 1);
      }
    }
  }

  // 곰치 투사체 → 플레이어
  if (selectedBoss === 'eel') {
    const pr = getPlayerRect();
    for (let i = boss.eelProjectiles.length - 1; i >= 0; i--) {
      const p = boss.eelProjectiles[i];
      const er = { x: p.x - p.r, y: p.y - p.r, w: p.r * 2, h: p.r * 2 };
      if (rectsOverlap(er, pr)) {
        if (player.parryActive || cheatAutoParry) {
          doParry(p.x, p.y); boss.eelProjectiles.splice(i, 1);
        } else {
          damagePlayer(); boss.eelProjectiles.splice(i, 1);
        }
      }
    }
    // 고래 → 플레이어 (점프로 회피 가능)
    if (boss.eelWhale && boss.eelWhale.phase === 'charge') {
      const w = boss.eelWhale;
      const wr = { x: w.x, y: FLOOR_Y - w.height, w: Math.round(w.width * 0.88), h: w.height };
      if (rectsOverlap(wr, pr)) {
        // 점프로 회피: 플레이어 발이 고래 상단보다 높으면 안전
        if (pr.y + pr.h < FLOOR_Y - w.height + 12) {
          // 점프 성공
        } else if (player.parryActive || cheatAutoParry) {
          doParry(w.x + w.width / 2, FLOOR_Y - w.height);
          boss.eelWhale = null;
        } else if (!w.hit) {
          w.hit = true;
          damagePlayer();
        }
      } else {
        w.hit = false; // 겹침 해제되면 히트 플래그 리셋
      }
    }
  }

  // 샌드 웜 투사체·장판 → 플레이어
  if (selectedBoss === 'sandworm') {
    const pr = getPlayerRect();
    for (let i = boss.swSandProj.length - 1; i >= 0; i--) {
      const sp = boss.swSandProj[i];
      const sr = { x: sp.x - sp.r, y: sp.y - sp.r, w: sp.r * 2, h: sp.r * 2 };
      if (rectsOverlap(sr, pr)) {
        if (player.parryActive || cheatAutoParry) {
          doParry(sp.x, sp.y); boss.swSandProj.splice(i, 1);
        } else {
          damagePlayer(); boss.swSandProj.splice(i, 1);
        }
      }
    }
    if (boss.swDmgZone && boss.swDmgCd <= 0) {
      if (rectsOverlap(boss.swDmgZone, pr)) {
        damagePlayer(); boss.swDmgCd = 80;
      }
    }
    // 2페이즈 유도 투사체
    if (boss.sw2Active) {
      for (let i = boss.sw2BeamProj.length - 1; i >= 0; i--) {
        const sp = boss.sw2BeamProj[i];
        const sr = { x: sp.x - sp.r, y: sp.y - sp.r, w: sp.r * 2, h: sp.r * 2 };
        if (rectsOverlap(sr, pr)) {
          if (player.parryActive || cheatAutoParry) {
            doParry(sp.x, sp.y); boss.sw2BeamProj.splice(i, 1);
          } else {
            damagePlayer(); boss.sw2BeamProj.splice(i, 1);
          }
        }
      }
      // 꼬리 피격
      for (const tail of boss.sw2Tails) {
        if (!tail.active) continue;
        const th = tail.prog * 320;
        const tr = { x: tail.x - 80, y: FLOOR_Y - th, w: 160, h: th };
        if (boss.sw2TailCd <= 0 && rectsOverlap(tr, pr)) {
          if (player.parryActive || cheatAutoParry) {
            doParry(tail.x, FLOOR_Y - th * 0.5);
          } else {
            damagePlayer();
          }
          boss.sw2TailCd = 60;
        }
      }
    }
  }

  // 화살 → 보스
  for (let i = player.arrows.length - 1; i >= 0; i--) {
    const a = player.arrows[i];
    const ar = { x: a.x - 10, y: a.y - 5, w: 20, h: 10 };
    if (!boss.dead && !transforming && rectsOverlap(ar, boss)) {
      boss.hp -= a.dmg;
      boss.hitFlash = 10;
      boss.stagger = a.stagger;
      spawnParticles(a.x, a.y, '#ff8', 5, 3, 12);
      if (a.homing) spawnParticles(a.x, a.y, '#4f8', 4, 3, 12);
      if (a.stun && Math.random() < 0.3) {
        boss.stunned = 120;
        spawnParticles(a.x, a.y, '#c8f', 12, 4, 25);
        spawnParticles(a.x, a.y, '#fff', 6, 3, 15);
      }
      player.arrows.splice(i, 1);
      sndArrowHit();
    }
  }

  // 드래곤 2페이즈 충돌
  if (selectedBoss === 'dragon' && boss.dragon2Active && boss.dragon2State === 'active') {
    const pr = getPlayerRect();

    // 불기둥 → 플레이어
    for (const p of boss.d2FirePillars) {
      if (!p.warning && p.strikeLife > 0 && !p.hit) {
        const pillarR = { x: p.x-40, y: 0, w: 80, h: FLOOR_Y };
        if (rectsOverlap(pillarR, pr)) {
          p.hit = true;
          if (player.parryActive || cheatAutoParry) { doParry(p.x, FLOOR_Y/2); }
          else { damagePlayer(); }
        }
      }
    }

    // 레이저 빔 → 플레이어
    for (let i = boss.d2LaserBeams.length-1; i >= 0; i--) {
      const beam = boss.d2LaserBeams[i];
      const pcx = pr.x + pr.w/2, pcy = pr.y + pr.h/2;
      const pdx = pcx - beam.sx, pdy = pcy - beam.sy;
      const dot = pdx*Math.cos(beam.angle) + pdy*Math.sin(beam.angle);
      const cross = Math.abs(-pdx*Math.sin(beam.angle) + pdy*Math.cos(beam.angle));
      if (dot > 0 && dot < 1100 && cross < 32) {
        if (player.parryActive || cheatAutoParry) { doParry(pcx, pcy); boss.d2LaserBeams.splice(i, 1); }
        else { damagePlayer(); boss.d2LaserBeams.splice(i, 1); }
        break;
      }
    }

    // 머리 돌진 → 플레이어
    const l = boss.lungeData;
    if (l && (l.phase === 'extend' || l.phase === 'hold')) {
      const tip = d2WorldHead(l.headIdx, boss.dragon2GrowP, l.progress * 80);
      const headHB = { x: tip.x-52, y: tip.y-52, w: 104, h: 104 };
      if (rectsOverlap(headHB, pr)) {
        if (player.parryActive || cheatAutoParry) {
          doParry(tip.x, tip.y);
          l.phase = 'retract'; l.timer = 22; l.progress = 1;
        } else {
          damagePlayer();
          l.phase = 'retract'; l.timer = 22; l.progress = 1;
        }
      }
    }

    // 플레이어 공격 → 머리 3개
    for (let hi = 0; hi < 3; hi++) {
      const lungeBonus = (l && l.headIdx === hi) ? l.progress * 80 : 0;
      const tip = d2WorldHead(hi, boss.dragon2GrowP, lungeBonus);
      const hb = { x: tip.x - 52, y: tip.y - 52, w: 104, h: 104 };

      // 근접 공격
      if (player.attackHitbox && rectsOverlap(player.attackHitbox, hb)) {
        boss.hp -= player.attackHitbox.dmg;
        boss.hitFlash = 12;
        spawnParticles(tip.x, tip.y, '#ff8', 8, 5, 15);
        sndBossHit();
        if (l && l.headIdx === hi) { l.phase = 'retract'; l.timer = 22; l.progress = 1; }
        player.attackHitbox = null;
        break;
      }

      // 화살
      for (let ai = player.arrows.length - 1; ai >= 0; ai--) {
        const a = player.arrows[ai];
        const ar = { x: a.x - 10, y: a.y - 5, w: 20, h: 10 };
        if (rectsOverlap(ar, hb)) {
          boss.hp -= a.dmg;
          boss.hitFlash = 10;
          spawnParticles(a.x, a.y, '#ff8', 5, 3, 12);
          if (a.homing) spawnParticles(a.x, a.y, '#4f8', 4, 3, 12);
          if (a.stun && Math.random() < 0.3) {
            boss.stunned = 120;
            spawnParticles(a.x, a.y, '#c8f', 12, 4, 25);
          }
          player.arrows.splice(ai, 1);
          sndArrowHit();
          break;
        }
      }
    }
  }

  // 곰치 2페이즈 세그먼트 충돌
  if (selectedBoss === 'eel' && boss.eel2Active) {
    const pr = getPlayerRect();
    for (let si = boss.eel2Segments.length - 1; si >= 0; si--) {
      const seg = boss.eel2Segments[si];
      if (seg.dead) continue;
      const headR = { x: seg.headX - 48, y: seg.headY - 44, w: 96, h: 88 };

      // 근접 공격 → 머리
      if (player.attackHitbox && rectsOverlap(player.attackHitbox, headR)) {
        seg.hitFlash = 12;
        spawnParticles(seg.headX, seg.headY, '#ff8', 8, 5, 15);
        sndBossHit();
        player.attackHitbox = null;
        splitEelSeg(si);
        continue;
      }

      // 화살 → 머리
      let arrowHit = false;
      for (let ai = player.arrows.length - 1; ai >= 0; ai--) {
        const a = player.arrows[ai];
        const ar = { x: a.x - 10, y: a.y - 5, w: 20, h: 10 };
        if (rectsOverlap(ar, headR)) {
          seg.hitFlash = 12;
          spawnParticles(a.x, a.y, '#ff8', 5, 3, 12);
          sndArrowHit();
          player.arrows.splice(ai, 1);
          splitEelSeg(si);
          arrowHit = true;
          break;
        }
      }
      if (arrowHit) continue;

      // 물기 → 플레이어
      if (seg.attackBox && rectsOverlap(seg.attackBox, pr)) {
        if (player.parryActive || cheatAutoParry) {
          doParry(seg.headX, seg.headY);
          seg.parryCount++;
          seg.attackBox = null; seg.biteHit = true;
          if (seg.parryCount >= 2) { seg.parryCount = 0; splitEelSeg(si); }
        } else if (!seg.biteHit) {
          damagePlayer(); seg.biteHit = true; seg.attackBox = null;
        }
      }

      // 물고기 투사체 → 플레이어
      for (let pi = seg.projectiles.length - 1; pi >= 0; pi--) {
        const p = seg.projectiles[pi];
        const er = { x: p.x - p.r, y: p.y - p.r, w: p.r * 2, h: p.r * 2 };
        if (rectsOverlap(er, pr)) {
          if (player.parryActive || cheatAutoParry) {
            doParry(p.x, p.y); seg.projectiles.splice(pi, 1);
          } else {
            damagePlayer(); seg.projectiles.splice(pi, 1);
          }
        }
      }
    }
  }
}

function isAttackFromFront(sourceX) {
  const mid = player.x + player.w / 2;
  return (sourceX > mid && player.facing === 1) || (sourceX < mid && player.facing === -1);
}

function getPlayerRect() { return { x: player.x + 4, y: player.y + 4, w: player.w - 8, h: player.h - 4 }; }
function rectsOverlap(a, b) {
  return a.x < b.x + (b.w || 40) && a.x + (a.w || 0) > b.x && a.y < b.y + (b.h || 56) && a.y + (a.h || 0) > b.y;
}

function damagePlayer() {
  if (player.invincible > 0) return;
  if (player.ironWall > 0) { spawnParticles(player.x+20, player.y+28, '#b0c0d8', 10, 4, 18); return; }
  if (boss.stunned > 0) return;
  if (player.shield) {
    player.shield = false;
    player.lightSwordActive = false;
    screenFlash = { color: '#ffe', alpha: 0.7 };
    spawnParticles(player.x + 20, player.y + 20, '#ffe', 20, 6, 25);
    sndPlayerHit();
    return;
  }
  if (player.goldShield) {
    player.goldShield = false;
    screenFlash = { color: '#FFD700', alpha: 0.55 };
    spawnParticles(player.x + 20, player.y + 20, '#FFD700', 18, 5, 22);
    sndPlayerHit();
    return;
  }
  player.hp--;
  player.hitFlash = 20;
  player.invincible = 90;
  screenFlash = { color: '#f00', alpha: 0.5 };
  spawnParticles(player.x + 20, player.y + 20, '#f44', 12, 4, 20);
  sndPlayerHit();
}

function doParry(px, py) {
  boss.hp -= 1;
  if (selectedArmor === 'armor_flame') {
    boss.hp -= 3;
    spawnParticles(px, py, '#ff6030', 10, 5, 18);
  }
  boss.stagger = 40;
  boss.hitFlash = 20;
  boss.vulnerable = 600;
  screenFlash = { color: '#fff', alpha: 0.7 };
  screenShake = { power: 10, dur: 16 };
  spawnParticles(px, py, '#fff', 16, 6, 20);
  spawnParticles(px, py, '#88f', 10, 4, 15);
  sndParry();
  if (selectedBoss === 'eel' && selectedBow) {
    player.bowUses++;
    spawnParticles(player.x + 20, player.y + 10, '#8af', 5, 3, 18);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawArrows() {
  for (const a of player.arrows) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    if (a.stun) {
      // 취관 발사체: 둥근 보라색 구슬
      ctx.fillStyle = '#c8f';
      ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-2, -2, 2, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.35 + 0.25 * Math.sin(Date.now() * 0.02);
      ctx.fillStyle = '#e8f';
      ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // 화살 몸통
      const isCrossbow = a.dmg >= 1.5;
      const shaftColor = a.homing ? '#af8' : (isCrossbow ? '#fa4' : (a.stagger > 20 ? '#fa8' : '#8af'));
      ctx.fillStyle = shaftColor;
      if (isCrossbow) {
        ctx.fillRect(-10, -3, 16, 6);
      } else {
        ctx.fillRect(-14, -2, 22, 4);
      }
      // 화살촉
      ctx.fillStyle = isCrossbow ? '#fff' : '#ddf';
      ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(3,-5); ctx.lineTo(3,5); ctx.closePath(); ctx.fill();
      // 화살 깃
      if (!isCrossbow) {
        ctx.fillStyle = '#ff8';
        ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(-21,-5); ctx.lineTo(-17,0); ctx.lineTo(-21,5); ctx.closePath(); ctx.fill();
      }
      // 유도 화살: 초록 광채
      if (a.homing) {
        ctx.globalAlpha = 0.4 + 0.3 * Math.sin((a.age || 0) * 0.2);
        ctx.fillStyle = '#4f8';
        ctx.fillRect(-12, -4, 18, 8);
        ctx.globalAlpha = 1;
      }
    }
    ctx.restore();
  }
}

// ══════════════════════════════════════════
//  전투 렌더링
// ══════════════════════════════════════════
function drawBattle() {
  drawArena();

  // 플레이어 화살
  drawArrows();

  // 충격파
  for (const s of boss.shockwaves) drawShockwave(s);

  // 도끼 투사체
  for (const a of boss.axeProjectiles) drawAxeProjectile(a);

  // 유도 레이저
  for (const l of boss.laserProjectiles) drawLaser(l);

  // 곰치 투사체 + 고래
  if (selectedBoss === 'eel') {
    for (const p of boss.eelProjectiles) drawEelProjectile(p);
    if (boss.eelWhale) {
      if (boss.eelWhale.phase === 'charge') drawEelWhale(boss.eelWhale);
      else {
        const prog = 1 - (boss.eelWhale.timer || boss.phaseTimer) / 75;
        drawEelWhaleWarning(Math.max(0, Math.min(1, prog)));
      }
    }
    // 고래 경고 - 화면 우측 암전
    if (boss.pattern === 'eel_whale_warn') {
      const wProg = 1 - boss.phaseTimer / 75;
      ctx.save(); ctx.globalAlpha = wProg * 0.42;
      const warnG = ctx.createLinearGradient(ARENA_RIGHT - 360, 0, ARENA_RIGHT, 0);
      warnG.addColorStop(0, 'rgba(0,0,20,0)'); warnG.addColorStop(1, 'rgba(0,0,20,1)');
      ctx.fillStyle = warnG; ctx.fillRect(ARENA_RIGHT - 360, 0, 360, 720); ctx.restore();
    }
  }

  // 드래곤 투사체
  if (selectedBoss === 'dragon') {
    for (const fb of boss.dragonFireballs) drawDragonFireball(fb);
    if (boss.pattern === 'dragon_slam_warn') drawSlamWarning(boss.phaseTimer);
    if (boss.pattern === 'dragon_bite') drawBiteWarning(boss.biteTargetX, boss.biteStep, boss.phaseTimer, boss.phase);
    // 물기 히트박스 시각화
    for (const bb of boss.biteBoxes) {
      ctx.fillStyle = 'rgba(255,80,0,0.35)';
      ctx.fillRect(bb.x, bb.y, bb.w, bb.h);
      ctx.strokeStyle = '#f80';
      ctx.lineWidth = 2;
      ctx.strokeRect(bb.x, bb.y, bb.w, bb.h);
    }
    // 지면 폭발 시각
    if (boss.pattern === 'dragon_slam_explode' && boss.attackBox) {
      const grd = ctx.createRadialGradient(640, FLOOR_Y - 10, 0, 640, FLOOR_Y - 10, 640);
      grd.addColorStop(0, 'rgba(255,200,50,0.8)');
      grd.addColorStop(0.3, 'rgba(255,80,0,0.6)');
      grd.addColorStop(0.6, 'rgba(200,20,0,0.3)');
      grd.addColorStop(1, 'rgba(180,0,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(ARENA_LEFT, FLOOR_Y - 200, ARENA_RIGHT - ARENA_LEFT, 200);
    }
  }

  // 2페이즈 변신 오버레이
  if (boss.phase2Active && boss.phase2State === 'transform') {
    const progress = Math.min(1, boss.phase2Timer / 130);
    ctx.save();
    ctx.globalAlpha = progress * 0.45;
    const grd = ctx.createRadialGradient(boss.x+30, boss.y+40, 10, boss.x+30, boss.y+40, 120);
    grd.addColorStop(0, '#fff');
    grd.addColorStop(0.4, '#DAA520');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(boss.x+30, boss.y+40, 120, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 보스
  if (selectedBoss === 'dragon') {
    if (boss.dragon2Active) {
      drawDragonP2();
    } else {
      drawDragon(boss.x, boss.y, boss.hitFlash, boss.pattern, boss.animFrame, boss.phaseTimer, boss.biteStep);
    }
  } else if (selectedBoss === 'eel') {
    if (!boss.eel2Active) drawEel(boss.eelBiteOffset, boss.hitFlash, boss.pattern, boss.animFrame, boss.eelBiteAngle);
    if (boss.eel2Active) drawEelP2();
  } else if (selectedBoss === 'sandworm') {
    drawSandWorm();
  } else {
    drawBoss(boss.x, boss.y, boss.facing, boss.animFrame, boss.stagger, boss.hitFlash, boss.pattern, boss.deathAnim, boss.isPhase2);
  }

  // 보스 상태 이상 표시
  if (!boss.dead) {
    const bcx = boss.x + boss.w / 2;
    const bcy = boss.y - 14;
    if (boss.stunned > 0) {
      ctx.font = pixelFont(13);
      ctx.textAlign = 'center';
      const alpha = 0.7 + 0.3 * Math.sin(Date.now() * 0.025);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#e8f';
      ctx.fillText('★ 스턴 ★', bcx, bcy);
      ctx.globalAlpha = 1;
    } else if (boss.slowDebuff > 0) {
      ctx.font = pixelFont(11);
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.6 + 0.3 * Math.sin(Date.now() * 0.015);
      ctx.fillStyle = '#8ff';
      ctx.fillText('▼ 감속 중', bcx, bcy);
      ctx.globalAlpha = 1;
    }
    ctx.textAlign = 'left';
  }

  // 플레이어
  drawPlayer(player.x, player.y, player.facing, player.walkFrame, player.attackDur, player.parryActive, player.hitFlash, player.invincible, player.rageFrenzy, selectedWeapon);

  // 파티클
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // 마법 이펙트 렌더링
  const t = Date.now() * 0.001;
  for (const e of player.magicEffects) {
    ctx.save();
    if (e.type === 'fire_pillar') {
      const progress = 1 - e.life / 220;
      const h = FLOOR_Y * (0.3 + progress * 0.7);
      for (let layer = 0; layer < 6; layer++) {
        const w2 = 450 - layer * 50;
        const flicker = Math.sin(t * 20 + layer) * 30;
        ctx.globalAlpha = (0.85 - layer * 0.1) * (e.life / 220);
        ctx.fillStyle = layer === 0 ? '#f20' : layer === 1 ? '#f42' : layer === 2 ? '#f64' : layer === 3 ? '#f84' : layer === 4 ? '#f96' : '#ff8';
        ctx.fillRect(e.x - w2/2 + flicker * (layer % 2 ? 1 : -1), FLOOR_Y - h, w2, h);
      }
      ctx.globalAlpha = 0.5 * (e.life / 220);
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x - 60, FLOOR_Y - h * 0.8, 120, h * 0.5);
    } else if (e.type === 'ice_spear') {
      ctx.translate(e.x, e.y);
      ctx.rotate(Math.atan2(e.vy, e.vx));
      ctx.globalAlpha = 0.95;
      ctx.fillStyle = '#8cf'; ctx.fillRect(-200, -50, 450, 100);
      ctx.fillStyle = '#aef'; ctx.fillRect(-200, -30, 140, 60);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(250, 0); ctx.lineTo(350, -70); ctx.lineTo(350, 70); ctx.closePath(); ctx.fill();
      for (let ci = 0; ci < 8; ci++) {
        ctx.fillStyle = 'rgba(180,240,255,0.5)';
        ctx.fillRect(-150 + ci * 50, -70, 24, 24);
        ctx.fillRect(-150 + ci * 50, 46, 24, 24);
      }
    } else if (e.type === 'lightning') {
      ctx.globalAlpha = 1;
      const seg = 14;
      ctx.strokeStyle = '#ff4'; ctx.lineWidth = 24;
      ctx.beginPath(); ctx.moveTo(e.x, e.y);
      for (let s = 1; s <= seg; s++) {
        ctx.lineTo(e.x + (Math.random()-0.5)*160, e.y + s * 30);
      }
      ctx.stroke();
      ctx.strokeStyle = '#ffa'; ctx.lineWidth = 10;
      ctx.beginPath(); ctx.moveTo(e.x, e.y);
      for (let s = 1; s <= seg; s++) {
        ctx.lineTo(e.x + (Math.random()-0.5)*80, e.y + s * 30);
      }
      ctx.stroke();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(e.x, e.y);
      for (let s = 1; s <= seg; s++) {
        ctx.lineTo(e.x + (Math.random()-0.5)*40, e.y + s * 30);
      }
      ctx.stroke();
    } else if (e.type === 'holy_orb') {
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#ffd';
      ctx.beginPath(); ctx.arc(e.x, e.y, 40, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(e.x - 10, e.y - 10, 14, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ff8';
      ctx.beginPath(); ctx.arc(e.x, e.y, 70, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'black_hole') {
      const pulse = 0.85 + 0.15 * Math.sin(t * 6);
      const maxR = 550 * pulse;
      for (let r = maxR; r > 16; r -= 40) {
        const a2 = (1 - r / maxR) * 0.45;
        ctx.globalAlpha = a2;
        ctx.strokeStyle = r > maxR * 0.5 ? '#a6f' : '#70d';
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha = 0.7;
      ctx.strokeStyle = '#c8f'; ctx.lineWidth = 10;
      ctx.beginPath(); ctx.arc(e.x, e.y, 275 * pulse, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(e.x, e.y, 140 * pulse, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#a6f'; ctx.beginPath(); ctx.arc(e.x, e.y, 50 * pulse, 0, Math.PI*2); ctx.fill();
      if (Math.random() < 0.5) spawnParticles(e.x + (Math.random()-0.5)*500, e.y + (Math.random()-0.5)*500, '#a6f', 1, 4, 14);
    } else if (e.type === 'ice_arrow_orb') {
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#9df';
      ctx.beginPath(); ctx.arc(e.x, e.y, 16, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#cef';
      ctx.beginPath(); ctx.arc(e.x - 4, e.y - 4, 6, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#aff';
      ctx.beginPath(); ctx.arc(e.x, e.y, 26, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'light_sword_fx') {
      // 빛의 대검 폭발: 거대한 세로 빛 검 참격 + 방사형 빛 기둥
      const prog = 1 - e.life / 90;
      const fade = e.life < 30 ? e.life / 30 : 1;
      // 중앙 눈부신 섬광
      const grd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 200 * (1 + prog * 0.5));
      grd.addColorStop(0, 'rgba(255,255,255,0.95)');
      grd.addColorStop(0.2, 'rgba(255,255,200,0.7)');
      grd.addColorStop(0.6, 'rgba(255,230,100,0.3)');
      grd.addColorStop(1, 'rgba(255,200,50,0)');
      ctx.globalAlpha = fade;
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(e.x, e.y, 200 * (1 + prog * 0.5), 0, Math.PI*2); ctx.fill();
      // 세로 빛 기둥 (검 형태)
      ctx.globalAlpha = fade * 0.9;
      const sw = 80 * (1 - prog * 0.4);
      const sh = 480;
      const grdV = ctx.createLinearGradient(e.x - sw/2, e.y - sh/2, e.x + sw/2, e.y + sh/2);
      grdV.addColorStop(0, 'rgba(255,255,255,0)');
      grdV.addColorStop(0.5, 'rgba(255,255,200,0.95)');
      grdV.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grdV;
      ctx.fillRect(e.x - sw/2, e.y - sh/2, sw, sh);
      // 가로 빛 기둥 (검 가드)
      const gw = 380;
      const gh = 36 * (1 - prog * 0.5);
      ctx.fillStyle = grdV;
      ctx.fillRect(e.x - gw/2, e.y - gh/2, gw, gh);
      // 방사형 빛 선 8개
      ctx.globalAlpha = fade * 0.7;
      ctx.strokeStyle = '#ffe';
      ctx.lineWidth = 6 * (1 - prog * 0.5);
      for (let ri = 0; ri < 8; ri++) {
        const ang = (ri / 8) * Math.PI * 2 + prog * 0.5;
        const len = (80 + prog * 200);
        ctx.beginPath();
        ctx.moveTo(e.x + Math.cos(ang) * 20, e.y + Math.sin(ang) * 20);
        ctx.lineTo(e.x + Math.cos(ang) * len, e.y + Math.sin(ang) * len);
        ctx.stroke();
      }
      // 빛 파티클 지속 스폰
      if (Math.random() < 0.6) spawnParticles(e.x + (Math.random()-0.5)*200, e.y + (Math.random()-0.5)*200, Math.random()<0.5?'#ffe':'#fff', 2, 5, 20);
    } else if (e.type === 'dark_bomb_fx') {
      // 어둠 폭탄: 거대 어둠 에너지 폭발 + 회전 촉수 + 맥동 링
      const prog = 1 - e.life / 150;
      const fade = e.life < 30 ? e.life / 30 : 1;
      const maxR = 320;
      const r = maxR * (prog < 0.3 ? prog / 0.3 : 1);
      // 어둠 핵심 방사형 그라디언트
      const grd2 = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
      grd2.addColorStop(0, 'rgba(0,0,0,0.95)');
      grd2.addColorStop(0.3, 'rgba(60,0,120,0.8)');
      grd2.addColorStop(0.7, 'rgba(100,20,200,0.45)');
      grd2.addColorStop(1, 'rgba(80,0,160,0)');
      ctx.globalAlpha = fade * 0.85;
      ctx.fillStyle = grd2;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2); ctx.fill();
      // 맥동 링 3개
      ctx.globalAlpha = fade * (0.3 + 0.3 * Math.sin(t * 12 + e.tick * 0.3));
      ctx.strokeStyle = '#a8f'; ctx.lineWidth = 10;
      for (let ri = 0; ri < 3; ri++) {
        const rr = r * (0.4 + ri * 0.3);
        ctx.beginPath(); ctx.arc(e.x, e.y, rr, 0, Math.PI*2); ctx.stroke();
      }
      // 회전 촉수 6개
      ctx.globalAlpha = fade * 0.75;
      ctx.strokeStyle = '#c6f'; ctx.lineWidth = 8;
      for (let ti = 0; ti < 6; ti++) {
        const ang = (ti / 6) * Math.PI * 2 + t * 1.5 + prog * 3;
        const len = r * 0.9;
        ctx.beginPath();
        ctx.moveTo(e.x + Math.cos(ang) * r * 0.15, e.y + Math.sin(ang) * r * 0.15);
        for (let seg = 1; seg <= 8; seg++) {
          const frac = seg / 8;
          const wave = Math.sin(frac * Math.PI * 3 + t * 4 + ti) * 30;
          ctx.lineTo(
            e.x + Math.cos(ang) * len * frac - Math.sin(ang) * wave * frac,
            e.y + Math.sin(ang) * len * frac + Math.cos(ang) * wave * frac
          );
        }
        ctx.stroke();
      }
      // 역회전 작은 촉수 6개
      ctx.strokeStyle = '#86f'; ctx.lineWidth = 4;
      for (let ti = 0; ti < 6; ti++) {
        const ang = (ti / 6) * Math.PI * 2 - t * 2.2 + prog * 2;
        const len = r * 0.6;
        ctx.beginPath();
        ctx.moveTo(e.x + Math.cos(ang) * r * 0.1, e.y + Math.sin(ang) * r * 0.1);
        for (let seg = 1; seg <= 6; seg++) {
          const frac = seg / 6;
          const wave = Math.sin(frac * Math.PI * 2 + t * 6 + ti * 1.3) * 20;
          ctx.lineTo(
            e.x + Math.cos(ang) * len * frac - Math.sin(ang) * wave * frac,
            e.y + Math.sin(ang) * len * frac + Math.cos(ang) * wave * frac
          );
        }
        ctx.stroke();
      }
      // 중앙 핵 반짝임
      ctx.globalAlpha = fade * (0.7 + 0.3 * Math.sin(t * 15));
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(e.x, e.y, 18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#86f';
      ctx.beginPath(); ctx.arc(e.x, e.y, 10, 0, Math.PI*2); ctx.fill();
      // 파티클 지속 스폰
      if (Math.random() < 0.5) spawnParticles(e.x + (Math.random()-0.5)*r*1.5, e.y + (Math.random()-0.5)*r*1.5, Math.random()<0.5?'#86f':'#a8f', 2, 4, 16);
    } else if (e.type === 'tsunami_fx') {
      const prog = 1 - e.life / 180;
      const fade = e.life < 40 ? e.life / 40 : 1;
      const waveW = 900 * (0.15 + prog * 0.85);
      const waveX = 640 - waveW / 2;
      for (let layer = 0; layer < 5; layer++) {
        const wh = (140 - layer * 22) * fade;
        ctx.globalAlpha = (0.7 - layer * 0.1) * fade;
        ctx.fillStyle = ['#0277bd','#0288d1','#29b6f6','#4fc3f7','#80deea'][layer];
        ctx.fillRect(waveX + layer * 18, FLOOR_Y - wh * (0.4 + layer * 0.1), waveW - layer * 36, wh);
      }
      ctx.globalAlpha = fade * 0.9;
      ctx.fillStyle = '#e3f7fc';
      for (let fi = 0; fi < 7; fi++) {
        const fx2 = waveX + (fi / 6) * waveW;
        ctx.fillRect(fx2 - 10, FLOOR_Y - 80 * fade - (fi % 3) * 12, 20, 6);
      }
      ctx.globalAlpha = 1;
    } else if (e.type === 'venom_cloud') {
      const fade2 = Math.min(1, (1200 - e.life) / 60) * Math.min(1, e.life / 60);
      const bCx = boss.x + boss.w / 2, bCy = boss.y + boss.h / 2;
      ctx.globalAlpha = fade2 * 0.3;
      ctx.fillStyle = '#40a000';
      ctx.beginPath(); ctx.arc(bCx, bCy, 130, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = fade2 * 0.22;
      ctx.fillStyle = '#80e040';
      ctx.beginPath(); ctx.arc(bCx, bCy, 70, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  // 불사조 변신 오버레이
  if (player.phoenixForm > 0) {
    const px = player.x + player.w/2, py = player.y + player.h/2;
    const pulse = 0.8 + 0.2 * Math.sin(t * 8);
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#f84';
    // 왼쪽 날개
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px - 100*pulse, py - 80*pulse); ctx.lineTo(px - 140*pulse, py - 20*pulse); ctx.lineTo(px - 80*pulse, py + 40*pulse); ctx.closePath(); ctx.fill();
    // 오른쪽 날개
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + 100*pulse, py - 80*pulse); ctx.lineTo(px + 140*pulse, py - 20*pulse); ctx.lineTo(px + 80*pulse, py + 40*pulse); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#ff8';
    ctx.beginPath(); ctx.moveTo(px, py - 10); ctx.lineTo(px - 60*pulse, py - 60*pulse); ctx.lineTo(px, py + 20); ctx.lineTo(px + 60*pulse, py - 60*pulse); ctx.closePath(); ctx.fill();
    // 꼬리 깃털
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#f42';
    for (let fi = -2; fi <= 2; fi++) {
      ctx.beginPath(); ctx.moveTo(px + fi*10, py + 20); ctx.lineTo(px + fi*16 - 8, py + 80*pulse); ctx.lineTo(px + fi*16 + 8, py + 80*pulse); ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    // 남은 시간 표시
    ctx.font = pixelFont(12); ctx.textAlign = 'center'; ctx.fillStyle = '#f84';
    ctx.fillText(`불사조 ${Math.ceil(player.phoenixForm/60)}초`, px, player.y - 20);
    ctx.textAlign = 'left';
  }

  // 뇌신 변신 오버레이
  if (player.thunderForm > 0) {
    const px = player.x + player.w/2, py = player.y + player.h/2;
    ctx.save();
    ctx.globalAlpha = 0.25 + 0.1 * Math.sin(t * 10);
    ctx.fillStyle = '#aff';
    ctx.beginPath(); ctx.arc(px, py, 50, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#ff4'; ctx.lineWidth = 2;
    for (let li = 0; li < 4; li++) {
      const ang = (li/4)*Math.PI*2 + t*3;
      ctx.beginPath(); ctx.moveTo(px + Math.cos(ang)*30, py + Math.sin(ang)*30);
      ctx.lineTo(px + Math.cos(ang+0.3)*50, py + Math.sin(ang+0.3)*50);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    ctx.font = pixelFont(11); ctx.textAlign = 'center'; ctx.fillStyle = '#aff';
    ctx.fillText(`뇌신 ${Math.ceil(player.thunderForm/60)}초`, player.x + player.w/2, player.y - 20);
    ctx.textAlign = 'left';
  }

  // 빛의 방어막 오버레이
  if (player.shield) {
    const px = player.x + player.w/2, py = player.y + player.h/2;
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.15 * Math.sin(t * 12);
    ctx.strokeStyle = '#ffe'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(px, py, 38, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#ffe';
    ctx.beginPath(); ctx.arc(px, py, 38, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 화면 플래시
  if (screenFlash.alpha > 0) {
    ctx.fillStyle = screenFlash.color;
    ctx.globalAlpha = screenFlash.alpha * 0.6;
    ctx.fillRect(0, 0, 1280, 720);
    ctx.globalAlpha = 1;
  }

  // HUD
  drawHUD();

  // 패링 힌트
  if (player.parryActive) {
    ctx.font = pixelFont(13);
    ctx.fillStyle = '#88f';
    ctx.textAlign = 'center';
    ctx.fillText('패링!', player.x + 20, player.y - 10);
    ctx.textAlign = 'left';
  }
}

// ══════════════════════════════════════════
//  결과 화면
// ══════════════════════════════════════════
function drawGameOver() {
  drawArena();
  if (selectedBoss === 'dragon') drawDragon(boss.x, boss.y, 0, 'idle', 0, 999, 0);
  else if (selectedBoss === 'eel') { if (boss.eel2Active) drawEelP2(); else drawEel(0, 0, 'idle', 0); }
  else if (selectedBoss === 'sandworm') drawSandWorm();
  else drawBoss(boss.x, boss.y, boss.facing, 0, 0, 0, 'idle');

  gameOverFlash++;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 1280, 720);

  ctx.font = pixelFont(90);
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255,50,50,${0.7 + 0.3 * Math.sin(gameOverFlash * 0.1)})`;
  ctx.fillText('GAME OVER', 640, 300);

  // 버튼
  drawButton(440, 380, 200, 52, '재시작', mouse.x, mouse.y);
  drawButton(660, 380, 200, 52, '첫 화면', mouse.x, mouse.y);
  ctx.textAlign = 'left';
}

function drawWin() {
  drawArena();
  drawPlayer(player.x, player.y, player.facing, 0, 0, false, 0, 0, 0, selectedWeapon);

  winTimer++;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, 1280, 720);

  // 파티클
  if (winTimer % 5 === 0) {
    spawnParticles(300 + Math.random()*680, 200 + Math.random()*200, '#ff0', 6, 5, 40);
    spawnParticles(300 + Math.random()*680, 200 + Math.random()*200, '#DAA520', 6, 5, 40);
  }
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  const pulse = 0.9 + 0.1 * Math.sin(winTimer * 0.15);
  ctx.save();
  ctx.translate(640, 320);
  ctx.scale(pulse, pulse);
  ctx.font = pixelFont(110);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('WIN!', 0, 0);
  ctx.restore();

  ctx.font = pixelFont(20);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.fillText(selectedBoss === 'dragon' ? '붉은 비룡을 처치했습니다!' : selectedBoss === 'eel' ? '심해 곰치를 처치했습니다!' : selectedBoss === 'sandworm' ? '샌드 웜을 처치했습니다!' : '황금 기사를 처치했습니다!', 640, 400);

  // ── 획득 소재 표시 ──
  if (lastDrops.length > 0) {
    const fadeIn = Math.min(1, (winTimer - 30) / 40);
    if (fadeIn > 0) {
      ctx.globalAlpha = fadeIn;
      ctx.font = pixelFont(14);
      ctx.fillStyle = '#888';
      ctx.fillText('획득한 소재', 640, 438);

      const itemW = 130, totalW = lastDrops.length * itemW;
      const startX = 640 - totalW / 2 + itemW / 2;
      lastDrops.forEach((drop, i) => {
        const ix = startX + i * itemW;
        const iy = 468;
        const isUltra = drop.rarity === '극희귀';
        // 배경 박스
        const bw = 118, bh = 28;
        ctx.fillStyle = isUltra ? 'rgba(234,128,252,0.12)' : 'rgba(255,255,255,0.05)';
        ctx.fillRect(ix - bw/2, iy - 20, bw, bh);
        const borderCol = drop.rarity === '극희귀' ? '#ea80fc' : drop.rarity === '전설' ? '#ff2060' : drop.rarity === '희귀' ? '#b0b0c8' : '#555';
        ctx.strokeStyle = borderCol;
        ctx.lineWidth = isUltra ? 1.5 : 1;
        ctx.strokeRect(ix - bw/2, iy - 20, bw, bh);
        // 아이콘
        ctx.fillStyle = drop.color;
        ctx.fillRect(ix - bw/2 + 6, iy - 15, 12, 12);
        ctx.strokeStyle = borderCol; ctx.lineWidth = 1;
        ctx.strokeRect(ix - bw/2 + 6, iy - 15, 12, 12);
        // 이름
        ctx.font = pixelFont(isUltra ? 12 : 11);
        ctx.fillStyle = isUltra ? '#ea80fc' : '#ddd';
        ctx.textAlign = 'left';
        ctx.fillText(`${drop.name}  ×${drop.amount}`, ix - bw/2 + 22, iy - 6);
        // 극희귀 라벨
        if (isUltra) {
          ctx.font = pixelFont(9);
          ctx.fillStyle = '#ea80fc';
          ctx.textAlign = 'center';
          ctx.fillText('★ 극희귀', ix, iy + 10);
        }
        ctx.textAlign = 'center';
      });
      ctx.globalAlpha = 1;
    }
  }

  ctx.textAlign = 'left';

  if (winTimer > 180) {
    state = STATE.BOSS_SELECT;
    particles = [];
    switchBGM('menu', 0.5);
  }
}

function drawButton(x, y, w, h, label, mx, my) {
  const hover = mx > x && mx < x+w && my > y && my < y+h;
  ctx.fillStyle = hover ? '#333' : '#1a1a1a';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = hover ? '#DAA520' : '#555';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.font = pixelFont(16);
  ctx.fillStyle = hover ? '#ff8' : '#ccc';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + w/2, y + h/2 + 6);
}

// ══════════════════════════════════════════
//  클릭 처리
// ══════════════════════════════════════════
function handleClick(mx, my) {
  // 첫 클릭 시 메뉴 BGM 시작
  if (bgmType === 'none' && (state === STATE.BOSS_SELECT || state === STATE.WEAPON_SELECT || state === STATE.ITEM_SELECT || state === STATE.MAGIC_SELECT || state === STATE.INVENTORY)) {
    startBGM('menu');
  }
  if (state === STATE.BOSS_SELECT) {
    const amy = my + bossSelectScroll;
    const cardW = 255, cardH = 380, cardGap = 20;
    const cx4 = (1280 - cardW*4 - cardGap*3) / 2;
    const cx1 = cx4 + cardW + cardGap;
    const cx2 = cx1 + cardW + cardGap;
    const cx3 = cx2 + cardW + cardGap;
    const cy = 200;
    // 황금 기사
    if (mx > cx1 && mx < cx1+cardW && amy > cy && amy < cy+cardH) {
      if (isBossCleared('sandworm')) { selectedBoss = 'knight'; state = STATE.WEAPON_SELECT; bossSelectScroll = 0; sndMenuClick(); }
    }
    // 붉은 비룡
    if (mx > cx2 && mx < cx2+cardW && amy > cy && amy < cy+cardH) {
      if (isBossCleared('knight')) { selectedBoss = 'dragon'; state = STATE.WEAPON_SELECT; bossSelectScroll = 0; sndMenuClick(); }
    }
    // 심해 곰치
    if (mx > cx3 && mx < cx3+cardW && amy > cy && amy < cy+cardH) {
      if (isBossCleared('dragon')) {
        selectedBoss = 'eel';
        if (selectedBow && selectedBow !== 'bow_normal') selectedBow = null;
        state = STATE.WEAPON_SELECT; bossSelectScroll = 0; sndMenuClick();
      }
    }
    // 샌드 웜
    if (mx > cx4 && mx < cx4+cardW && amy > cy && amy < cy+cardH) {
      selectedBoss = 'sandworm'; state = STATE.WEAPON_SELECT; bossSelectScroll = 0; sndMenuClick();
    }
    // 쉬움 모드 토글
    const bx = 490, by = cy + cardH + 22, bw = 300, bh = 44;
    if (mx > bx && mx < bx+bw && amy > by && amy < by+bh) {
      easyMode = !easyMode;
      if (easyMode) hardMode = false;
      sndMenuClick();
    }
    // 어려움 모드 토글
    const hbx = 490, hby = by + bh + 50, hbw = 300, hbh = 44;
    if (mx > hbx && mx < hbx+hbw && amy > hby && amy < hby+hbh) {
      hardMode = !hardMode;
      if (hardMode) easyMode = false;
      sndMenuClick();
    }
    // 인벤토리 패널 클릭 → 소재 창고
    const ivX = 40, ivY = by, ivW = 420, ivH = 152;
    if (mx > ivX && mx < ivX+ivW && amy > ivY && amy < ivY+ivH) {
      state = STATE.INVENTORY; inventoryScroll = 0; sndMenuClick();
    }
    // 대장간 버튼
    const smX = 820, smY = by, smW = 420, smH = 152;
    if (mx > smX && mx < smX+smW && amy > smY && amy < smY+smH) {
      // 첫 방문 시 craftedItems 초기화
      if (craftedItems === null) {
        craftedItems = {};
        if (Object.keys(clearData).length > 0) craftedItems.__legacy__ = true;
        saveCraftedItems();
      }
      state = STATE.SMITHY; smithyScroll = 0; sndMenuClick();
    }
  } else if (state === STATE.INVENTORY) {
    if (mx > 20 && mx < 130 && my > 20 && my < 58) {
      state = STATE.BOSS_SELECT; sndMenuClick();
    }
  } else if (state === STATE.SMITHY) {
    if (mx > 20 && mx < 130 && my > 20 && my < 58) {
      state = STATE.BOSS_SELECT; sndMenuClick(); return;
    }
    const amy2 = my + smithyScroll;
    const cW = 280, cH = 196, gap2 = 12;
    const sX = Math.floor((1280 - (cW*4 + gap2*3)) / 2);
    const bossKeys = ['sandworm','knight','dragon','eel'];
    let secY = 90;
    for (const bk of bossKeys) {
      secY += 50;
      const tiers = ['armor','item','weapon','magic'];
      for (let ti = 0; ti < tiers.length; ti++) {
        const recipe = SMITHY_RECIPES[bk][tiers[ti]];
        const cx = sX + ti * (cW + gap2), cy = secY;
        if (mx > cx && mx < cx+cW && amy2 > cy && amy2 < cy+cH) {
          // 갑옷이면 장착/해제 토글 (크래프트 전제)
          if (recipe.type === 'armor' && craftedItems[recipe.id]) {
            selectedArmor = (selectedArmor === recipe.id) ? null : recipe.id;
            saveArmor(); sndMenuClick();
          } else if (!craftedItems[recipe.id] && (canCraftRecipe(recipe) || keys['ShiftLeft'] || keys['ShiftRight'])) {
            // 제작 (Shift 누르면 재료 차감 없이 공짜)
            if (!(keys['ShiftLeft'] || keys['ShiftRight'])) {
              for (const [mid, amt] of Object.entries(recipe.cost)) { inventory[mid] = (inventory[mid]||0) - amt; }
              saveInventory();
            }
            craftedItems[recipe.id] = true; saveCraftedItems();
            if (recipe.type === 'armor') { selectedArmor = recipe.id; saveArmor(); }
            sndMenuClick();
          }
          return;
        }
      }
      secY += cH + 30;
    }
  } else if (state === STATE.WEAPON_SELECT) {
    if (mx > 20 && mx < 130 && my > 20 && my < 58) {
      state = STATE.BOSS_SELECT;
      sndMenuClick();
      return;
    }
    const cardW = 192, cardH = 270, gap = 8;
    const wRows2 = [weapons.slice(0, 5), weapons.slice(5)];
    const wRowY2 = [126, 126 + cardH + 10];
    for (let ri = 0; ri < wRows2.length; ri++) {
      const row = wRows2[ri];
      const cy = wRowY2[ri];
      const rowW = cardW * row.length + gap * (row.length - 1);
      const startX = Math.floor((1280 - rowW) / 2);
      for (let i = 0; i < row.length; i++) {
        const cx = startX + i * (cardW + gap);
        if (mx > cx && mx < cx+cardW && my > cy && my < cy+cardH) {
          if (!isItemUnlocked(row[i].id)) return;
          selectedWeapon = row[i].id;
          state = STATE.ITEM_SELECT;
          itemSelectScroll = 0;
          sndMenuClick();
          return;
        }
      }
    }
  } else if (state === STATE.ITEM_SELECT) {
    if (mx > 20 && mx < 130 && my > 20 && my < 58) {
      state = STATE.WEAPON_SELECT;
      sndMenuClick();
      return;
    }
    const amy = my + itemSelectScroll;
    const cw = 276, ch = 178, cols = 3, rowGap = 22;
    // 나팔 카드
    let curY = 100;
    for (let row = 0; row * cols < napals.length; row++) {
      const rowItems = napals.slice(row * cols, row * cols + cols);
      const rsx = itemSelectRowStartX(rowItems.length);
      for (let j = 0; j < rowItems.length; j++) {
        const cx = rsx + j * (cw + 40);
        if (mx > cx && mx < cx + cw && amy > curY && amy < curY + ch) {
          const id = rowItems[j].id;
          if (!isItemUnlocked(id)) return;
          selectedItem = (selectedItem === id) ? null : id;
          sndMenuClick(); return;
        }
      }
      curY += ch + rowGap;
    }
    // 활 카드
    curY += 22;
    for (let row = 0; row * cols < bowItems.length; row++) {
      const rowItems = bowItems.slice(row * cols, row * cols + cols);
      const rsx = itemSelectRowStartX(rowItems.length);
      for (let j = 0; j < rowItems.length; j++) {
        const cx = rsx + j * (cw + 40);
        if (mx > cx && mx < cx + cw && amy > curY && amy < curY + ch) {
          const id = rowItems[j].id;
          if (selectedBoss === 'eel' && id !== 'bow_normal') return;
          if (!isItemUnlocked(id)) return;
          selectedBow = (selectedBow === id) ? null : id;
          sndMenuClick(); return;
        }
      }
      curY += ch + rowGap;
    }
    // 다음(마법 선택) 버튼
    curY += 4;
    const btnW = 240, btnH = 46, btnX = 640 - 120;
    if (mx > btnX && mx < btnX + btnW && amy > curY && amy < curY + btnH) {
      state = STATE.MAGIC_SELECT;
      sndMenuClick();
    }
  } else if (state === STATE.MAGIC_SELECT) {
    if (mx > 20 && mx < 130 && my > 20 && my < 58) {
      state = STATE.ITEM_SELECT;
      sndMenuClick(); return;
    }
    const cols = 7, cw = 170, ch = 190, gap = 10;
    const rows = Math.ceil(magics.length / cols);
    const totalW = cols * cw + (cols - 1) * gap;
    const startX = Math.floor((1280 - totalW) / 2);
    const startY = 90;
    for (let i = 0; i < magics.length; i++) {
      const row = Math.floor(i / cols), col = i % cols;
      const cx = startX + col * (cw + gap), cy = startY + row * (ch + gap);
      if (mx > cx && mx < cx + cw && my > cy && my < cy + ch) {
        if (!isItemUnlocked(magics[i].id)) { sndMenuClick(); return; }
        selectedMagic = (selectedMagic === magics[i].id) ? null : magics[i].id;
        sndMenuClick(); return;
      }
    }
    const lastRowY = startY + (rows - 1) * (ch + gap);
    const btnW = 240, btnH = 46, btnX = 640 - 120, btnY = lastRowY + ch + 16;
    if (mx > btnX && mx < btnX + btnW && my > btnY && my < btnY + btnH) {
      resetBattle();
      state = STATE.COUNTDOWN;
      countdownVal = 3;
      countdownTimer = 60;
      sndMenuClick();
      switchBGM(selectedBoss === 'dragon' ? 'dragon' : selectedBoss === 'eel' ? 'eel' : selectedBoss === 'sandworm' ? 'sandworm' : 'boss1', 0.6);
    }
  } else if (state === STATE.GAMEOVER) {
    if (mx > 440 && mx < 640 && my > 380 && my < 432) {
      resetBattle();
      state = STATE.COUNTDOWN;
      countdownVal = 3;
      countdownTimer = 60;
      sndMenuClick();
      switchBGM(selectedBoss === 'dragon' ? 'dragon' : selectedBoss === 'eel' ? 'eel' : selectedBoss === 'sandworm' ? 'sandworm' : 'boss1', 0.3);
    }
    if (mx > 660 && mx < 860 && my > 380 && my < 432) {
      state = STATE.BOSS_SELECT;
      sndMenuClick();
      switchBGM('menu', 0.3);
    }
  }
}

// ══════════════════════════════════════════
//  메인 루프
// ══════════════════════════════════════════
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  ctx.clearRect(0, 0, 1280, 720);

  // 화면 흔들림
  let shakeX = 0, shakeY = 0;
  if (screenShake.dur > 0) {
    const decay = screenShake.dur / 16;
    shakeX = (Math.random() * 2 - 1) * screenShake.power * decay;
    shakeY = (Math.random() * 2 - 1) * screenShake.power * decay;
    screenShake.dur--;
  }
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (state === STATE.BOSS_SELECT) {
    drawBossSelect();
  } else if (state === STATE.INVENTORY) {
    drawInventoryScreen();
  } else if (state === STATE.SMITHY) {
    drawSmithyScreen();
  } else if (state === STATE.WEAPON_SELECT) {
    drawWeaponSelect();
  } else if (state === STATE.ITEM_SELECT) {
    drawItemSelect();
  } else if (state === STATE.MAGIC_SELECT) {
    drawMagicSelect();
  } else if (state === STATE.COUNTDOWN) {
    // 카운트다운 업데이트
    countdownTimer--;
    if (countdownTimer <= 0) {
      if (countdownVal > 0) {
        sndCountdown(countdownVal);
        countdownVal--; countdownTimer = 60;
      } else {
        sndCountdown(0);
        state = STATE.BATTLE;
      }
    }
    drawCountdown();
  } else if (state === STATE.BATTLE) {
    updateBattle(dt);
    drawBattle();
  } else if (state === STATE.GAMEOVER) {
    drawGameOver();
  } else if (state === STATE.WIN) {
    updateParticles(dt);
    drawWin();
  }

  ctx.restore(); // 화면 흔들림 해제

  // 모바일 가상 버튼 (흔들림 영향 없게 restore 후에 그림)
  if (state === STATE.BATTLE) drawVirtualButtons();

  // 클릭 처리 (leftJustPressed)
  if (mouse.leftJustPressed) {
    handleClick(mouse.x, mouse.y);
    mouse.leftJustPressed = false;
  }
  mouse.rightJustPressed = false;
  for (const k in justPressed) delete justPressed[k];

  requestAnimationFrame(loop);
}

// 캔버스 크기 반응형
function resize() {
  const vw = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const scale = Math.min(vw / 1280, vh / 720);
  canvas.style.width  = (1280 * scale) + 'px';
  canvas.style.height = (720  * scale) + 'px';
}
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

requestAnimationFrame(loop);
</script>
