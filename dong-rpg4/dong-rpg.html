let lastDrops = [];
function addMaterials(bossId, diff){
  const mats = BOSS_MATERIALS[bossId];
  if (!mats) return;
  lastDrops = [];
  function give(mat, amt){
    inventory[mat.id] = (inventory[mat.id]||0) + amt;
    lastDrops.push({ name: mat.name, color: mat.color, rarity: mat.rarity, amount: amt });
  }
  give(mats[0], 3);
  if (diff === 'normal' || diff === 'hard') give(mats[1], 1);
  if (diff === 'hard') give(mats[2], 1);
  const ultra = mats.find(m => m.chance);
  if (ultra && Math.random() < ultra.chance) give(ultra, 1);
  saveInventory();
}

}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = 1280 / r.width, scaleY = 720 / r.height;
  mouse.x = (e.clientX - r.left) * scaleX;
  mouse.y = (e.clientY - r.top) * scaleY;
});
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) { mouse.left = true; mouse.leftJustPressed = true; }
  if (e.button === 2) { mouse.right = true; mouse.rightJustPressed = true; }
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) mouse.left = false;
  if (e.button === 2) mouse.right = false;
});

// ── 모바일 가상 버튼 ──
const VBTNS = {
  left:   { x: 30,   y: 600, w: 80, h: 80, label: '◀' },
  right:  { x: 140,  y: 600, w: 80, h: 80, label: '▶' },
  jump:   { x: 85,   y: 505, w: 80, h: 80, label: '▲' },
  attack: { x: 1090, y: 575, w: 100,h: 100,label: '⚔' },
  parry:  { x: 1200, y: 470, w: 80, h: 80, label: '🛡' },
};
const vBtn = { left:false, right:false, jump:false, attack:false, parry:false };
let hasTouched = false;

function touchToCanvas(t) {
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)*1280/r.width, y:(t.clientY-r.top)*720/r.height };
}
function hitBtn(pos, btn) {
  return pos.x>=btn.x && pos.x<=btn.x+btn.w && pos.y>=btn.y && pos.y<=btn.y+btn.h;
}
function applyTouches(e) {
  e.preventDefault();
  hasTouched = true;
  const prev = { attack: vBtn.attack, parry: vBtn.parry };
  Object.keys(vBtn).forEach(k => vBtn[k] = false);
  for (const t of e.touches) {
    const p = touchToCanvas(t);
    for (const [k, b] of Object.entries(VBTNS)) { if (hitBtn(p, b)) vBtn[k] = true; }
    // 메뉴/UI 클릭: 전체 화면 터치를 왼쪽 클릭으로 처리
    if (!Object.values(VBTNS).some(b => hitBtn(p, b))) {
      mouse.x = p.x; mouse.y = p.y;
    }
  }
  if (vBtn.attack && !prev.attack) mouse.leftJustPressed = true;
  if (vBtn.parry  && !prev.parry)  mouse.rightJustPressed = true;
}
function applyTouchEnd(e) {
  e.preventDefault();
  hasTouched = true;
  const prev = { attack: vBtn.attack, parry: vBtn.parry };
  Object.keys(vBtn).forEach(k => vBtn[k] = false);
  for (const t of e.touches) {
    const p = touchToCanvas(t);
    for (const [k, b] of Object.entries(VBTNS)) { if (hitBtn(p, b)) vBtn[k] = true; }
  }
  // 터치 종료 시 UI 클릭 처리
  if (e.changedTouches.length > 0) {
    const p = touchToCanvas(e.changedTouches[0]);
    const onBtn = Object.values(VBTNS).some(b => hitBtn(p, b));
    if (!onBtn) { mouse.x = p.x; mouse.y = p.y; mouse.leftJustPressed = true; }
  }
}
canvas.addEventListener('touchstart',  applyTouches,  { passive:false });
canvas.addEventListener('touchmove',   applyTouches,  { passive:false });
canvas.addEventListener('touchend',    applyTouchEnd, { passive:false });
canvas.addEventListener('touchcancel', applyTouchEnd, { passive:false });

function drawVirtualButtons() {
  if (!hasTouched) return;
  ctx.save();
  for (const [k, b] of Object.entries(VBTNS)) {
    const active = vBtn[k];
    ctx.globalAlpha = active ? 0.75 : 0.35;
    ctx.fillStyle = active ? 'rgba(255,220,80,0.5)' : 'rgba(60,60,60,0.6)';
    ctx.strokeStyle = active ? '#ffe050' : '#888';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 14);
    ctx.fill(); ctx.stroke();
    ctx.globalAlpha = active ? 1 : 0.55;
    ctx.fillStyle = '#fff';
    ctx.font = '28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2);
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

    smithyScroll = Math.max(0, Math.min(SMITHY_MAX_SCROLL, smithyScroll + e.deltaY * 0.4));
    e.preventDefault();
  }
}, { passive: false });

let audioCtx = null, bgmGain = null, bgmLoopId = null, bgmNextTime = 0, bgmActive = false;
let bgmType = 'none';
const BGM_VOL = 0.68;

function getACtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = BGM_VOL;
    bgmGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freq, type, t, dur, vol, fe, dst) {
  try {
    const ctx = getACtx(), o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime + t);
    if (fe) o.frequency.exponentialRampToValueAtTime(fe, ctx.currentTime + t + dur);
    g.gain.setValueAtTime(0.001, ctx.currentTime + t);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + t + Math.min(0.015, dur * 0.1));
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + dur);
    o.connect(g); g.connect(dst || ctx.destination);
    o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + dur + 0.05);
  } catch(e) {}
}

function nz(t, dur, vol, ff, ft, dst) {
  try {
    const ctx = getACtx(), len = Math.ceil(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const flt = ctx.createBiquadFilter(); flt.type = ft || 'bandpass';
    flt.frequency.value = ff || 2000; flt.Q.value = 1;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + dur);
    src.connect(flt); flt.connect(g); g.connect(dst || ctx.destination);
    src.start(ctx.currentTime + t); src.stop(ctx.currentTime + t + dur + 0.05);
  } catch(e) {}
}

function scheduleBGMEel(startTime) {

  // 으스스한 멜로디 (Am)
  [[220,0],[196,s*3],[185,s*7],[196,s*11],[220,bar],[208,bar+s*3],[196,bar+s*8],[175,bar+s*11],
   [185,bar*2],[196,bar*2+s*4],[208,bar*2+s*9],[220,bar*2+s*12],[196,bar*3],[175,bar*3+s*4],[165,bar*3+s*8],[147,bar*3+s*12]]
    .forEach(([f,t])=>n(f,'sine',t,s*2.0,0.10,f*0.975));
  // 서브 패드
  n(110,'sine',0,bar*2,0.065); n(82,'sine',bar*2,bar*2,0.065);
  // 기포 효과
  for(let i=0;i<14;i++){
    try{

      const buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0);
      for(let k=0;k<len;k++) d[k]=(Math.random()*2-1)*Math.exp(-k/len*9);
      const src=ac.createBufferSource(); src.buffer=buf;
      const flt=ac.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=650+i*55; flt.Q.value=2.5;
      const g=ac.createGain(); g.gain.setValueAtTime(0.025,startTime+i*s*1.2);
      g.gain.exponentialRampToValueAtTime(0.001,startTime+i*s*1.2+0.05);
      src.connect(flt); flt.connect(g); g.connect(bgmGain);
      src.start(startTime+i*s*1.2); src.stop(startTime+i*s*1.2+0.06);

// ── BGM — 사막 (샌드웜 보스, 95 BPM, Em, 4 bars) ──
function scheduleBGMSandworm(startTime) {
  const b=60/95, s=b/4, bar=b*4, loop=bar*4;
  function n(f,tp,t,d,v,fe){ tone(f,tp,t,d,v,fe,bgmGain); }
  // 킥 드럼 (묵직한 쿵)
  [0,bar,bar*2,bar*3].forEach(t=>n(50,'sine',t,b*0.55,0.28,44));
  // Em 멜로디
  [[330,0],[294,s*2],[247,s*5],[330,s*9],[349,bar],[330,bar+s*3],[294,bar+s*7],[247,bar+s*11],
   [247,bar*2],[262,bar*2+s*2],[294,bar*2+s*6],[330,bar*2+s*10],[392,bar*3],[349,bar*3+s*3],[330,bar*3+s*7],[294,bar*3+s*11]]
    .forEach(([f,t])=>n(f,'triangle',t,s*1.5,0.040,f*0.972));
  // 스네어
  [b,bar+b,bar*2+b,bar*3+b].forEach(t=>nz(t,0.05,0.052,2800,'bandpass',bgmGain));
  // 모래 사각거림 (하이햇)
  for(let i=0;i<18;i++){

      const flt=ac.createBiquadFilter(); flt.type='highpass'; flt.frequency.value=3600;
      const g=ac.createGain();
      g.gain.setValueAtTime(0.018,startTime+i*s*0.72);

// ── BGM 제어 ──
function startBGM(type) {
  if (bgmActive && bgmType === type) return;
  // 기존 루프 정리
  if (bgmLoopId) { clearInterval(bgmLoopId); bgmLoopId = null; }
  bgmActive = true;
  bgmType = type;
  const ctx = getACtx();
  // 이전 예약된 gain 자동화 전부 취소 후 페이드인
  bgmGain.gain.cancelScheduledValues(ctx.currentTime);
  bgmGain.gain.setValueAtTime(0.001, ctx.currentTime);
  bgmGain.gain.linearRampToValueAtTime(BGM_VOL, ctx.currentTime + 1.1);
  bgmNextTime = ctx.currentTime + 0.05;
  const fn = type === 'menu' ? scheduleBGMMenu : type === 'boss2' ? scheduleBGMBoss2 : type === 'dragon' ? scheduleBGMDragon : type === 'eel' ? scheduleBGMEel : type === 'sandworm' ? scheduleBGMSandworm : scheduleBGMBoss1;
  bgmNextTime += fn(bgmNextTime);
  bgmLoopId = setInterval(() => {
    if (!bgmActive) { clearInterval(bgmLoopId); bgmLoopId = null; return; }
    if (bgmNextTime - getACtx().currentTime < 0.35) bgmNextTime += fn(bgmNextTime);
  }, 200);
}

function stopBGM(fadeSec) {
  bgmActive = false;
  bgmType = 'none';
  if (bgmLoopId) { clearInterval(bgmLoopId); bgmLoopId = null; }
  if (bgmGain && audioCtx) {
    try {
      const fs = fadeSec || 0.5;
      bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
      bgmGain.gain.setValueAtTime(bgmGain.gain.value, audioCtx.currentTime);
      bgmGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + fs);
    } catch(e) {}
  }
}

function switchBGM(type, fadeSec) {
  if (bgmType === type) return;
  const fs = fadeSec || 0.7;
  stopBGM(fs);
  // 페이드아웃 완료 후 새 BGM 시작
  if (type !== 'none') setTimeout(() => startBGM(type), fs * 1000 + 80);
}

  ctx.save();

  if (deathAnim > 0) {
    const WOBBLE = 18;   // 흔들리는 구간 (프레임)
    const FALL  = 48;    // 쓰러지는 구간 (프레임)
    const pivotX = x + 30;
    const pivotY = y + boss.h; // 발 중앙이 pivot

    ctx.translate(pivotX, pivotY);
    if (deathAnim < WOBBLE) {
      // 쓰러지기 전 비틀거림
      const wobble = Math.sin(deathAnim * 0.9) * 0.10 * (1 - deathAnim / WOBBLE);
      ctx.rotate(wobble);
    } else {
      // facing 방향으로 앞으로 쓰러짐 (ease-in)
      const t = Math.min(1, (deathAnim - WOBBLE) / FALL);
      const angle = t * t * (Math.PI / 2) * (facing === 1 ? 1 : -1);
      ctx.rotate(angle);
    }
    ctx.translate(-pivotX, -pivotY);

// 충격파
function drawShockwave(s) {
  if (s.type === 'barrage') {
    // 배리지 - 붉은 에너지 기둥 (패링 전용)
    const top = FLOOR_Y - s.h;
    ctx.fillStyle = `rgba(200,40,0,${s.alpha * 0.5})`;
    ctx.fillRect(s.x - 4, top, s.w + 8, s.h);       // 외곽 아우라
    ctx.fillStyle = `rgba(255,80,0,${s.alpha})`;
    ctx.fillRect(s.x, top, s.w, s.h);               // 본체
    ctx.fillStyle = `rgba(255,200,80,${s.alpha * 0.9})`;
    ctx.fillRect(s.x + 4, top + 4, s.w - 8, s.h - 8); // 내부 코어
    ctx.fillStyle = `rgba(255,255,180,${s.alpha})`;
    ctx.fillRect(s.x + 2, top, s.w - 4, 4);         // 선두 빛
  } else {
    ctx.fillStyle = `rgba(255,200,0,${s.alpha})`;
    ctx.fillRect(s.x, FLOOR_Y - s.h, s.w, s.h);
    ctx.fillStyle = `rgba(255,255,100,${s.alpha * 0.7})`;
    ctx.fillRect(s.x + 2, FLOOR_Y - s.h + 2, s.w - 4, s.h - 4);
  }
}

// ══════════════════════════════════════════
//  심해 곰치 도트 아트
// ══════════════════════════════════════════
const EEL_BASE_X = ARENA_RIGHT - 110; // 1130 — 머리 중심 X (정지 시)
const EEL_BASE_Y = FLOOR_Y - 130;     // 486  — 머리 중심 Y

function drawEel(biteOffset, hitFlash, pattern, animFrame, biteAngle = Math.PI) {
  const hCX = EEL_BASE_X + Math.cos(biteAngle) * biteOffset;
  const hCY = EEL_BASE_Y + Math.sin(biteAngle) * biteOffset;
  const hc  = hitFlash > 0;
  const t   = Date.now() * 0.001;
  // 팔레트 (통일 2단계: 메인 / 섀도)
  const c1  = hc ? '#80ffee' : '#00838f';
  const c2  = c1;
  const c3  = c1;
  const c4  = hc ? '#50eedd' : '#004249';

  // ── 몸통 / 목 ──
  const neckX0 = 1298;
  const neckLen = neckX0 - (hCX + 55);
  const neckH = Math.max(46, 80 - biteOffset * 0.022);
  const idleSway = Math.sin(t * 0.75 + animFrame * 0.04) * 2;
  const segs = Math.max(8, Math.ceil(neckLen / 42));
  const dyArc = hCY - EEL_BASE_Y; // 목이 구부러지는 수직 편차
  for (let s = segs; s >= 0; s--) {
    const f  = s / segs;
    const sx = hCX + 55 + neckLen * f;
    const sy = EEL_BASE_Y + dyArc * (1 - f) * (1 - f); // 2차 곡선: 머리→벽 부드럽게
    const wy = biteOffset > 50 ? Math.sin(f * Math.PI * 2.2 + t * 3.5) * (biteOffset * 0.025) * (1 - f * 0.5) : idleSway * f;
    const sw = neckLen / segs + 1.5;
    const sh = neckH * (0.52 + f * 0.48);
    ctx.fillStyle = f > 0.82 ? c1 : (f < 0.14 ? c4 : c2);
    ctx.fillRect(sx, sy + wy - sh / 2, sw, sh);
  }
  // 비늘 패턴
  ctx.fillStyle = c3;
  for (let s = 1; s < segs; s += 2) {
    const f  = s / segs;
    const sx = hCX + 60 + neckLen * f;
    const sy = EEL_BASE_Y + dyArc * (1 - f) * (1 - f);
    const wy = biteOffset > 50 ? Math.sin(f * Math.PI * 2.2 + t * 3.5) * (biteOffset * 0.025) * (1 - f * 0.5) : idleSway * f;
    const sh = neckH * (0.40 + f * 0.36) - 8;
    ctx.fillRect(sx, sy + wy - sh / 2, neckLen / segs * 0.65, sh);
  }
  // 등 지느러미 능선 (벽 고정단 기준)
  ctx.fillStyle = c3;
  ctx.fillRect(hCX + 52, EEL_BASE_Y - neckH / 2 - 8, neckLen - 4, 10);

  // ── 머리 (로컬 좌표) ──
  ctx.save(); ctx.translate(hCX, hCY);
  const jawOpen = pattern === 'eel_bite' ? 28
    : pattern === 'eel_swordfish_windup' ? 20
    : (pattern === 'eel_fish_swarm' || pattern === 'eel_stingray_windup') ? 14
    : pattern === 'eel_whale_warn' ? 24 : 4;
  const eGlow = pattern === 'eel_bite' || pattern === 'eel_whale_warn' || pattern === 'eel_swordfish_windup';

  // ── 상부 머리 기본 구조 ──
  ctx.fillStyle='#000'; ctx.fillRect(-61,-45,124,8);
  ctx.fillStyle = c4; ctx.fillRect(-60, -44, 122, 6);       // 두개 최상단 어두운 줄
  ctx.fillStyle='#000'; ctx.fillRect(-59,-39,118,40);
  ctx.fillStyle = c2; ctx.fillRect(-58, -38, 116, 38);      // 상부 머리 베이스
  ctx.fillStyle='#000'; ctx.fillRect(-59,-1,114,30+jawOpen);
  ctx.fillStyle = c1; ctx.fillRect(-58, 0, 112, 28 + jawOpen); // 하부/아래턱
  ctx.fillStyle = c4; ctx.fillRect(54, -38, 6, 38);          // 우측 어두운 가장자리
  ctx.fillStyle = c4; ctx.fillRect(-58, -38, 4, 38);          // 좌측 어두운 가장자리
  ctx.fillStyle = c3; ctx.fillRect(-28, -43, 56, 2);          // 능선 위 반사광
  // 두개 표면 가로 비늘줄 3개
  ctx.fillStyle = c4;
  ctx.fillRect(-40, -34, 90, 2); ctx.fillRect(-40, -27, 90, 2); ctx.fillRect(-40, -19, 90, 2);
  // 두개 표면 세로 비늘 구분선 6개
  for (let si = 0; si < 6; si++) ctx.fillRect(-36 + si * 14, -34, 2, 17);
  ctx.fillStyle = c1; ctx.fillRect(-58, -38, 116, 3);          // 이마 앞쪽 밝은 가장자리

  // ── 아래턱 텍스처 ──
  ctx.fillStyle = c2; ctx.fillRect(-56, 2, 110, 4);
  ctx.fillStyle = c4; ctx.fillRect(-56, 2 + (jawOpen / 2 | 0), 110, 2);
  for (let si = 0; si < 5; si++) ctx.fillRect(-48 + si * 15, 5, 2, 22 + (jawOpen * 0.6 | 0));

  // ── 주둥이 ──
  ctx.fillStyle='#000'; ctx.fillRect(-73,-29,18,30+(jawOpen/2|0)); ctx.fillRect(-79,-23,14,22+(jawOpen/3|0));
  ctx.fillStyle = c2; ctx.fillRect(-72, -28, 16, 28 + (jawOpen / 2 | 0));
  ctx.fillStyle = c1; ctx.fillRect(-78, -22, 12, 20 + (jawOpen / 3 | 0));
  ctx.fillStyle = c4; ctx.fillRect(-80, -15, 8, 10);
  ctx.fillStyle = c4; ctx.fillRect(-72, -22, 2, 18 + (jawOpen / 3 | 0));
  ctx.fillStyle = c4; ctx.fillRect(-80, -5 + (jawOpen / 4 | 0), 16, 3);

  // ── 코 관 (곰치 특징) ── 전방+후방 각 3레이어
  ctx.fillStyle = c4; ctx.fillRect(-67, -44, 9, 14);
  ctx.fillStyle = '#0a0808'; ctx.fillRect(-66, -43, 7, 11);
  ctx.fillStyle = '#050505'; ctx.fillRect(-65, -42, 5, 9);
  ctx.fillStyle = c3; ctx.fillRect(-67, -44, 2, 5); ctx.fillRect(-67, -44, 9, 2);
  ctx.fillStyle = c4; ctx.fillRect(-57, -44, 9, 14);
  ctx.fillStyle = '#0a0808'; ctx.fillRect(-56, -43, 7, 11);
  ctx.fillStyle = '#050505'; ctx.fillRect(-55, -42, 5, 9);
  ctx.fillStyle = c3; ctx.fillRect(-57, -44, 2, 5); ctx.fillRect(-57, -44, 9, 2);

  // ── 입안 + 이빨 ── 상악 8개 / 하악 6개
  if (jawOpen > 4) {
    ctx.fillStyle = '#160020'; ctx.fillRect(-72, -2, 64, jawOpen + 10);
    ctx.fillStyle = '#1a0028'; ctx.fillRect(-72, jawOpen + 3, 64, 5);
    for (let ti = 0; ti < 8; ti++) {
      const tx = -70 + ti * 8; if (tx > -8) break;
      const th = 5 + (ti % 3 === 0 ? 6 : ti % 2 === 0 ? 3 : 1);
      ctx.fillStyle = '#e0f4f1'; ctx.fillRect(tx, -4, 5, th);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(tx, -4, 2, 3);
      ctx.fillStyle = '#a0c4be'; ctx.fillRect(tx + 1, -4 + th - 2, 3, 2);
    }
    for (let ti = 0; ti < 6; ti++) {
      const tx = -66 + ti * 9; if (tx > -8) break;
      const th = 4 + (ti % 2 === 0 ? 5 : 2);
      ctx.fillStyle = '#d0e8e5'; ctx.fillRect(tx, jawOpen + 2, 5, th);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(tx, jawOpen + 2, 2, 3);
      ctx.fillStyle = '#90b4b0'; ctx.fillRect(tx + 1, jawOpen + 2 + th - 2, 3, 2);
    }
  }

  // ── 눈 ── 5레이어 상세
  if (eGlow) { ctx.fillStyle = 'rgba(255,208,0,0.36)'; ctx.fillRect(-52, -40, 42, 36); }
  ctx.fillStyle = c4; ctx.fillRect(-47, -33, 32, 24);       // 눈 소켓 외곽
  ctx.fillStyle = eGlow ? '#ffe000' : (hc ? '#ffffff' : '#ffd600');
  ctx.fillRect(-44, -30, 26, 18);                            // 홍채 배경
  ctx.fillStyle = eGlow ? '#ffb000' : (hc ? '#cccccc' : '#dda000');
  ctx.fillRect(-43, -29, 24, 16);                            // 중간 홍채
  ctx.fillStyle = '#0a0808'; ctx.fillRect(-33, -29, 8, 16); // 동공 슬릿

    [ -6,-14, 9,6],[16,-16, 9,6],[38,-10, 9, 6],[58,-14, 8,5],

  ]) ctx.fillRect(rx, ry, rw, rh);
  ctx.fillStyle = c1;
  for (const [rx,ry] of [[-18,-30],[4,-22],[24,-30],[46,-22],[-16,6],[12,12],[34,6],[54,2]])

  // ── 아가미 틈 (우측) ── 4줄 + 내부 어두운색 + 가장자리 하이라이트
  ctx.fillStyle = c4;
  ctx.fillRect(53, -26, 8, 44 + jawOpen); ctx.fillRect(44, -20, 7, 34 + jawOpen);
  ctx.fillRect(36, -14, 6, 28 + jawOpen); ctx.fillRect(29,  -8, 5, 22 + jawOpen);

}

function drawEelWhaleWarning(warnProgress) {

function drawEelWhale(w) {
  if (!w || w.phase !== 'charge') return;
  ctx.save();
  const wx = w.x, wy2 = FLOOR_Y - w.height, ww = w.width, wh = w.height;
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(wx, wy2, ww * 0.86, wh);
  ctx.beginPath(); ctx.ellipse(wx + ww * 0.12, wy2 + wh * 0.5, ww * 0.14, wh * 0.5, 0, 0, Math.PI * 2); ctx.fill();
  // 꼬리 지느러미 (오른쪽)
  ctx.beginPath();
  ctx.moveTo(wx+ww*0.83, wy2+wh*0.5); ctx.lineTo(wx+ww+10, wy2+6); ctx.lineTo(wx+ww*0.96, wy2+wh*0.4); ctx.lineTo(wx+ww*0.88, wy2+wh*0.5); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(wx+ww*0.83, wy2+wh*0.5); ctx.lineTo(wx+ww+10, wy2+wh-6); ctx.lineTo(wx+ww*0.96, wy2+wh*0.6); ctx.lineTo(wx+ww*0.88, wy2+wh*0.5); ctx.closePath(); ctx.fill();
  // 배 (밝은 부분)
  ctx.fillStyle = '#2a5a8c';
  ctx.beginPath(); ctx.ellipse(wx+ww*0.42, wy2+wh*0.7, ww*0.28, wh*0.26, 0, 0, Math.PI*2); ctx.fill();
  // 가슴 지느러미
  ctx.fillStyle = '#1a3a5c';
  ctx.beginPath(); ctx.moveTo(wx+ww*0.26,wy2+wh*0.68); ctx.lineTo(wx+ww*0.1,wy2+wh*1.18); ctx.lineTo(wx+ww*0.4,wy2+wh*0.8); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#90caf9'; ctx.fillRect(wx+ww*0.07, wy2+wh*0.36, ww*0.032, wh*0.14);
  // 입/수염 라인

  for (let mi=0;mi<6;mi++) ctx.fillRect(wx+ww*0.03+mi*ww*0.018, wy2+wh*0.52, ww*0.012, wh*0.16);

}

// ── 곰치 2페이즈 드로잉 ──
function makeEel2Seg(cx, cy) {
  const phase0 = Math.random() * Math.PI * 2;
  return {
    coilCX: cx, coilCY: cy,
    coilR: 72, coilPhase: phase0,
    coilSpeed: 0.019 + Math.random() * 0.008,
    headX: cx + Math.cos(phase0) * 72,
    headY: cy + Math.sin(phase0) * 72,
    pattern: 'idle', patternTimer: 120 + (Math.random() * 100 | 0),
    biteOffset: 0, biteHit: false, biteTimer: 0, biteAngle: 0,
    projectiles: [],
    parryCount: 0,
    hitFlash: 0, animFrame: 0, animTimer: 0,
    dead: false, deathAnim: 0,
    attackBox: null,
    introTimer: 0, startCX: cx, startCY: cy, targetCX: cx, targetCY: cy,
  };
}

function drawEel2Seg(seg) {
  const S = 2.0;
  const isDying = seg.dead && seg.deathAnim > 0;
  if (seg.dead && !isDying) return;

  const hc = !isDying && seg.hitFlash > 0;
  // 팔레트 (통일 2단계)
  const c1 = hc ? '#88ffee' : '#2ea082';
  const c2 = c1;
  const c3 = hc ? '#ccffee' : '#1a4a3c';
  const hx = seg.headX, hy = seg.headY;
  const cx = seg.coilCX, cy = seg.coilCY;

  ctx.save();
  if (isDying) ctx.globalAlpha = (seg.deathAnim / 22) * 0.85;

  // Body segments along orbit — 길이 5배(20개), 두께 3배
  for (let i = 20; i >= 1; i--) {
    const ang = seg.coilPhase - i * 0.28;
    const bx = cx + Math.cos(ang) * seg.coilR;
    const by = cy + Math.sin(ang) * seg.coilR;
    const bw = Math.max(6, 24 - i * 0.9) * 2.0;
    const bh = Math.max(5, 18 - i * 0.6) * 3.0;
    ctx.fillStyle = i === 20 ? c1 : c2;
    ctx.fillRect(bx - bw / 2, by - bh / 2, bw, bh);
    if (i % 2 === 0) {
      ctx.fillStyle = c3;
      ctx.fillRect(bx - bw * 0.3, by - bh * 0.3, bw * 0.55, bh * 0.45);
    }
  }

  // Neck connecting body to head — 두께 3배
  const neckBaseAng = seg.coilPhase - 0.22;
  const nbx = cx + Math.cos(neckBaseAng) * seg.coilR;
  const nby = cy + Math.sin(neckBaseAng) * seg.coilR;
  const neckLen = Math.hypot(hx - nbx, hy - nby);
  if (neckLen > 2) {
    const nRot = Math.atan2(hy - nby, hx - nbx);
    ctx.save(); ctx.translate(nbx, nby); ctx.rotate(nRot);
    ctx.fillStyle = c2; ctx.fillRect(0, -21, neckLen, 42);
    ctx.restore();
  }

  // Head (1페이즈 얼굴 디자인 복사)
  const faceAng = Math.atan2(hy - cy, hx - cx);
  ctx.save(); ctx.translate(hx, hy); ctx.scale(S, S); ctx.rotate(faceAng + Math.PI);
  const jawOpen = isDying ? 0 : (seg.pattern === 'eel2_bite' ? 28 : seg.pattern === 'eel2_bite_warn' ? 20 : 4);
  const eGlow = !isDying && (seg.pattern === 'eel2_bite' || seg.pattern === 'eel2_bite_warn');
  // 1페이즈 팔레트 (2페이즈 색조로 조정)
  const fc1 = hc ? '#80ffee' : '#2ea082';
  const fc2 = fc1;
  const fc3 = fc1;
  const fc4 = hc ? '#50ddcc' : '#0d3028';

  // ── 상부 머리 기본 구조 ──
  ctx.fillStyle='#000'; ctx.fillRect(-61,-45,124,8);
  ctx.fillStyle=fc4; ctx.fillRect(-60,-44,122,6);
  ctx.fillStyle='#000'; ctx.fillRect(-59,-39,118,40);
  ctx.fillStyle=fc2; ctx.fillRect(-58,-38,116,38);
  ctx.fillStyle='#000'; ctx.fillRect(-59,-1,114,30+jawOpen);
  ctx.fillStyle=fc1; ctx.fillRect(-58,0,112,28+jawOpen);
  ctx.fillStyle=fc4; ctx.fillRect(54,-38,6,38); ctx.fillRect(-58,-38,4,38);
  ctx.fillStyle=fc3; ctx.fillRect(-28,-43,56,2);
  ctx.fillStyle=fc4;
  ctx.fillRect(-40,-34,90,2); ctx.fillRect(-40,-27,90,2); ctx.fillRect(-40,-19,90,2);
  for (let si=0;si<6;si++) ctx.fillRect(-36+si*14,-34,2,17);
  ctx.fillStyle=fc1; ctx.fillRect(-58,-38,116,3);

  // ── 아래턱 텍스처 ──
  ctx.fillStyle=fc2; ctx.fillRect(-56,2,110,4);
  ctx.fillStyle=fc4; ctx.fillRect(-56,2+(jawOpen/2|0),110,2);
  for (let si=0;si<5;si++) ctx.fillRect(-48+si*15,5,2,22+(jawOpen*0.6|0));

  // ── 주둥이 ──
  ctx.fillStyle='#000'; ctx.fillRect(-73,-29,18,30+(jawOpen/2|0)); ctx.fillRect(-79,-23,14,22+(jawOpen/3|0));
  ctx.fillStyle=fc2; ctx.fillRect(-72,-28,16,28+(jawOpen/2|0));
  ctx.fillStyle=fc1; ctx.fillRect(-78,-22,12,20+(jawOpen/3|0));
  ctx.fillStyle=fc4; ctx.fillRect(-80,-15,8,10); ctx.fillRect(-72,-22,2,18+(jawOpen/3|0));
  ctx.fillStyle=fc4; ctx.fillRect(-80,-5+(jawOpen/4|0),16,3);

  // ── 코 관 ──
  ctx.fillStyle=fc4; ctx.fillRect(-67,-44,9,14);
  ctx.fillStyle='#0a0808'; ctx.fillRect(-66,-43,7,11);
  ctx.fillStyle='#050505'; ctx.fillRect(-65,-42,5,9);
  ctx.fillStyle=fc3; ctx.fillRect(-67,-44,2,5); ctx.fillRect(-67,-44,9,2);
  ctx.fillStyle=fc4; ctx.fillRect(-57,-44,9,14);
  ctx.fillStyle='#0a0808'; ctx.fillRect(-56,-43,7,11);
  ctx.fillStyle='#050505'; ctx.fillRect(-55,-42,5,9);
  ctx.fillStyle=fc3; ctx.fillRect(-57,-44,2,5); ctx.fillRect(-57,-44,9,2);

  // ── 입안 + 이빨 ──
  if (jawOpen > 4) {
    ctx.fillStyle='#160020'; ctx.fillRect(-72,-2,64,jawOpen+10);
    ctx.fillStyle='#1a0028'; ctx.fillRect(-72,jawOpen+3,64,5);
    for (let ti=0;ti<8;ti++) {
      const tx=-70+ti*8; if (tx>-8) break;
      const th=5+(ti%3===0?6:ti%2===0?3:1);
      ctx.fillStyle='#e0f4f1'; ctx.fillRect(tx,-4,5,th);
      ctx.fillStyle='#ffffff'; ctx.fillRect(tx,-4,2,3);
      ctx.fillStyle='#a0c4be'; ctx.fillRect(tx+1,-4+th-2,3,2);
    }
    for (let ti=0;ti<6;ti++) {
      const tx=-66+ti*9; if (tx>-8) break;
      const th=4+(ti%2===0?5:2);
      ctx.fillStyle='#d0e8e5'; ctx.fillRect(tx,jawOpen+2,5,th);
      ctx.fillStyle='#ffffff'; ctx.fillRect(tx,jawOpen+2,2,3);
      ctx.fillStyle='#90b4b0'; ctx.fillRect(tx+1,jawOpen+2+th-2,3,2);
    }
  }

  // ── 눈 ──
  if (eGlow) { ctx.fillStyle='rgba(255,208,0,0.36)'; ctx.fillRect(-52,-40,42,36); }
  ctx.fillStyle=fc4; ctx.fillRect(-47,-33,32,24);
  ctx.fillStyle=eGlow?'#ffe000':(hc?'#ffffff':'#ffd600'); ctx.fillRect(-44,-30,26,18);
  ctx.fillStyle=eGlow?'#ffb000':(hc?'#cccccc':'#dda000'); ctx.fillRect(-43,-29,24,16);
  ctx.fillStyle='#0a0808'; ctx.fillRect(-33,-29,8,16);
  ctx.fillStyle=eGlow?'#ffc800':(hc?'#eeeeee':'#cc9000');
  ctx.fillRect(-44,-25,10,2); ctx.fillRect(-44,-20,10,2);
  ctx.fillRect(-28,-25,10,2); ctx.fillRect(-28,-20,10,2);
  if (!hc) {
    ctx.fillStyle='rgba(255,255,200,0.7)'; ctx.fillRect(-42,-28,7,5);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillRect(-42,-28,3,2);
  }
  ctx.fillStyle=fc4; ctx.fillRect(-44,-12,26,2); ctx.fillRect(-47,-33,32,3);

  // ── 반점 무늬 ──
  ctx.fillStyle=fc3;
  for (const [rx,ry,rw,rh] of [
    [-18,-30,14,8],[4,-22,12,8],[24,-30,12,10],[46,-22,14,8],
    [-16,  6,13,8],[12, 12,11,7],[34,  6,14, 9],[54,  2,13,8],
    [ -6,-14, 9,6],[16,-16, 9,6],[38,-10, 9, 6],[58,-14, 8,5],
    [-22, 16, 8,5],[ 6, 20, 9,6],[30, 18, 8, 5],[50, 16, 8,5]
  ]) ctx.fillRect(rx,ry,rw,rh);
  ctx.fillStyle=fc1;
  for (const [rx,ry] of [[-18,-30],[4,-22],[24,-30],[46,-22],[-16,6],[12,12],[34,6],[54,2]])
    ctx.fillRect(rx,ry,5,3);

  // ── 아가미 틈 ──
  ctx.fillStyle=fc4;
  ctx.fillRect(53,-26,8,44+jawOpen); ctx.fillRect(44,-20,7,34+jawOpen);
  ctx.fillRect(36,-14,6,28+jawOpen); ctx.fillRect(29,-8,5,22+jawOpen);
  ctx.fillStyle='#042430';
  ctx.fillRect(55,-24,5,40+jawOpen); ctx.fillRect(46,-18,4,30+jawOpen);
  ctx.fillRect(38,-12,3,24+jawOpen); ctx.fillRect(31,-6,3,18+jawOpen);
  ctx.fillStyle=fc2;
  ctx.fillRect(53,-26,2,44+jawOpen); ctx.fillRect(44,-20,2,34+jawOpen);
  ctx.fillRect(36,-14,2,28+jawOpen);
  ctx.restore();

  if (hc) {
    ctx.save(); ctx.globalAlpha = 0.38; ctx.fillStyle = '#80ffee';
    ctx.fillRect(hx - 32 * S, hy - 25 * S, 64 * S, 50 * S); ctx.restore();
  }

  ctx.restore();
}

function drawEelP2() {
  if (!boss.eel2Active) return;
  if (boss.eel2State === 'intro' && boss.eel2Timer < 120) {
    const p = 1 - boss.eel2Timer / 120;
    ctx.save(); ctx.globalAlpha = p * 0.3;
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(ARENA_LEFT, 0, ARENA_RIGHT - ARENA_LEFT, FLOOR_Y);
    ctx.restore();
  }
  for (const seg of boss.eel2Segments) {
    drawEel2Seg(seg);
    for (const p of seg.projectiles) drawEelProjectile(p);
    // 경고 라인 (물기 예고)
    if (seg.pattern === 'eel2_bite_warn' && !seg.dead) {
      const pulse = 0.35 + 0.25 * Math.sin(Date.now() * 0.018);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#ff3333';
      ctx.lineWidth = 5;
      ctx.setLineDash([14, 9]);
      ctx.beginPath();
      ctx.moveTo(seg.headX, seg.headY);
      const wx = Math.max(ARENA_LEFT, Math.min(ARENA_RIGHT, seg.headX + Math.cos(seg.biteAngle) * 385));
      const wy = Math.max(0, Math.min(FLOOR_Y, seg.headY + Math.sin(seg.biteAngle) * 385));
      ctx.lineTo(wx, wy);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }
}

// 붉은 비룡 도트 아트 - 고해상도 픽셀 아트
function drawDragon(x, y, hitFlash, pattern, animFrame, phaseTimer, biteStep) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(3.5, 3.5);
  const breathe = Math.sin(animFrame * 0.12) * 2;
  const hc = hitFlash > 0;
  const eyeGlow = (pattern==='dragon_fireball_windup'||pattern==='dragon_bite'||pattern==='dragon_slam_warn');

  // 팔레트 (통일 2단계: 메인 / 블랙)
  const dR1=hc?'#ff4444':'#8B0000';
  const dR2=dR1, dR3=dR1, dR4=dR1, dR5=dR1, dBelly=dR1, dDark=dR1;
  const dBlack=hc?'#ff0000':'#1a0000';

  // ── 날개 (픽셀 아트 계단식) ──
  const _wOut = hc?'#ff4444':'#000';
  // 상부 날개 - 계단식 세로 칼럼
  for (const [wx,wy,ww,wh] of [[25,12,8,16],[33,4,8,24],[41,-5,8,33],[49,-14,8,42],[57,-22,8,49],[65,-31,8,52],[73,-39,8,55],[81,-48,9,59]]) {
    ctx.fillStyle=_wOut; ctx.fillRect(wx-1,wy+breathe-1,ww+2,wh+2);
    ctx.fillStyle=dR4; ctx.fillRect(wx,wy+breathe,ww,wh);
  }
  // 하부 날개 - 계단식 세로 칼럼
  for (const [wx,wy,ww,wh] of [[50,30,8,18],[58,22,8,26],[66,15,8,33],[74,7,8,38],[82,0,8,42],[88,-6,4,45]]) {
    ctx.fillStyle=_wOut; ctx.fillRect(wx-1,wy+breathe-1,ww+2,wh+2);
    ctx.fillStyle=hc?'#ffaaaa':'#880000'; ctx.fillRect(wx,wy+breathe,ww,wh);
  }
  // 날개막 가로 줄무늬
  ctx.fillStyle = hc?'rgba(255,80,80,0.35)':'rgba(80,0,0,0.5)';
  for (let wi=0;wi<7;wi++) {
    const wy2=breathe-48+wi*10, wx1=28+wi*7;
    if (wy2<28) ctx.fillRect(wx1, wy2, 84-wx1, 2);
  }
  // 날개뼈 (상세)
  ctx.fillStyle = dBlack;
  ctx.fillRect(21,9,6,56); ctx.fillRect(49,-57,6,32); ctx.fillRect(67,-37,5,26);
  ctx.fillStyle = dDark;
  ctx.fillRect(22,10,4,54); ctx.fillRect(50,-55,4,29); ctx.fillRect(68,-35,3,23);
  // 날개 끝 가시
  ctx.fillStyle = dBlack;
  ctx.fillRect(83,-56,5,7); ctx.fillRect(88,-38,4,6); ctx.fillRect(89,-22,4,5);
  ctx.fillStyle = '#300'; ctx.fillRect(84,-57,3,3); ctx.fillRect(89,-39,3,3);

  // ── 몸통 ──
  ctx.fillStyle='#000'; ctx.fillRect(7,27+breathe,78,54);

// 드래곤 불덩어리
function drawDragonFireball(fb) {
  ctx.save();
  ctx.translate(fb.x, fb.y);
  const r = fb.r;
  // 픽셀 아트 발광 (중첩 사각형)
  ctx.fillStyle = 'rgba(255,60,0,0.12)'; ctx.fillRect(-r-14,-r-14,(r+14)*2,(r+14)*2);
  ctx.fillStyle = 'rgba(255,60,0,0.22)'; ctx.fillRect(-r-10,-r-10,(r+10)*2,(r+10)*2);
  ctx.fillStyle = 'rgba(255,60,0,0.35)'; ctx.fillRect(-r-5,-r-5,(r+5)*2,(r+5)*2);
  ctx.fillStyle = '#c00';
  ctx.fillRect(-r,-r,r*2,r*2);
  ctx.fillStyle = '#f40';
  ctx.fillRect(-r+4,-r+4,r*2-8,r*2-8);
  ctx.fillStyle = '#f80';
  ctx.fillRect(-r+8,-r+8,r*2-16,r*2-16);
  ctx.fillStyle = '#ff8';
  ctx.fillRect(-5,-5,10,10);
  // 꼬리 불꽃
  const tail = fb.vx > 0 ? 1 : -1;
  ctx.fillStyle = 'rgba(255,100,0,0.5)';
  ctx.fillRect(tail>0?-r-12:-r, -r/2, 14, r);
  ctx.restore();
}

// 물기 경고 그림자
function drawBiteWarning(biteTargetX, biteStep, phaseTimer, phase) {
  if (phase !== 0) return;
  const alpha = Math.min(0.7, (50 - phaseTimer) / 30 + 0.2);
  ctx.fillStyle = `rgba(255,50,0,${alpha * 0.35})`;
  ctx.fillRect(biteTargetX - 160, FLOOR_Y - 550, 320, 550);
  ctx.fillStyle = `rgba(255,100,0,${alpha * 0.6})`;
  ctx.fillRect(biteTargetX - 4, FLOOR_Y - 550, 8, 550);
  // 경고 표시
  ctx.font = pixelFont(28);
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255,${Math.floor(200-alpha*100)},0,${alpha})`;
  ctx.fillText('!', biteTargetX, FLOOR_Y - 558);
  ctx.textAlign = 'left';
}

// 지면 강타 경고 (맵 전체 강조)
function drawSlamWarning(phaseTimer) {
  const prog = Math.min(1, Math.max(0, (120 - phaseTimer) / 90));
  const alpha = Math.min(0.6, prog * 0.8);
  if (alpha <= 0) return;
  // 바닥 전체 붉게
  ctx.fillStyle = `rgba(255,50,0,${alpha * 0.3})`;
  ctx.fillRect(ARENA_LEFT, FLOOR_Y - 130, ARENA_RIGHT - ARENA_LEFT, 130);
  // 중앙 집중 링
  const cx = 640, cy = FLOOR_Y - 20;
  const r = 80 + prog * 300;
  const grd = ctx.createRadialGradient(cx, cy, 10, cx, cy, r);
  grd.addColorStop(0, `rgba(255,100,0,${alpha * 0.5})`);
  grd.addColorStop(0.6, `rgba(255,50,0,${alpha * 0.2})`);
  grd.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  // 경고 느낌표
  const pulse = 0.9 + 0.1*Math.sin(phaseTimer * 0.2);
  ctx.save(); ctx.translate(640, FLOOR_Y - 160); ctx.scale(pulse, pulse);
  ctx.font = pixelFont(60);
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255,200,0,${Math.min(1, alpha * 1.5)})`;
  ctx.fillText('!', 0, 0);
  ctx.restore();
  ctx.textAlign = 'left';
}

// ══════════════════════════════════════════
//  배경 (붉은 비룡 - 큰 나무 위 둥지)
// ══════════════════════════════════════════
function drawDragonNestArena() {
  const t = Date.now() * 0.001;
  function rng(s) { const x = Math.sin(s * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

  // ── 하늘 배경 (황혼/노을) ──
  const sky = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  sky.addColorStop(0,    '#07020f');
  sky.addColorStop(0.20, '#1d0822');
  sky.addColorStop(0.45, '#5c1200');
  sky.addColorStop(0.72, '#a83000');
  sky.addColorStop(0.90, '#c84800');
  sky.addColorStop(1,    '#d05808');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, 1280, FLOOR_Y + 4);

  // ── 지평선 태양 글로우 ──
  const sunG = ctx.createRadialGradient(640, FLOOR_Y + 60, 10, 640, FLOOR_Y + 60, 420);
  sunG.addColorStop(0,    'rgba(255,200,80,0.55)');
  sunG.addColorStop(0.18, 'rgba(255,110,20,0.28)');
  sunG.addColorStop(0.55, 'rgba(200,50,0,0.10)');
  sunG.addColorStop(1,    'rgba(180,20,0,0)');
  ctx.fillStyle = sunG;
  ctx.fillRect(0, FLOOR_Y - 380, 1280, 440);

  // ── 별 (상단 280px) ──
  for (let i = 0; i < 26; i++) {
    const sx = rng(i * 7.31 + 0.1) * 1280;
    const sy = rng(i * 3.91 + 0.2) * 280;
    const tw = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * (1 + rng(i * 2.3)) + i * 1.7));
    ctx.globalAlpha = tw;
    ctx.fillStyle = '#fff8e0';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // ── 구름 ──
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 290 + t * 12) % 1600) - 120;
    const cy = 65 + i * 52;
    ctx.fillStyle = `rgba(175,65,18,${0.11 + i * 0.025})`;
    ctx.beginPath(); ctx.ellipse(cx, cy, 92, 21, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 82, cy + 8, 68, 17, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx - 58, cy + 5, 58, 15, 0, 0, Math.PI * 2); ctx.fill();
  }

  // ── 원거리 산 실루엣 (두 레이어) ──
  const farMtn = [[0,70],[140,25],[280,65],[380,18],[480,55],[580,12],[700,48],[800,16],[900,58],[1050,20],[1160,64],[1280,30]];
  ctx.fillStyle = 'rgba(50,10,2,0.45)';
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y);
  for (const [mx,mh] of farMtn) ctx.lineTo(mx, FLOOR_Y - mh);
  ctx.lineTo(1280, FLOOR_Y); ctx.closePath(); ctx.fill();

  const nearMtn = [[0,48],[100,84],[200,40],[320,105],[450,48],[560,90],[680,44],[780,98],[900,40],[1030,86],[1150,44],[1280,75]];
  ctx.fillStyle = 'rgba(15,3,0,0.80)';
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y);
  for (const [mx,mh] of nearMtn) ctx.lineTo(mx, FLOOR_Y - mh);
  ctx.lineTo(1280, FLOOR_Y); ctx.closePath(); ctx.fill();

  // ── 나무 가지 (배경) ──
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#1c0904';
  const lBr = [
    [0,510, 150,440, 295,408, 20],
    [0,355, 125,315, 255,282, 13],
    [0,215, 118,200, 238,172, 9],
    [35,158, 132,154, 228,138, 6],
  ];
  for (const [x0,y0,x1,y1,x2,y2,w] of lBr) {
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.quadraticCurveTo(x1,y1,x2,y2); ctx.stroke();
  }
  const rBr = [
    [1280,488, 1110,418, 968,386, 20],
    [1280,332, 1142,298, 1002,268, 13],
    [1280,202, 1148,188, 1022,162, 9],
    [1244,148, 1134,150, 1042,136, 6],
  ];
  for (const [x0,y0,x1,y1,x2,y2,w] of rBr) {
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.quadraticCurveTo(x1,y1,x2,y2); ctx.stroke();
  }

  // ── 나무 몸통 (아레나 양쪽 벽) ──
  const lTG = ctx.createLinearGradient(0, 0, 40, 0);
  lTG.addColorStop(0, '#0e0400'); lTG.addColorStop(0.35, '#251008');
  lTG.addColorStop(0.7, '#2e1508'); lTG.addColorStop(1, '#180900');
  ctx.fillStyle = lTG; ctx.fillRect(0, 0, 40, 720);
  ctx.fillStyle = '#0a0300';
  for (let i = 0; i < 9; i++) {
    ctx.fillRect(5 + Math.floor(rng(i * 7.3 + 1) * 18), Math.floor(rng(i * 13.1 + 1) * 720),
                 3, Math.floor(30 + rng(i * 4.7 + 1) * 80));
  }

  const rTG = ctx.createLinearGradient(1240, 0, 1280, 0);
  rTG.addColorStop(0, '#180900'); rTG.addColorStop(0.3, '#2e1508');
  rTG.addColorStop(0.65, '#251008'); rTG.addColorStop(1, '#0e0400');
  ctx.fillStyle = rTG; ctx.fillRect(1240, 0, 40, 720);
  ctx.fillStyle = '#0a0300';
  for (let i = 0; i < 9; i++) {
    ctx.fillRect(1245 + Math.floor(rng(i * 8.3 + 2) * 25), Math.floor(rng(i * 19.1 + 2) * 720),
                 3, Math.floor(30 + rng(i * 5.7 + 2) * 80));
  }

  // ── 둥지 바닥 (FLOOR_Y 이하 전체) ──
  const nestBG = ctx.createLinearGradient(0, FLOOR_Y, 0, 720);
  nestBG.addColorStop(0,   '#3c1e06');
  nestBG.addColorStop(0.4, '#220e02');
  nestBG.addColorStop(1,   '#0e0400');
  ctx.fillStyle = nestBG;
  ctx.fillRect(0, FLOOR_Y, 1280, 720 - FLOOR_Y);

  // ── 둥지 막대기들 ──
  for (let i = 0; i < 42; i++) {
    const sx = ARENA_LEFT - 25 + rng(i * 5.03 + 3) * (ARENA_RIGHT - ARENA_LEFT + 50);
    const sy = FLOOR_Y + 3 + rng(i * 1.97 + 3) * 92;
    const sw = 55 + rng(i * 7.13 + 3) * 180;
    const angle = (rng(i * 2.73 + 3) - 0.5) * 0.65;
    const thick = 4 + rng(i * 3.19 + 3) * 7;
    const lv = 58 + Math.floor(rng(i * 8.37 + 3) * 58);
    ctx.fillStyle = `rgb(${lv+14},${Math.floor(lv*0.5)},${Math.floor(lv*0.07)})`;
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(angle);
    ctx.fillRect(0, -thick/2, sw, thick);
    ctx.restore();
  }

  // ── 둥지 테두리 림 (올라온 가장자리 막대기) ──
  for (let pass = 0; pass < 2; pass++) {
    const baseX = pass === 0 ? ARENA_LEFT - 15 : ARENA_RIGHT - 110;
    for (let i = 0; i < 13; i++) {
      const seed = i * 100 + pass * 50;
      const sx = baseX + rng(seed + 6.1) * 120;
      const sy = FLOOR_Y - 24 + rng(seed + 3.7) * 18;
      const sw = 30 + rng(seed + 2.3) * 75;
      const angle = -0.65 + rng(seed + 4.5) * 1.3;
      const lv = 88 + Math.floor(rng(seed + 9.3) * 52);
      ctx.fillStyle = `rgb(${lv},${Math.floor(lv*0.42)},8)`;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(angle);
      ctx.fillRect(0, 0, sw, 5 + rng(seed + 6.2) * 5);
      ctx.restore();
    }
  }

  // ── 둥지 바닥 경계선 ──
  ctx.fillStyle = '#8a5015';
  ctx.fillRect(ARENA_LEFT, FLOOR_Y - 3, ARENA_RIGHT - ARENA_LEFT, 5);

  // ── 불씨 파티클 (둥지에서 떠오름) ──
  for (let i = 0; i < 22; i++) {
    const baseX = ARENA_LEFT + 50 + rng(i * 11.3 + 4) * (ARENA_RIGHT - ARENA_LEFT - 100);
    const speed = 0.35 + rng(i * 7.9 + 4) * 0.55;
    const phase = (t * speed + rng(i * 3.17 + 4) * 10) % 9;
    const ey = FLOOR_Y - 8 - phase * 55;
    const drift = Math.sin(t * 1.1 + i * 1.9) * 14;
    if (ey > 20 && ey < FLOOR_Y) {
      const fade = Math.min(1, (FLOOR_Y - ey) / 210);
      const g = 55 + Math.floor(rng(i * 4.3 + 4) * 105);
      ctx.fillStyle = `rgba(255,${g},0,${fade * 0.85})`;
      ctx.fillRect(baseX + drift, ey, 3, 3);
      ctx.fillStyle = `rgba(255,${g},0,${fade * 0.12})`;
      ctx.fillRect(baseX + drift - 4, ey - 4, 11, 11);
    }
  }
}

// ══════════════════════════════════════════
//  배경 (바닷속 거대한 기포 — 곰치 아레나)
// ══════════════════════════════════════════
function drawCoralGroup(cx, baseY, scale) {
  const cols = ['#e91e63','#ff5722','#ff8a65','#f06292','#d81b60'];
  for (let i = 0; i < 5; i++) {
    const bx = cx + (i - 2) * 15 * scale;
    const h  = (26 + i * 7 + (i % 2) * 12) * scale;
    const w  = (5 + (i % 3) * 3) * scale;
    ctx.fillStyle = cols[i % cols.length];
    ctx.fillRect(bx - w / 2, baseY - h, w, h);
    ctx.beginPath(); ctx.arc(bx, baseY - h, w * 0.7, Math.PI, 0); ctx.fill();
    if (h > 26 * scale && i % 2 === 0) {
      ctx.fillRect(bx - w * 2.3, baseY - h * 0.4, w * 0.7, h * 0.4);
      ctx.beginPath(); ctx.arc(bx - w * 2.3, baseY - h * 0.4, w * 0.5, Math.PI, 0); ctx.fill();
    }
  }
}

function drawUnderwaterBubbleArena() {
  const t = Date.now() * 0.001;
  function rng(s) { const x = Math.sin(s * 127.1 + 311.7) * 43758.5; return x - Math.floor(x); }

  // 심해 배경
  const bg = ctx.createLinearGradient(0, 0, 0, 720);
  bg.addColorStop(0, '#000c18'); bg.addColorStop(1, '#001424');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 1280, 720);

  // 기포 내부 글로우
  const bG = ctx.createRadialGradient(640, 440, 55, 640, 440, 570);
  bG.addColorStop(0, 'rgba(0,100,145,0.42)'); bG.addColorStop(0.5, 'rgba(0,45,90,0.18)'); bG.addColorStop(1, 'rgba(0,10,22,0)');
  ctx.fillStyle = bG; ctx.fillRect(0, 0, 1280, 720);

  // 수면 코스틱 빛줄기
  ctx.save();
  for (let i = 0; i < 9; i++) {
    const rx = 130 + rng(i * 3.1) * 1020;
    const rw = 16 + rng(i * 5.7) * 52;
    const sh = 0.55 + 0.45 * Math.sin(t * (0.65 + rng(i * 2.3)) + i * 1.5);
    ctx.globalAlpha = 0.045 * sh;
    ctx.fillStyle = '#80d8ff';
    ctx.beginPath();
    ctx.moveTo(rx - rw, 0); ctx.lineTo(rx + rw, 0);
    ctx.lineTo(rx + rw * 2.3 + 28, FLOOR_Y); ctx.lineTo(rx - rw * 2.3 - 28, FLOOR_Y);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.restore();

  // 원거리 배경 물고기 떼
  ctx.fillStyle = 'rgba(0,28,52,0.5)';
  for (let i = 0; i < 7; i++) {
    const fx = ((i * 195 + t * (6 + rng(i * 2) * 5)) % 1500) - 110;
    const fy = 75 + rng(i * 4.1) * 330;
    for (let j = 0; j < 5; j++) ctx.fillRect(fx + j * 16, fy + Math.sin(t * 1.7 + j + i) * 7, 9, 5);
  }

  // 기포 윤곽선
  ctx.save();
  ctx.strokeStyle = 'rgba(55,175,215,0.20)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(640, 395, 598, Math.PI * 0.87, Math.PI * 0.13, false); ctx.stroke();
  ctx.strokeStyle = 'rgba(90,215,255,0.09)'; ctx.lineWidth = 11;
  ctx.beginPath(); ctx.arc(640, 395, 581, Math.PI * 0.88, Math.PI * 0.12, false); ctx.stroke();
  ctx.restore();

  // 좌측 기포 벽
  const lW = ctx.createLinearGradient(0, 0, 42, 0);
  lW.addColorStop(0, '#000408'); lW.addColorStop(1, 'rgba(0,10,22,0)');
  ctx.fillStyle = lW; ctx.fillRect(0, 0, 42, 720);

  // 우측 기포 벽 + 곰치 구멍
  const rW = ctx.createLinearGradient(1238, 0, 1280, 0);
  rW.addColorStop(0, 'rgba(0,7,16,0)'); rW.addColorStop(1, '#000204');
  ctx.fillStyle = rW; ctx.fillRect(1238, 0, 42, 720);
  const holeCY = EEL_BASE_Y;
  const hG2 = ctx.createRadialGradient(1252, holeCY, 6, 1252, holeCY, 108);
  hG2.addColorStop(0, 'rgba(0,0,6,0.97)'); hG2.addColorStop(0.65, 'rgba(0,5,16,0.58)'); hG2.addColorStop(1, 'rgba(0,10,22,0)');
  ctx.fillStyle = hG2;
  ctx.beginPath(); ctx.ellipse(1252, holeCY, 115, 152, 0, 0, Math.PI * 2); ctx.fill();
  ctx.save();
  ctx.strokeStyle = 'rgba(0,175,215,0.42)'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.ellipse(1252, holeCY, 102, 138, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // 해초 (좌측 밀집)
  const sCols = ['#1b5e20','#2e7d32','#388e3c','#1a6b3a'];
  for (let i = 0; i < 10; i++) {
    const sx = ARENA_LEFT + 8 + rng(i * 7.1) * 250;
    const sh2 = 55 + rng(i * 3.3) * 115;
    const sw2 = Math.sin(t * (0.65 + rng(i * 2.1)) + i * 1.5) * 15;
    ctx.strokeStyle = sCols[i % 4]; ctx.lineWidth = 5 + rng(i * 4.2) * 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sx, FLOOR_Y);
    for (let sg = 1; sg <= 5; sg++) {
      const f = sg / 5;
      ctx.lineTo(sx + sw2 * f + Math.sin(f * Math.PI * 2 + t) * 7 * f, FLOOR_Y - sh2 * f);
    }
    ctx.stroke();
  }
  for (let i = 0; i < 5; i++) {
    const sx = 1010 + rng(i * 8.1) * 170;
    const sh2 = 32 + rng(i * 4.3) * 60;
    const sw2 = Math.sin(t * (0.8 + rng(i * 3.1)) + i * 2.2) * 11;
    ctx.strokeStyle = '#1b5e20'; ctx.lineWidth = 4 + rng(i * 5.2) * 3;
    ctx.beginPath(); ctx.moveTo(sx, FLOOR_Y);
    ctx.quadraticCurveTo(sx + sw2, FLOOR_Y - sh2 * 0.5, sx + sw2 * 1.6, FLOOR_Y - sh2); ctx.stroke();
  }

  // 모래 바닥
  const flG = ctx.createLinearGradient(0, FLOOR_Y - 6, 0, 720);
  flG.addColorStop(0, '#7a5a25'); flG.addColorStop(0.25, '#6a4e1e'); flG.addColorStop(1, '#3a2808');
  ctx.fillStyle = flG; ctx.fillRect(0, FLOOR_Y, 1280, 720 - FLOOR_Y);
  ctx.strokeStyle = 'rgba(152,118,46,0.26)'; ctx.lineWidth = 1;
  for (let row = 0; row < 12; row++) {
    const sy = FLOOR_Y + 7 + row * 8;
    const amp = Math.max(0, 3.2 - row * 0.24);
    ctx.beginPath();
    for (let x2 = ARENA_LEFT; x2 <= ARENA_RIGHT; x2 += 6) {
      const y2 = sy + Math.sin(x2 * 0.047 + row * 0.88) * amp;
      x2 === ARENA_LEFT ? ctx.moveTo(x2, y2) : ctx.lineTo(x2, y2);
    }
    ctx.stroke();
  }

  // 산호
  drawCoralGroup(85,  FLOOR_Y, 1.0);
  drawCoralGroup(215, FLOOR_Y, 0.78);
  drawCoralGroup(568, FLOOR_Y, 0.55);
  drawCoralGroup(755, FLOOR_Y, 0.64);
  drawCoralGroup(1075, FLOOR_Y, 0.82);

  // 바닥 경계선
  ctx.fillStyle = '#9a7830'; ctx.fillRect(ARENA_LEFT, FLOOR_Y - 2, ARENA_RIGHT - ARENA_LEFT, 4);

  // 기포 (바닥에서 올라오는)
  for (let i = 0; i < 32; i++) {
    const bx2 = ARENA_LEFT + 22 + rng(i * 11.3) * (ARENA_RIGHT - ARENA_LEFT - 44);
    const spd = 0.42 + rng(i * 7.9) * 1.0;
    const phase = (t * spd + rng(i * 3.17) * 10) % 10;
    const by2 = FLOOR_Y - 8 - phase * 64;
    const br = 1.5 + rng(i * 4.3) * 5;
    if (by2 > 12 && by2 < FLOOR_Y) {
      const alpha = Math.min(1, (FLOOR_Y - by2) / 270) * 0.52;
      const drift = Math.sin(t * 0.85 + i * 1.4) * 13;
      ctx.strokeStyle = `rgba(70,195,255,${alpha})`; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.arc(bx2 + drift, by2, br, 0, Math.PI * 2); ctx.stroke();
    }
  }
}

  ctx.bezierCurveTo(130,FLOOR_Y-60,280,FLOOR_Y-100,460,FLOOR_Y-46);
  ctx.bezierCurveTo(620,FLOOR_Y-10,760,FLOOR_Y-92,940,FLOOR_Y-52);
  ctx.bezierCurveTo(1060,FLOOR_Y-14,1180,FLOOR_Y-74,1280,FLOOR_Y-32);
  ctx.lineTo(1280,FLOOR_Y); ctx.closePath(); ctx.fill();
  // 바닥 모래
  ctx.fillStyle='#d4a840'; ctx.fillRect(0,FLOOR_Y,1280,720-FLOOR_Y);
  // 모래 물결무늬
  ctx.strokeStyle='rgba(190,150,40,0.45)'; ctx.lineWidth=1.2;
  for(let i=0;i<8;i++){
