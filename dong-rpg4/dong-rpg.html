      boss.attackBox = null;
      player.magicEffects.push({ type: 'divine_wrath_fx', x: bx, y: by, life: 80, tick: 0 });
      spawnParticles(bx, by, '#fff59d', 60, 10, 50);
      spawnParticles(bx, by, '#fff', 30, 8, 36);
      screenFlash = { color: '#fff', alpha: 1.0 };
      screenShake = { power: 22, dur: 30 };
      sndBossHit();
      [523,784,1047,1568,2093].forEach((f,i)=>tone(f,'sine',i*0.03,0.4,0.4));
      tone(200,'square',0,0.8,0.5);
    }
  } else if (id === 'inferno') {
    if (!boss.dead) {
      boss.hp -= 12; boss.hitFlash = 18; boss.stagger = 20;
      player.magicEffects.push({ type: 'inferno_burn', x: bx, y: by, life: 960, tick: 0, dmgLeft: 16 });
      spawnParticles(bx, by, '#ff4000', 50, 9, 45);
      spawnParticles(bx, by, '#ffcc00', 20, 6, 30);
      screenFlash = { color: '#ff4000', alpha: 0.65 };
      screenShake = { power: 16, dur: 22 };
      sndBossHit(); sndDragonFire();
    }
  } else if (id === 'tsunami') {
    if (!boss.dead) {
      boss.hp -= 15; boss.hitFlash = 20; boss.stagger = 24;
      boss.slowDebuff = Math.max(boss.slowDebuff, 900);
      boss.patternTimer = Math.max(boss.patternTimer, 180);
      boss.attackBox = null; boss.laserProjectiles = []; boss.axeProjectiles = []; boss.dragonFireballs = [];
      player.magicEffects.push({ type: 'tsunami_fx', life: 180, tick: 0 });
      spawnParticles(bx, by, '#0288d1', 40, 8, 40);
      spawnParticles(bx, by, '#29b6f6', 20, 6, 25);
      screenFlash = { color: '#0288d1', alpha: 0.55 };
      screenShake = { power: 18, dur: 24 };
      sndBossHit();
      tone(60,'sine',0,1.2,0.8,30); tone(80,'sine',0.1,1.0,0.7,40); nz(0,0.6,0.4,120,'lowpass');
    }
  }
}

function updatePlayer(dt) {
  // 대시 트리거 (S 또는 아래 방향키)
  if ((justPressed['KeyS'] || justPressed['ArrowDown']) && player.dashCd <= 0) {
    player.dashDir = player.facing;
    player.dashDur = 14;
    player.dashCd = 52;
    spawnParticles(player.x + 20, player.y + 28, '#aaf', 8, 3, 12);
    sndDash();
  }

  // 이동
  let moving = false;
  if (player.dashDur > 0) {
    // 대시 중: 고속 수평 이동 + 잔상 파티클
    player.vx = player.dashDir * 13;
    moving = true;
    if (player.dashDur % 3 === 0) {
      spawnParticles(player.x + 20, player.y + 28, '#88f', 3, 1, 8);
    }
  } else if (keys['ArrowLeft'] || keys['KeyA'] || vBtn.left) { player.vx = -player.speed; player.facing = -1; moving = true; }
  else if (keys['ArrowRight'] || keys['KeyD'] || vBtn.right) { player.vx = player.speed; player.facing = 1; moving = true; }
  else player.vx *= 0.7;

  // 점프
  if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || vBtn.jump) && player.onGround) {
    player.vy = player.jumpPower;
    player.onGround = false;
    sndJump();
  }

  // 중력 (대시 중 무중력)
  if (player.dashDur > 0) {
    player.vy = 0;
  } else {
    player.vy += 0.7;
  }
  player.x += player.vx;
  player.y += player.vy;

  // 바닥/벽 충돌
  const wasInAir = !player.onGround;
  if (selectedBoss === 'sandworm') player.onGround = false;
  if (player.y + player.h >= FLOOR_Y) {
    player.y = FLOOR_Y - player.h; player.vy = 0;
    if (wasInAir && !player.onGround) sndLand();
    player.onGround = true;
  }
  if (selectedBoss === 'sandworm' && boss.swPlatform) {
    const pl = boss.swPlatform;
    if (player.vy >= 0 && player.x + player.w > pl.x + 4 && player.x < pl.x + pl.w - 4 &&
        player.y + player.h >= pl.y && player.y + player.h <= pl.y + pl.h + Math.abs(player.vy) + 2) {
      player.y = pl.y - player.h; player.vy = 0;
      if (wasInAir) sndLand();
      player.onGround = true;
    }
  }
  if (player.x < ARENA_LEFT) player.x = ARENA_LEFT;
  if (player.x + player.w > ARENA_RIGHT) player.x = ARENA_RIGHT - player.w;

  // 걷기 애니
  if (moving && player.onGround) {
    player.walkTimer++;
    if (player.walkTimer > 8) { player.walkTimer = 0; player.walkFrame++; }
  }

  // 공격
  if (!player.phoenixForm && mouse.leftJustPressed && player.attackCd <= 0 && player.parryDur <= 0) {
    const wep = weapons.find(w => w.id === selectedWeapon) || weapons[0];
    let dmg = player.berserker > 0 ? wep.bDmg : wep.dmg;
    if (player.thunderForm > 0) dmg *= 1.3;
    // 대시 공격: 창은 2배 데미지, dashAttacking 플래그 설정
    if (player.dashDur > 0) {
      player.dashAttacking = true;
      if (selectedWeapon === 'spear') dmg *= 2;
    }
    player.attackDur = wep.dur;
    player.attackCd = player.rageFrenzy > 0 ? Math.ceil(wep.cd / 2) : wep.cd;
    const aox = player.facing === 1 ? player.w : -wep.range;
    player.attackHitbox = { x: player.x + aox, y: player.y + 8, w: wep.range, h: 34, dmg, life: Math.max(5, wep.dur - 4) };
    sndAttack();
    const sparkX = player.x + (player.facing === 1 ? player.w + wep.range * 0.5 : -wep.range * 0.5);
    const sparkColor = selectedWeapon === 'flame_sword' ? '#ff6030' : '#ff8';
    spawnParticles(sparkX, player.y + 20, sparkColor, 6, 4, 12);
  }
  // 트라이던트 자동 2·3타 (클릭 1회 → 3연속 찌르기)
  if (!player.phoenixForm && selectedWeapon === 'trident' && player.tridentCombo > 0 && player.attackCd <= 0 && player.parryDur <= 0) {
    player.tridentCombo--;
    const wep = weapons.find(w => w.id === 'trident');
    let dmg = player.berserker > 0 ? wep.bDmg : wep.dmg;
    if (player.thunderForm > 0) dmg *= 1.3;
    player.attackDur = wep.dur;
    // 3타 후 긴 쿨타임으로 연속 콤보 방지
    player.attackCd = player.tridentCombo === 0 ? 36 : wep.cd;
    const aox = player.facing === 1 ? player.w : -wep.range;
    player.attackHitbox = { x: player.x + aox, y: player.y + 8, w: wep.range, h: 34, dmg, life: Math.max(5, wep.dur - 4) };
    sndAttack();
    const sparkX = player.x + (player.facing === 1 ? player.w + wep.range * 0.5 : -wep.range * 0.5);
    spawnParticles(sparkX, player.y + 20, '#80deea', 5, 4, 10);
  }

  // 패링 (우클릭)
  if (mouse.rightJustPressed && player.parryCd <= 0) {
    player.parryDur = 18;
    if (selectedArmor === 'armor_deep') player.parryDur += 8;
    player.parryActive = true;
    player.parryCd = player.tideActive > 0 ? 0 : 40;
    player.tridentCombo = 0;
  }

  // 치트: Shift+M → 앞에서 오는 공격 자동 패링 토글
  if (justPressed['KeyM'] && (keys['ShiftLeft'] || keys['ShiftRight'])) {
    cheatAutoParry = !cheatAutoParry;
  }
  // 치트: Shift+N → 아이템/활 무한 토글
  if (justPressed['KeyN'] && (keys['ShiftLeft'] || keys['ShiftRight'])) {
    cheatInfiniteItems = !cheatInfiniteItems;
  }
  // 치트: Shift+B → 체력 1칸 회복
  if (justPressed['KeyB'] && (keys['ShiftLeft'] || keys['ShiftRight'])) {
    player.hp = Math.min(player.maxHp, player.hp + 1);
    spawnParticles(player.x + 20, player.y, '#4f4', 12, 3, 30);
  }
  if (cheatInfiniteItems) {
    if (selectedItem && player.itemUses < 99) player.itemUses = 99;
    if (selectedBow && player.bowUses < 99) player.bowUses = 99;
  }

  // 아이템 (불사조 변신 중 차단)
  // E키: 나팔 사용
  if (!player.phoenixForm && justPressed['KeyE'] && player.itemUses > 0 && player.itemCd <= 0 && selectedItem) {
    player.itemUses--;
    player.itemCd = 30;
    if (selectedItem === 'invincible') { player.invincible = 180; }
    else if (selectedItem === 'heal') { player.hp = Math.min(player.maxHp, player.hp + 1); spawnParticles(player.x+20, player.y, '#4f4', 12, 3, 30); }
    else if (selectedItem === 'venom_horn') {
      player.magicEffects.push({ type: 'venom_cloud', life: 1200, tick: 0 });
      spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#80e040', 14, 4, 30);
      screenFlash = { color: '#80e040', alpha: 0.18 };
    }
    else if (selectedItem === 'iron_wall') { player.ironWall = 360; spawnParticles(player.x+20, player.y+28, '#b0c0d8', 16, 5, 28); screenFlash = { color: '#b0c0d8', alpha: 0.3 }; }
    else if (selectedItem === 'rage_horn') { player.rageFrenzy = 600; spawnParticles(player.x+20, player.y+28, '#ff5010', 18, 6, 32); screenFlash = { color: '#ff5010', alpha: 0.28 }; }
    else if (selectedItem === 'tide_horn') { player.tideActive = 1800; spawnParticles(player.x+20, player.y+28, '#00e5ff', 16, 5, 28); screenFlash = { color: '#00e5ff', alpha: 0.22 }; }
    sndItemUse(selectedItem);
  }

  // Q키: 활 사용
  if (!player.phoenixForm && keys['KeyQ'] && player.bowUses > 0 && player.bowCd <= 0 && selectedBow) {
    player.bowUses--;
    player.bowCd = selectedBow === 'bow_heavy' ? 26 : selectedBow === 'crossbow' ? 20 : 16;
    const sx = player.x + player.w/2, sy = player.y + player.h/2;
    const tx = boss.x + boss.w/2,     ty = boss.y + boss.h/2;
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const baseAngle = Math.atan2(dy, dx);
    if (selectedBow === 'bow_normal') {
      const spd = 15;
      player.arrows.push({ x:sx, y:sy, vx:dx/dist*spd, vy:dy/dist*spd, dmg:1,   stagger:8,  homing:false, homeStrength:0,    life:130, rot:baseAngle, stun:false });
    } else if (selectedBow === 'bow_heavy') {
      const spd = 11;
      player.arrows.push({ x:sx, y:sy, vx:dx/dist*spd, vy:dy/dist*spd, dmg:1,   stagger:16, homing:false, homeStrength:0,    life:140, rot:baseAngle, stun:false });
    } else if (selectedBow === 'bow_homing') {
      const spd = 5;
      for (let s = -1; s <= 1; s += 2) {
        player.arrows.push({ x:sx + s*10, y:sy, vx:s*1.5, vy:-spd, dmg:0.5, stagger:4, homing:true, homeStrength:0.20, life:99999, rot:-Math.PI/2, stun:false, age:0 });
      }
    } else if (selectedBow === 'crossbow') {
      const spd = 20;
      for (let s = -1; s <= 1; s++) {
        const a = baseAngle + s * 0.14;
        player.arrows.push({ x:sx, y:sy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, dmg:1.5, stagger:10, homing:false, homeStrength:0, life:44, rot:a, stun:false });
      }
    } else if (selectedBow === 'stun_flute') {
      const spd = 13;
      player.arrows.push({ x:sx, y:sy, vx:dx/dist*spd, vy:dy/dist*spd, dmg:0.2, stagger:4, homing:false, homeStrength:0, life:160, rot:baseAngle, stun:true });
    }
    sndBowFire(selectedBow);
  }

  // R키: 마법 사용
  if (!player.phoenixForm && justPressed['KeyR'] && player.magicCd <= 0 && selectedMagic) {
    const _mdef = magics.find(m => m.id === selectedMagic);
    player.magicCd = cheatInfiniteItems ? 10 : (_mdef ? _mdef.cooldown : 300);
    useMagic(selectedMagic);
  }

  // 마법 이펙트 업데이트
  for (let i = player.magicEffects.length - 1; i >= 0; i--) {
    const e = player.magicEffects[i];
    e.life--;
    e.tick = (e.tick || 0) + 1;

    if (e.type === 'fire_pillar') {
      if (e.tick % 5 === 0 && e.dmgLeft > 0) {
        if (rectsOverlap({ x: e.x - 300, y: 0, w: 600, h: 720 }, boss)) {
          boss.hp -= 1; boss.hitFlash = 8;
          e.dmgLeft--;
          spawnParticles(e.x, boss.y + boss.h / 2, '#f84', 8, 5, 16);
          sndBossHit();
        }
      }
      if (e.tick % 2 === 0) {
        spawnParticles(e.x + (Math.random() - 0.5) * 400, FLOOR_Y - 20 - Math.random() * 400, '#f' + (Math.random() > 0.5 ? '84' : 'f4'), 4, 6, 20);
        spawnParticles(e.x + (Math.random() - 0.5) * 200, FLOOR_Y - 60 - Math.random() * 560, '#ff8', 3, 5, 14);
      }
    } else if (e.type === 'ice_spear') {
      e.x += e.vx; e.y += e.vy;
      const sr = { x: e.x - 90, y: e.y - 50, w: 400, h: 100 };
      if (!e.hit && e.tick > 3 && rectsOverlap(sr, boss)) {
        boss.hp -= 20; boss.hitFlash = 18; boss.stagger = 30;
        boss.slowDebuff = Math.max(boss.slowDebuff, 1800);
        spawnParticles(e.x, e.y, '#8cf', 40, 8, 36);
        spawnParticles(e.x, e.y, '#fff', 20, 6, 24);
        screenShake = { power: 14, dur: 20 };
        sndBossHit();
        e.hit = true; e.life = 0;
      }
      if (e.x > 1400 || e.x < -200) e.life = 0;
    } else if (e.type === 'lightning') {
      e.x += e.vx; e.y += e.vy;
      const lr = { x: e.x - 60, y: e.y - 200, w: 120, h: 400 };
      // tick > 5: 시작 위치에서 즉시 히트 방지
      if (!e.hit && e.tick > 5 && rectsOverlap(lr, boss)) {
        boss.hp -= 30; boss.hitFlash = 20; boss.stagger = 30;
        spawnParticles(e.x, e.y, '#ff4', 40, 8, 40);
        spawnParticles(e.x, e.y, '#fff', 20, 6, 26);
        screenFlash = { color: '#ff8', alpha: 0.6 };
        screenShake = { power: 18, dur: 26 };
        sndBossHit();
        e.hit = true; e.life = 0;
      }
      if (e.y > FLOOR_Y + 200) e.life = 0;
    } else if (e.type === 'holy_orb') {
      // 유도: 활 유도와 동일한 방식 / 5초(300틱) 경과 시 직선 고속 발사
      if (!boss.dead) {
        const tx = boss.x + boss.w / 2, ty = boss.y + boss.h / 2;
        const dx = tx - e.x, dy = ty - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        if (e.tick >= 300) {
          e.vx = dx/dist * 22; e.vy = dy/dist * 22;
        } else {
          e.vx += (dx / dist) * 0.18;
          e.vy += (dy / dist) * 0.18;
          const spd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
          if (spd > 10) { e.vx = e.vx/spd*10; e.vy = e.vy/spd*10; }
        }
      }
      e.x += e.vx; e.y += e.vy;
      const or = { x: e.x - 40, y: e.y - 40, w: 80, h: 80 };
      if (!e.hit && rectsOverlap(or, boss)) {
        boss.hp -= 1; boss.hitFlash = 6;
        spawnParticles(e.x, e.y, '#ffd', 8, 4, 12);
        sndBossHit();
        e.hit = true; e.life = 0;
      }
      if (boss.dead) e.life = 0;
    } else if (e.type === 'black_hole') {
      // 10초간 보스 공격 흡수, 매 60틱마다 2데미지×10회
      boss.attackBox = null;
      boss.dragonFireballs = [];
      boss.laserProjectiles = [];
      boss.axeProjectiles = [];
      if (e.tick % 60 === 0 && e.dmgLeft > 0) {
        boss.hp -= 2; boss.hitFlash = 12;
        e.dmgLeft--;
        spawnParticles(e.x, e.y, '#a6f', 10, 5, 20);
        spawnParticles(e.x, e.y, '#000', 6, 3, 14);
        sndBossHit();
      }
    } else if (e.type === 'ice_arrow_orb') {
      // 유도: 보스 추적 / 5초(300틱) 경과 시 직선 고속 발사
      if (!boss.dead) {
        const tx = boss.x + boss.w/2, ty = boss.y + boss.h/2;
        const dx = tx - e.x, dy = ty - e.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
        if (e.tick >= 300) {
          e.vx = dx/dist * 22; e.vy = dy/dist * 22;
        } else {
          e.vx += (dx/dist) * 0.22;
          e.vy += (dy/dist) * 0.22;
          const spd = Math.sqrt(e.vx*e.vx+e.vy*e.vy);
          if (spd > 11) { e.vx = e.vx/spd*11; e.vy = e.vy/spd*11; }
        }
      }
      e.x += e.vx; e.y += e.vy;
      const ir = { x: e.x-16, y: e.y-16, w: 32, h: 32 };
      if (!e.hit && rectsOverlap(ir, boss)) {
        boss.hp -= 0.5; boss.hitFlash = 5;
        boss.slowDebuff = Math.max(boss.slowDebuff, 180);
        spawnParticles(e.x, e.y, '#9df', 4, 3, 10);
        sndBossHit();
        e.hit = true; e.life = 0;
      }
      if (boss.dead) e.life = 0;
    } else if (e.type === 'dark_bomb_fx') {
      if (e.tick % 3 === 0) spawnParticles(e.x + (Math.random()-0.5)*120, e.y + (Math.random()-0.5)*120, '#86f', 4, 5, 18);
    } else if (e.type === 'venom_cloud') {
      if (e.tick % 60 === 0 && !boss.dead) {
        boss.hp -= 0.5; boss.hitFlash = 4;
        spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#80e040', 5, 3, 14);
        sndBossHit();
      }
    } else if (e.type === 'inferno_burn') {
      if (e.tick % 60 === 0 && e.dmgLeft > 0 && !boss.dead) {
        boss.hp -= 1; boss.hitFlash = 6; e.dmgLeft--;
        spawnParticles(e.x+(Math.random()-0.5)*80, e.y+(Math.random()-0.5)*80, '#ff4000', 6, 4, 18);
        sndBossHit();
      }
      if (e.tick % 4 === 0) spawnParticles(e.x+(Math.random()-0.5)*100, e.y-Math.random()*80, '#ff6020', 3, 4, 14);
    } else if (e.type === 'sand_burial_fx') {
      if (e.tick % 3 === 0) spawnParticles(e.x+(Math.random()-0.5)*100, e.y+(Math.random()-0.5)*100, '#d4a030', 3, 5, 16);
    } else if (e.type === 'divine_wrath_fx') {
      if (e.tick % 2 === 0) spawnParticles(e.x+(Math.random()-0.5)*160, e.y+(Math.random()-0.5)*160, Math.random()<0.5?'#fff59d':'#fff', 2, 5, 18);
    } else if (e.type === 'tsunami_fx') {
      if (!boss.dead) {
        boss.slowDebuff = Math.max(boss.slowDebuff, 1); // 이동 봉쇄 유지
        if (e.tick % 3 === 0) spawnParticles(boss.x + boss.w/2 + (Math.random()-0.5)*80, boss.y + boss.h/2, '#29b6f6', 3, 4, 14);
      }
    }

    if (e.life <= 0) player.magicEffects.splice(i, 1);
  }

  // 불사조/뇌신 타이머
  if (player.phoenixForm > 0) {
    player.phoenixForm--;
    player.parryActive = true; // 자동 패링
    if (player.phoenixForm === 0) spawnParticles(player.x + 20, player.y + 28, '#f84', 20, 6, 30);
  }
  if (player.thunderForm > 0) {
    player.thunderForm--;
    if (player.thunderForm === 0) {
      player.maxHp = Math.max(1, player.maxHp - 1);
      player.hp = Math.min(player.hp, player.maxHp);
      player.speed = 4;
      spawnParticles(player.x + 20, player.y + 28, '#aff', 16, 5, 25);
    }
  }

  // 타이머
  if (player.attackCd > 0) player.attackCd--;
  // 대시 공격 중: 히트박스를 플레이어 위치에 따라 갱신, 대시 끝나면 공격 종료
  if (player.dashAttacking) {
    if (player.dashDur > 0 && player.attackHitbox) {
      const wep = weapons.find(w => w.id === selectedWeapon) || weapons[0];
      const aox = player.facing === 1 ? player.w : -wep.range;
      player.attackHitbox.x = player.x + aox;
      player.attackHitbox.y = player.y + 8;
      player.attackDur = Math.max(player.attackDur, 1); // 애니메이션 유지
    } else {
      player.dashAttacking = false;
      player.attackHitbox = null;
      player.attackDur = 0;
    }
  } else {
    if (player.attackDur > 0) player.attackDur--;
    else player.attackHitbox = null;
  }
  if (player.parryCd > 0) player.parryCd--;
  if (player.parryDur > 0) { player.parryDur--; if (player.parryDur <= 0) player.parryActive = false; }
  if (player.hitFlash > 0) player.hitFlash--;
  if (player.invincible > 0) player.invincible--;
  if (player.dashDur > 0) player.dashDur--;
  if (player.dashCd > 0) player.dashCd--;
  if (player.ironWall > 0) player.ironWall--;
  if (player.rageFrenzy > 0) player.rageFrenzy--;
  if (player.tideActive > 0) player.tideActive--;
  if (player.itemCd > 0) player.itemCd--;
  if (player.bowCd > 0) player.bowCd--;
  if (boss.slowDebuff > 0) { boss.slowDebuff--; boss.slowSkip = !boss.slowSkip; } else { boss.slowSkip = false; }
  if (boss.stunned > 0) boss.stunned--;
}

function updateBoss(dt) {
  if (boss.vulnerable > 0) boss.vulnerable--;
  if (selectedBoss === 'dragon') { updateDragonBoss(dt); return; }
  if (selectedBoss === 'eel')    { if (boss.eel2Active) { updateEelP2(); } else { updateEelBoss(dt); } return; }
  if (selectedBoss === 'sandworm') { updateSandWormBoss(dt); return; }
  if (boss.phase2Active) { updatePhase2Transition(); return; }
  if (boss.stagger > 0) { boss.stagger--; return; }
  if (boss.stunned > 0) return;

  // AI 패턴 선택
  if (!boss.slowSkip) boss.patternTimer--;
  boss.animTimer++;
  if (boss.animTimer > 15) { boss.animTimer = 0; boss.animFrame++; }

  const dx = player.x - boss.x;
  if (dx !== 0) boss.facing = dx > 0 ? 1 : -1;

  // 이동 (충전 중이 아닐 때)
  if (!boss.charging && boss.pattern !== 'swing' && boss.pattern !== 'shockwave' && boss.pattern !== 'throw' && boss.pattern !== 'barrage_windup' && boss.pattern !== 'barrage' && boss.pattern !== 'combo_approach' && boss.pattern !== 'p2_dash' && boss.pattern !== 'p2_dash_swing' && boss.pattern !== 'p2_float_laser') {
    const spd = easyMode ? 0.65 : 1;
    if (Math.abs(dx) > 200) {
      boss.vx = boss.facing * 1.8 * spd;
    } else if (Math.abs(dx) > 80) {
      boss.vx = boss.facing * 1.0 * spd;
    } else {
      boss.vx *= 0.6;
    }
  }

  // 중력 (공중 부양 패턴 제외)
  if (boss.pattern === 'p2_float_laser') {
    boss.vy = 0;
  } else {
    boss.vy += 0.7;
  }
  boss.x += boss.vx;
  boss.y += boss.vy;
  if (boss.y + boss.h >= FLOOR_Y) { boss.y = FLOOR_Y - boss.h; boss.vy = 0; boss.onGround = true; }
  if (boss.x < ARENA_LEFT + 20) boss.x = ARENA_LEFT + 20;
  if (boss.x + boss.w > ARENA_RIGHT - 20) boss.x = ARENA_RIGHT - 20 - boss.w;

  if (boss.patternTimer <= 0) {
    const roll = Math.random();
    if (boss.isPhase2) {
      if (roll < 0.25) startP2Dash();
      else if (roll < 0.62) startP2TriWave();
      else startP2FloatLaser();
    } else {
      if (roll < 0.33) startBossSwing();
      else if (roll < 0.60) startBossShockwave();
      else if (roll < 0.73) startBossCombo();
      else startBossBarrage();
    }
  }

  // 패턴 실행
  if (boss.pattern === 'swing') {
    boss.phaseTimer--;
    if (boss.phaseTimer === 10) {
      // 도끼 휘두르기 히트박스
      const aox = boss.facing === 1 ? boss.w : -50;
      boss.attackBox = { x: boss.x + aox, y: boss.y + 10, w: 60, h: 50, life: 10, type: 'melee' };
    }
    if (boss.phaseTimer <= 0) endBossPattern(90 + Math.random() * 60);
  }
  if (boss.pattern === 'swing2') { // 충격파 패턴의 전조
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) {
      boss.pattern = 'shockwave';
      boss.phaseTimer = 20;
      const sw = { x: boss.x + (boss.facing === 1 ? boss.w : -14), y: FLOOR_Y, vx: boss.facing * 5, w: 14, h: 20, alpha: 1, life: 200 };
      boss.shockwaves.push(sw);
      spawnParticles(sw.x, FLOOR_Y - 10, '#fa0', 8, 3, 20);
      sndShockwave();
    }
  }
  if (boss.pattern === 'shockwave') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) endBossPattern(80 + Math.random() * 60);
  }
  if (boss.pattern === 'combo_approach') {
    // 맵 중앙(x=610)으로 이동 후 콤보 시전
    const centerX = 610;
    const dx = centerX - boss.x;
    boss.vx = Math.sign(dx) * 3.5;
    boss.facing = player.x < boss.x ? -1 : 1;
    boss.phaseTimer--;
    if (Math.abs(dx) < 18 || boss.phaseTimer <= 0) {
      boss.vx = 0;
      boss.pattern = 'throw';
      boss.phaseTimer = 50;
    }
  }
  if (boss.pattern === 'throw') {
    boss.phaseTimer--;
    if (boss.phaseTimer === 30) {
      // 도끼 투척
      const ax = { x: boss.x + (boss.facing === 1 ? boss.w : 0), y: boss.y + 10,
        vx: boss.facing * 7, vy: -3, rot: 0, life: 120, type: 'axe' };
      boss.axeProjectiles.push(ax);
      spawnParticles(ax.x, ax.y, '#DAA520', 8, 3, 20);
      sndBossAxeThrow();
    }
    if (boss.phaseTimer <= 0) {
      // 도끼 위치로 돌진 (도끼를 집어들므로 투사체 제거)
      boss.axeProjectiles = [];
      boss.charging = true;
      boss.pattern = 'charge';
      boss.phaseTimer = 40;
    }
  }
  if (boss.pattern === 'charge') {
    boss.vx = boss.facing * 9;
    boss.phaseTimer--;
    if (boss.phaseTimer === 38) sndBossCharge();
    if (boss.phaseTimer <= 0) {
      boss.charging = false;
      boss.vx = 0;
      const sw = { x: boss.x + (boss.facing === 1 ? boss.w : -14), y: FLOOR_Y,
        vx: boss.facing * 6, w: 16, h: 24, alpha: 1, life: 180 };
      boss.shockwaves.push(sw);
      spawnParticles(boss.x + 30, FLOOR_Y - 12, '#fa0', 12, 4, 25);
      sndShockwave();
      endBossPattern(100 + Math.random() * 60);
    }
  }

  // 배리지 패턴
  if (boss.pattern === 'barrage_windup') {
    boss.phaseTimer--;
    // 차징 파티클
    if (boss.phaseTimer % 8 === 0) {
      spawnParticles(boss.x + 30, boss.y - 20, '#f80', 5, 3, 18);
      spawnParticles(boss.x + 30, boss.y - 20, '#ff4', 3, 2, 14);
    }
    if (boss.phaseTimer <= 0) {
      boss.pattern = 'barrage';
      boss.phaseTimer = 48;
      boss.phase = 0;
    }
  }
  if (boss.pattern === 'barrage') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) {
      // 충격파 1개 발사 (높이 300 - 점프 회피 불가)
      const sw = {
        x: boss.x + (boss.facing === 1 ? boss.w : -18),
        y: FLOOR_Y, vx: boss.facing * 5,
        w: 18, h: 300, alpha: 1, life: 280,
        type: 'barrage'
      };
      boss.shockwaves.push(sw);
      spawnParticles(boss.x + 30, FLOOR_Y - 140, '#f40', 12, 5, 28);
      screenFlash = { color: '#f40', alpha: 0.18 };
      sndBossBarrageFire();
      boss.phase++;
      if (boss.phase >= 6) {
        endBossPattern(140 + Math.random() * 80);
      } else {
        boss.phaseTimer = 48;
      }
    }
  }

  // ─── 2페이즈 패턴 실행 ───
  if (boss.pattern === 'p2_dash') {
    const dx = (player.x + player.w/2) - (boss.x + boss.w/2);
    boss.facing = dx > 0 ? 1 : -1;
    boss.vx = boss.facing * 10;
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0 || Math.abs(dx) < 80) {
      boss.vx = 0;
      boss.pattern = 'p2_dash_swing';
      boss.phaseTimer = 28;
      const aox = boss.facing === 1 ? boss.w : -65;
      boss.attackBox = { x: boss.x + aox, y: boss.y - 4, w: 65, h: boss.h + 8, life: 14, type: 'melee' };
      screenShake = { power: 4, dur: 7 };
      spawnParticles(boss.x + 30 + boss.facing * 40, boss.y + 30, '#f80', 10, 5, 18);
    }
  }
  if (boss.pattern === 'p2_dash_swing') {
    boss.phaseTimer--;
    if (boss.attackBox) { boss.attackBox.life--; if (boss.attackBox.life <= 0) boss.attackBox = null; }
    if (boss.phaseTimer <= 0) endBossPattern(100 + Math.random() * 55);
  }

  if (boss.pattern === 'p2_triwave_windup') {
    boss.phaseTimer--;
    if (boss.phaseTimer % 6 === 0) spawnParticles(boss.x + 30, boss.y + 20, '#f44', 5, 3, 16);
    if (boss.phaseTimer <= 0) { boss.pattern = 'p2_triwave'; boss.phaseTimer = 52; boss.phase = 0; }
  }
  if (boss.pattern === 'p2_triwave') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) {
      boss.phase++;
      const dir = boss.facing;
      const ox = boss.x + (dir === 1 ? boss.w : -18);
      [28, 120, 200].forEach(h => {
        boss.shockwaves.push({ x: ox, y: FLOOR_Y, vx: dir * 5, w: 18, h, alpha: 1, life: 200 });
      });
      spawnParticles(boss.x + 30, FLOOR_Y - 70, '#f44', 14, 5, 24);
      screenFlash = { color: '#f00', alpha: 0.15 };
      sndShockwave();
      if (boss.phase >= 2) endBossPattern(110 + Math.random() * 55);
      else boss.phaseTimer = 52;
    }
  }

  if (boss.pattern === 'p2_float_laser') {
    if (boss.phase === 0) {
      boss.x += (590 - boss.w/2 - boss.x) * 0.055;
      boss.y += (210 - boss.y) * 0.055;
      boss.phaseTimer--;
      if (boss.phaseTimer % 8 === 0) spawnParticles(boss.x + 30, boss.y + boss.h, '#DAA520', 4, 2, 28);
      if (boss.phaseTimer <= 0) { boss.phase = 1; boss.phaseTimer = 75; }
    } else {
      boss.phaseTimer--;
      if (boss.phaseTimer <= 0 && boss.phase <= 2) {
        const dx = (player.x + player.w/2) - (boss.x + boss.w/2);
        const dy = (player.y + player.h/2) - (boss.y + boss.h/2);
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        boss.laserProjectiles.push({
          x: boss.x + boss.w/2, y: boss.y + boss.h/2,
          vx: (dx/dist) * 3.2, vy: (dy/dist) * 3.2,
          homeStrength: 0.04, life: 180, rot: Math.atan2(dy, dx)
        });
        spawnParticles(boss.x + 30, boss.y + 42, '#f44', 10, 5, 20);
        screenFlash = { color: '#f00', alpha: 0.1 };
        sndLaserFire();
        boss.phase++;
        if (boss.phase > 2) {
          endBossPattern(120 + Math.random() * 55);
        } else {
          boss.phaseTimer = 75;
        }
      }
    }
  }

  if (boss.attackBox) {
    boss.attackBox.life--;
    if (boss.attackBox.life <= 0) boss.attackBox = null;
  }
  if (boss.hitFlash > 0) boss.hitFlash--;
}

function startBossSwing() {
  boss.pattern = 'swing';
  boss.phaseTimer = 40;
  boss.patternTimer = 99999;
  sndBossSwing();
}
function startBossShockwave() {
  boss.pattern = 'swing2';
  boss.phaseTimer = 30;
  boss.patternTimer = 99999;
  sndBossSwing();
}
function startBossCombo() {
  boss.pattern = 'combo_approach';
  boss.phaseTimer = 150;
  boss.patternTimer = 99999;
}
function startBossBarrage() {
  boss.pattern = 'barrage_windup';
  boss.phaseTimer = 55;
  boss.phase = 0;
  boss.patternTimer = 99999;
  sndBossBarrage();
}
function endBossPattern(nextTimer) {
  boss.pattern = 'idle';
  boss.patternTimer = easyMode ? nextTimer + 70 : nextTimer;
  boss.attackBox = null;
  boss.charging = false;
  boss.vx = 0;
}
// ══════════════════════════════════════════
//  드래곤 보스 AI
// ══════════════════════════════════════════
const BITE_WARN_TIMES = [45, 45, 45, 45];
const BITE_GAPS      = [45, 45, 45, 45];

// ══════════════════════════════════════════
//  심해 곰치 보스 업데이트
// ══════════════════════════════════════════
function endEelPattern(idleTime) {
  boss.pattern = 'idle'; boss.patternTimer = idleTime;
  boss.eelBiteOffset = 0; boss.eelBiteAngle = Math.PI; boss.eelBiteHit = false; boss.attackBox = null;
}
function startEelBite() {
  const px = player.x + player.w / 2;
  const py = player.y + player.h / 2;
  const dist = Math.hypot(px - EEL_BASE_X, py - EEL_BASE_Y);
  const sinA = dist > 1 ? Math.max(-0.45, Math.min(0.45, (py - EEL_BASE_Y) / dist)) : 0;
  boss.eelBiteAngle = Math.atan2(sinA, -Math.sqrt(1 - sinA * sinA));
  boss.pattern = 'eel_bite'; boss.phaseTimer = 110; sndEelBite();
}
function startEelSwordfish() {
  boss.pattern = 'eel_swordfish_windup'; boss.phaseTimer = 34;
}
function startEelFishSwarm() {
  boss.pattern = 'eel_fish_swarm'; boss.phaseTimer = 28;
}
function startEelStingray() {
  boss.pattern = 'eel_stingray_windup'; boss.phaseTimer = 30;
}
function startEelWhaleWarn() {
  boss.pattern = 'eel_whale_warn'; boss.phaseTimer = 75;
  boss.eelWhale = { phase:'warn', timer:75, x: ARENA_RIGHT + 130, vx:0,
    width: 680, height: easyMode ? 110 : 155 };
  sndEelWhaleWarn();
}

function updateEelBoss(dt) {
  if (boss.stagger > 0) { boss.stagger--; return; }
  if (boss.stunned > 0) return;

  boss.animTimer++; if (boss.animTimer > 9) { boss.animTimer = 0; boss.animFrame++; }

  // 히트박스를 머리 위치에 맞게 갱신
  boss.x = EEL_BASE_X + Math.cos(boss.eelBiteAngle) * boss.eelBiteOffset - 62;
  boss.y = EEL_BASE_Y + Math.sin(boss.eelBiteAngle) * boss.eelBiteOffset - 36;
  boss.w = 124; boss.h = 95;

  if (!boss.slowSkip) boss.patternTimer--;

  // ── 패턴 선택 ──
  if (boss.patternTimer <= 0 && boss.pattern === 'idle') {
    const aggro = hardMode && boss.hp < boss.maxHp * 0.5;
    const roll = Math.random();
    if      (roll < (aggro ? 0.26 : 0.28)) startEelBite();
    else if (roll < (aggro ? 0.48 : 0.52)) startEelSwordfish();
    else if (roll < (aggro ? 0.70 : 0.72)) startEelFishSwarm();
    else if (roll < (aggro ? 0.87 : 0.90)) startEelStingray();
    else startEelWhaleWarn();
  }

  // ── 긴 물기 ──
  if (boss.pattern === 'eel_bite') {
    boss.phaseTimer--;
    const elapsed = 110 - boss.phaseTimer;
    if (elapsed < 22) {
      boss.eelBiteOffset = elapsed * 10; // 천천히 예비 동작
    } else if (elapsed < 60) {
      const f = (elapsed - 22) / 38;
      boss.eelBiteOffset = 220 + f * 530; // 빠르게 뻗음 → 750px
    } else if (elapsed < 78) {
      boss.eelBiteOffset = 750; // 최대 유지
    } else {
      const f = (elapsed - 78) / 32;
      boss.eelBiteOffset = 750 * (1 - f); // 수축
    }
    boss.eelBiteOffset = Math.max(0, Math.min(750, boss.eelBiteOffset));
    if (elapsed >= 20 && elapsed < 80) {
      if (boss.attackBox) { // 위치만 갱신
        boss.attackBox.x = boss.x; boss.attackBox.y = boss.y;
        boss.attackBox.w = boss.w; boss.attackBox.h = boss.h;
      } else if (!boss.eelBiteHit) { // 아직 안 맞았으면 한 번만 생성
        boss.attackBox = { x: boss.x, y: boss.y, w: boss.w, h: boss.h, type: 'eel_bite' };
      }
    } else {
      boss.attackBox = null;
    }
    if (boss.phaseTimer <= 0) endEelPattern(easyMode ? 115 : (aggro() ? 62 : 78));
  }

  // ── 청새치 ──
  if (boss.pattern === 'eel_swordfish_windup') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) {
      const hX = EEL_BASE_X - 80, hY = EEL_BASE_Y;
      const tx = player.x + player.w / 2, ty = player.y + player.h / 2;
      const dx = tx - hX, dy = ty - hY, dist = Math.sqrt(dx*dx+dy*dy)||1;
      const spd = 14, baseAng = Math.atan2(dy, dx), spread = 0.28;
      for (let si = -1; si <= 1; si++) {
        const ang = baseAng + si * spread;
        boss.eelProjectiles.push({ type:'swordfish', x:hX, y:hY,
          vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, r:22, rot:ang, life:240 });
      }
      sndEelSwordfish();
      boss.pattern = 'eel_swordfish_active'; boss.phaseTimer = 55;
    }
  }
  if (boss.pattern === 'eel_swordfish_active') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) endEelPattern(easyMode ? 100 : (aggro() ? 65 : 78));
  }

  // ── 유도 물고기 떼 ──
  if (boss.pattern === 'eel_fish_swarm') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) {
      const hX = EEL_BASE_X - 78, hY = EEL_BASE_Y;
      for (let fi = 0; fi < 7; fi++) {
        boss.eelProjectiles.push({ type:'fish',
          x: hX + (Math.random()-0.5)*24, y: hY + (Math.random()-0.5)*24,
          vx: -3+(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
          r:15, rot:Math.PI, life:500, homeDelay:fi*8 });
      }
      sndEelFishSwarm();
      boss.pattern = 'eel_fish_active'; boss.phaseTimer = 95;
    }
  }
  if (boss.pattern === 'eel_fish_active') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) endEelPattern(easyMode ? 110 : (aggro() ? 70 : 82));
  }

  // ── 가오리 (부메랑) ──
  if (boss.pattern === 'eel_stingray_windup') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) {
      const hX = EEL_BASE_X - 62, hY = EEL_BASE_Y;
      const dx = player.x + 20 - hX, dy = player.y + player.h/2 - hY;
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      const spd = 12;
      boss.eelProjectiles.push({ type:'stingray', x:hX, y:hY,
        vx:dx/dist*spd, vy:dy/dist*spd*0.45, r:30, rot:Math.atan2(dy,dx),
        bounced:false, life:420 });
      boss.eelProjectiles.push({ type:'stingray', x:hX, y:hY,
        vx:dx/dist*spd, vy:dy/dist*spd*0.45 - 3.5, r:30, rot:Math.atan2(dy - 3.5*dist/spd, dx),
        bounced:false, life:420 });
      sndEelStingray();
      boss.pattern = 'eel_stingray_active'; boss.phaseTimer = 130;
    }
  }
  if (boss.pattern === 'eel_stingray_active') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) endEelPattern(easyMode ? 100 : (aggro() ? 72 : 85));
  }

  // ── 고래 경고 ──
  if (boss.pattern === 'eel_whale_warn') {
    boss.phaseTimer--;
    if (boss.eelWhale) boss.eelWhale.timer = boss.phaseTimer;
    if (boss.phaseTimer <= 0) {
      boss.pattern = 'eel_whale_active'; boss.phaseTimer = 160;
      if (boss.eelWhale) { boss.eelWhale.phase = 'charge'; boss.eelWhale.vx = -20; }
      sndEelWhale();
    }
  }
  if (boss.pattern === 'eel_whale_active') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0 || !boss.eelWhale) endEelPattern(easyMode ? 170 : (aggro() ? 110 : 130));
  }

  // ── 투사체 업데이트 ──
  for (let i = boss.eelProjectiles.length - 1; i >= 0; i--) {
    const p = boss.eelProjectiles[i];
    p.life--;
    if (p.type === 'swordfish') {
      p.x += p.vx; p.y += p.vy;
      if (p.x < ARENA_LEFT-90 || p.x > ARENA_RIGHT+90 || p.y < -120 || p.y > 820) p.life = 0;
    } else if (p.type === 'fish') {
      if (!boss.dead) {
        const tx = player.x+player.w/2, ty = player.y+player.h/2;
        const dx2 = tx-p.x, dy2 = ty-p.y, dist2 = Math.sqrt(dx2*dx2+dy2*dy2)||1;
        const str = (p.homeDelay > 0) ? (p.homeDelay -= 0.5, 0) : 0.30;
        p.vx += dx2/dist2*str; p.vy += dy2/dist2*str;
        const spd2 = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
        if (spd2 > 7.0) { p.vx = p.vx/spd2*7.0; p.vy = p.vy/spd2*7.0; }
      }
      p.rot = Math.atan2(p.vy, p.vx);
      p.x += p.vx; p.y += p.vy;
      if (p.x < ARENA_LEFT-90 || p.x > ARENA_RIGHT+90) p.life = 0;
    } else if (p.type === 'stingray') {
      p.x += p.vx; p.y += p.vy;
      if (!p.bounced && p.x < ARENA_LEFT + 55) {
        p.vx = Math.abs(p.vx); p.vy = -p.vy * 0.55; p.bounced = true;
        spawnParticles(p.x, p.y, '#78909c', 7, 3, 22);
      }
      if (p.bounced && p.x > ARENA_RIGHT + 130) p.life = 0;
      p.rot = Math.atan2(p.vy, p.vx);
    }
    if (p.life <= 0) boss.eelProjectiles.splice(i, 1);
  }

  // ── 고래 업데이트 ──
  if (boss.eelWhale && boss.eelWhale.phase === 'charge') {
    boss.eelWhale.x += boss.eelWhale.vx;
    if (boss.eelWhale.x + boss.eelWhale.width < ARENA_LEFT - 100) boss.eelWhale = null;
  }
}
function aggro() { return hardMode && boss.hp < boss.maxHp * 0.5; }

// ══════════════════════════════════════════
//  샌드 웜 보스 업데이트
// ══════════════════════════════════════════
function updateSandWormPhase2(dt) {
  if (boss.stagger > 0) { boss.stagger--; return; }
  if (boss.hitFlash > 0) boss.hitFlash--;
  if (!boss.slowSkip) boss.patternTimer--;
  const p = boss.pattern;
  const HX = 640, HY = FLOOR_Y - 220;

  if (p === 'sw2_enter') {
    boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
    if (boss.patternTimer <= 0) {
      boss.pattern = 'sw2_idle'; boss.patternTimer = 30;
      spawnParticles(HX, FLOOR_Y - 80, '#d4a030', 20, 5, 35);
      screenShake = { power: 18, dur: 25 };
    }
  }

  if (p === 'sw2_idle') {
    boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
    if (boss.patternTimer <= 0) {
      const r = Math.random();
      if (r < 0.34) {
        boss.pattern = 'sw2_scatter'; boss.patternTimer = 130; boss.sw2ScatterTimer = 0;
      } else if (r < 0.67) {
        boss.sw2TailWarnXs = [
          ARENA_LEFT + 80 + Math.floor(Math.random() * 320),
          400 + Math.floor(Math.random() * 320),
          ARENA_RIGHT - 400 + Math.floor(Math.random() * 320)
        ];
        boss.pattern = 'sw2_tails_warn'; boss.patternTimer = 85;
        sndSwWarn();
      } else {
        boss.pattern = 'sw2_beam_warn'; boss.patternTimer = 75;
        boss.sw2Beam = null;
        sndSwWarn();
      }
    }
  }

  if (p === 'sw2_scatter') {
    boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
    boss.sw2ScatterTimer++;
    if (boss.sw2ScatterTimer % 10 === 0) {
      const tX = player.x + player.w / 2, tY = player.y + player.h / 2;
      const baseAng = Math.atan2(tY - HY, tX - (HX - 160));
      const ang = baseAng + (Math.random() - 0.5) * Math.PI * 1.2;
      const spd = 2.5 + Math.random() * 2.5;
      boss.swSandProj.push({ x: HX - 160, y: HY, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, r: 14, life: 300, phase: Math.random() * Math.PI * 2 });
      sndSwFire();
    }
    if (boss.patternTimer <= 0) { boss.pattern = 'sw2_idle'; boss.patternTimer = 25; }
  }

  if (p === 'sw2_tails_warn') {
    boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
    if (boss.patternTimer <= 0) {
      boss.pattern = 'sw2_tails'; boss.patternTimer = 230;
      boss.sw2Tails = boss.sw2TailWarnXs.map(x => ({ x, prog: 0, phase: 'rise', timer: 0, active: false }));
    }
  }

  if (p === 'sw2_tails') {
    boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
    for (const tail of boss.sw2Tails) {
      tail.timer++;
      if (tail.phase === 'rise') {
        tail.prog = Math.min(1, tail.timer / 45);
        tail.active = tail.prog > 0.25;
        if (tail.timer >= 45) { tail.phase = 'hold'; tail.timer = 0; }
      } else if (tail.phase === 'hold') {
        tail.active = true;
        if (tail.timer >= 65) { tail.phase = 'fall'; tail.timer = 0; }
      } else if (tail.phase === 'fall') {
        tail.prog = Math.max(0, 1 - tail.timer / 40);
        tail.active = false;
        if (tail.timer >= 40) tail.phase = 'done';
      }
    }
    if (boss.patternTimer <= 0) { boss.sw2Tails = []; boss.pattern = 'sw2_idle'; boss.patternTimer = 25; }
  }

  if (p === 'sw2_beam_warn') {
    boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
    if (boss.patternTimer <= 0) {
      boss.pattern = 'sw2_beam'; boss.patternTimer = 230;
      boss.sw2Beam = {
        angle: Math.PI + (Math.random() - 0.5) * 0.7,
        sweepDir: Math.random() > 0.5 ? 1 : -1,
        sweepRate: 0.007,
        projTimer: 0
      };
      sndSwEmerge();
    }
  }

  if (p === 'sw2_beam') {
    boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
    if (boss.sw2Beam) {
      boss.sw2Beam.angle += boss.sw2Beam.sweepDir * boss.sw2Beam.sweepRate;
      boss.sw2Beam.projTimer++;
      if (boss.sw2Beam.projTimer >= 18) {
        boss.sw2Beam.projTimer = 0;
        const dist = 160 + Math.random() * 400;
        const bx = HX - 180 + Math.cos(boss.sw2Beam.angle) * dist;
        const by = HY + Math.sin(boss.sw2Beam.angle) * dist;
        const tX = player.x + player.w / 2, tY = player.y + player.h / 2;
        const dx = tX - bx, dy = tY - by, d = Math.sqrt(dx * dx + dy * dy) || 1;
        boss.sw2BeamProj.push({ x: bx, y: by, vx: dx / d * 4, vy: dy / d * 4, r: 12, life: 380, phase: Math.random() * Math.PI * 2 });
      }
      // 빔 직격 판정
      const bx = HX - 180, by = HY;
      const bdx = Math.cos(boss.sw2Beam.angle), bdy = Math.sin(boss.sw2Beam.angle);
      const px = player.x + player.w / 2 - bx, py = player.y + player.h / 2 - by;
      const dot = px * bdx + py * bdy, cross = px * bdy - py * bdx;
      if (dot > 0 && dot < 1000 && Math.abs(cross) < 28) {
        if (boss.sw2BeamDmgCd <= 0) { damagePlayer(); boss.sw2BeamDmgCd = 35; }
      }
    }
    if (boss.sw2BeamDmgCd > 0) boss.sw2BeamDmgCd--;
    if (boss.patternTimer <= 0) { boss.sw2Beam = null; boss.pattern = 'sw2_idle'; boss.patternTimer = 25; }
  }

  // 유도 투사체 이동
  for (let i = boss.sw2BeamProj.length - 1; i >= 0; i--) {
    const sp = boss.sw2BeamProj[i];
    const tX = player.x + player.w / 2, tY = player.y + player.h / 2;
    const dx = tX - sp.x, dy = tY - sp.y, d = Math.sqrt(dx * dx + dy * dy) || 1;
    sp.vx += (dx / d * 4 - sp.vx) * 0.04;
    sp.vy += (dy / d * 4 - sp.vy) * 0.04;
    sp.x += sp.vx; sp.y += sp.vy; sp.life--;
    if (sp.x < ARENA_LEFT - 60 || sp.x > ARENA_RIGHT + 60 || sp.y > FLOOR_Y + 60 || sp.life <= 0)
      boss.sw2BeamProj.splice(i, 1);
  }
  // 꼬리 피격 쿨다운
  if (boss.sw2TailCd > 0) boss.sw2TailCd--;
  // 난사 투사체 이동
  for (let i = boss.swSandProj.length - 1; i >= 0; i--) {
    const sp = boss.swSandProj[i];
    sp.x += sp.vx; sp.y += sp.vy; sp.life--;
    if (sp.x < ARENA_LEFT - 60 || sp.x > ARENA_RIGHT + 60 || sp.y > FLOOR_Y + 60 || sp.life <= 0)
      boss.swSandProj.splice(i, 1);
  }
}

function updateSandWormBoss(dt) {
  if (boss.sw2Active) { updateSandWormPhase2(dt); return; }
  if (boss.stagger > 0) { boss.stagger--; return; }
  if (boss.hitFlash > 0) boss.hitFlash--;
  if (!boss.slowSkip) boss.patternTimer--;
  const p = boss.pattern;

  // sw_idle
  if (p === 'sw_idle') {
    boss.x = -9999; boss.w = 1; boss.h = 1;
    if (boss.patternTimer <= 0) {
      if (boss.swBurrowCount < 3) {
        const pCX = player.x + player.w/2;
        const minX = ARENA_LEFT+90, maxX = ARENA_RIGHT-90;
        boss.swWarnX = Math.max(minX, Math.min(maxX, pCX + (Math.random()-0.5)*280));
        boss.pattern = 'sw_burrow_warn'; boss.patternTimer = 80;
        sndSwWarn();
      } else {
        boss.swBurrowCount = 0;
        boss.swBodyOffset = 0; boss.swPlatform = null; boss.swDmgZone = null;
        boss.swFireCount = 0; boss.swFireTimer = 0;
        boss.pattern = 'sw_surface_enter'; boss.patternTimer = 150;
        sndSwSurface();
      }
    }
  }

  // sw_burrow_warn
  if (p === 'sw_burrow_warn') {
    boss.x = -9999; boss.w = 1; boss.h = 1;
    if (boss.patternTimer <= 0) {
      boss.pattern = 'sw_burrow_active'; boss.patternTimer = 45;
      boss.attackBox = { x: boss.swWarnX-180, y: FLOOR_Y-420, w: 360, h: 420, type: 'sw_emerge' };
      sndSwEmerge();
    }
  }

  // sw_burrow_active
  if (p === 'sw_burrow_active') {
    boss.x = boss.swWarnX-180; boss.y = FLOOR_Y-420; boss.w = 360; boss.h = 420;
    if (boss.attackBox) { boss.attackBox.x = boss.swWarnX-180; boss.attackBox.y = FLOOR_Y-420; }
    if (boss.patternTimer <= 0) {
      boss.attackBox = null;
      boss.swBurrowCount++;
      boss.pattern = 'sw_burrow_down'; boss.patternTimer = 32;
    }
  }

  // sw_burrow_down
  if (p === 'sw_burrow_down') {
    boss.x = -9999; boss.w = 1; boss.h = 1;
    if (boss.patternTimer <= 0) { boss.pattern = 'sw_idle'; boss.patternTimer = easyMode ? 65 : 48; }
  }

  // sw_surface_enter
  if (p === 'sw_surface_enter') {
    const prog = 1 - boss.patternTimer/150;
    boss.swBodyOffset = prog;
    if (boss.patternTimer <= 100) {
      const platProg = 1 - boss.patternTimer/100;
      boss.swPlatform = { x: 400, y: FLOOR_Y - platProg*180, w: 360, h: 40 };
    }
    boss.x = 827; boss.y = FLOOR_Y-262; boss.w = 411; boss.h = 248;
    if (boss.patternTimer <= 0) {
      boss.swBodyOffset = 1;
      boss.swPlatform = { x: 400, y: FLOOR_Y-180, w: 360, h: 40 };
      boss.swDmgZone = { x: ARENA_LEFT, y: FLOOR_Y-50, w: ARENA_RIGHT-ARENA_LEFT, h: 50 };
      boss.swFireTimer = hardMode ? Math.floor(30 + Math.random()*90) : (easyMode ? 45 : 32);
      boss.pattern = 'sw_surface_fire';
      boss.patternTimer = hardMode ? 1200 : 6*(easyMode?48:40)+40;
    }
  }

  // sw_surface_fire
  if (p === 'sw_surface_fire') {
    boss.x = 827; boss.y = FLOOR_Y-262; boss.w = 411; boss.h = 248;
    const maxBursts = hardMode ? 9 : 6;
    if (boss.swFireCount < maxBursts) {
      boss.swFireTimer--;
      if (boss.swFireTimer <= 0) {
        const hX=1095, hY=FLOOR_Y-78;
        const tX=player.x+player.w/2, tY=player.y+player.h/2;
        const dx=tX-hX, dy=tY-hY, dist=Math.sqrt(dx*dx+dy*dy)||1;
        const spd = easyMode ? 7 : 9;
        if (hardMode) {
          const baseAng = Math.atan2(dy, dx);
          for (let s = 0; s < 3; s++) {
            const spread = (Math.random()*2-1) * 10 * Math.PI/180;
            const ang = baseAng + spread;
            boss.swSandProj.push({ x:hX, y:hY, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, r:17, life:220, phase:Math.random()*Math.PI*2 });
          }
        } else {
          boss.swSandProj.push({ x:hX, y:hY, vx:dx/dist*spd, vy:dy/dist*spd, r:17, life:220, phase:Math.random()*Math.PI*2 });
        }
        boss.swFireCount++;
        boss.swFireTimer = hardMode ? Math.floor(30 + Math.random()*90) : (easyMode ? 48 : 38);
        sndSwFire();
        spawnParticles(hX,hY,'#c8a030',6,3,18);
      }
    }
    if (boss.patternTimer <= 0 || (boss.swFireCount >= maxBursts && boss.swFireTimer <= 30)) {
      boss.swDmgZone = null;
      boss.pattern = 'sw_surface_exit'; boss.patternTimer = 120;
    }
  }

  // sw_surface_exit
  if (p === 'sw_surface_exit') {
    const exitProg = boss.patternTimer/120;
    boss.swBodyOffset = exitProg;
    if (boss.swPlatform) boss.swPlatform.y = FLOOR_Y - exitProg*180;
    boss.x = -9999; boss.w = 1; boss.h = 1;
    if (boss.patternTimer <= 0) {
      boss.swPlatform = null; boss.swBodyOffset = 0; boss.swSandProj = [];
      boss.x = 430; boss.y = FLOOR_Y-368; boss.w = 420; boss.h = 335;
      boss.pattern = 'sw_stagger'; boss.patternTimer = 420;
      sndSwStagger();
      spawnParticles(640, FLOOR_Y-80, '#d4a030', 20, 5, 40);
      screenFlash = { color: '#d4a030', alpha: 0.5 };
    }
  }

  // sw_stagger
  if (p === 'sw_stagger') {
    boss.x = 430; boss.y = FLOOR_Y-368; boss.w = 420; boss.h = 335;
    if (boss.patternTimer <= 0) { boss.pattern = 'sw_idle'; boss.patternTimer = 55; }
  }

  // 모래 투사체 이동
  for (let i = boss.swSandProj.length-1; i >= 0; i--) {
    const sp = boss.swSandProj[i];
    sp.x += sp.vx; sp.y += sp.vy; sp.life--;
    if (sp.x < ARENA_LEFT-60 || sp.x > ARENA_RIGHT+60 || sp.y > FLOOR_Y+60 || sp.life <= 0)
      boss.swSandProj.splice(i, 1);
  }
  // 장판 데미지 쿨다운
  if (boss.swDmgCd > 0) boss.swDmgCd--;
}

// ── 곰치 2페이즈 로직 ──
function splitEelSeg(idx) {
  const seg = boss.eel2Segments[idx];
  if (seg.dead) return;
  // 물기 도중 처치: 머리를 궤도 위치로 스냅 후 biteOffset 초기화
  seg.biteOffset = 0;
  seg.attackBox = null;
  seg.projectiles = [];
  const snapAng = seg.pattern === 'eel2_bite' ? seg.biteAngle : seg.coilPhase;
  seg.headX = seg.coilCX + Math.cos(snapAng) * seg.coilR;
  seg.headY = seg.coilCY + Math.sin(snapAng) * seg.coilR;
  seg.dead = true; seg.deathAnim = 22;
  spawnParticles(seg.headX, seg.headY, '#00e5ff', 20, 6, 30);
  spawnParticles(seg.headX, seg.headY, '#ffffff', 12, 4, 20);
  screenFlash = { color: '#80ffff', alpha: 0.6 };
  screenShake = { power: 12, dur: 20 };
  sndBossHit();

  boss.eel2TotalKills++;
  const liveAfter = boss.eel2Segments.filter(s => !s.dead).length;

  // killsNeeded 이하이면 반드시 분열 — 초기 1개 즉사 버그 방지
  const stillSplitting = boss.eel2TotalKills <= boss.eel2KillsNeeded;
  const canSpawn = stillSplitting ? Math.min(2, 8 - liveAfter) : 0;
  boss.eel2TotalSegs += canSpawn;

  if (canSpawn > 0) {
    const a0 = Math.random() * Math.PI * 2;
    for (let n = 0; n < canSpawn; n++) {
      const a = a0 + n * Math.PI;
      const tx = Math.max(ARENA_LEFT + 120, Math.min(ARENA_RIGHT - 120, seg.coilCX + Math.cos(a) * 165));
      const ty = Math.max(130, Math.min(FLOOR_Y - 130, seg.coilCY + Math.sin(a) * 130));
      // 부모 위치에서 등장 후 목적지로 이동
      const ns = makeEel2Seg(seg.coilCX, seg.coilCY);
      ns.introTimer = 60;
      ns.startCX = seg.coilCX; ns.startCY = seg.coilCY;
      ns.targetCX = tx; ns.targetCY = ty;
      ns.patternTimer += 110;
      boss.eel2Segments.push(ns);
    }
  }

  // 분열이 끝난 뒤 마지막 세그먼트가 죽으면 승리
  const finalLive = boss.eel2Segments.filter(s => !s.dead).length;
  if (finalLive === 0) {
    stopBGM(1.5);
    setTimeout(() => { recordClear(); state = STATE.WIN; winTimer = 0; sndWin(); }, 700);
  }
}

function updateEelP2() {
  if (boss.eel2State === 'intro') {
    boss.eel2Timer++;
    if (boss.eel2Timer < 90 && boss.eel2Timer % 7 === 0) {
      for (let bi = 0; bi < 3; bi++) {
        spawnParticles(
          ARENA_LEFT + 60 + Math.random() * (ARENA_RIGHT - ARENA_LEFT - 120),
          FLOOR_Y - 30 - Math.random() * 380 | 0,
          '#80ffff', 4, 4 + (Math.random() * 3 | 0), 38
        );
      }
    }
    if (boss.eel2Segments.length > 0 && boss.eel2Timer <= 120) {
      const t = boss.eel2Timer / 120;
      const et = t * t * (3 - 2 * t);
      boss.eel2Segments[0].coilCX = (ARENA_RIGHT + 100) * (1 - et) + 640 * et;
      boss.eel2Segments[0].coilCY = 310;
    }
    if (boss.eel2Timer >= 150) boss.eel2State = 'active';
  }

  for (let idx = 0; idx < boss.eel2Segments.length; idx++) {
    const seg = boss.eel2Segments[idx];
    if (seg.dead) {
      if (seg.deathAnim > 0) {
        seg.deathAnim--;
        seg.coilCY += 5; // 가라앉기
        seg.headY  += 5;
      }
      continue;
    }

    seg.coilPhase += seg.coilSpeed;
    // 분열 등장: 부모 위치에서 목적지로 부드럽게 이동
    if (seg.introTimer > 0) {
      seg.introTimer--;
      const t = 1 - seg.introTimer / 60;
      const et = t * t * (3 - 2 * t);
      seg.coilCX = seg.startCX + (seg.targetCX - seg.startCX) * et;
      seg.coilCY = seg.startCY + (seg.targetCY - seg.startCY) * et;
    }
    const headAng = (seg.pattern === 'eel2_bite' || seg.pattern === 'eel2_bite_warn') ? seg.biteAngle : seg.coilPhase;
    seg.headX = seg.coilCX + Math.cos(headAng) * (seg.coilR + seg.biteOffset);
    seg.headY = seg.coilCY + Math.sin(headAng) * (seg.coilR + seg.biteOffset);
    seg.headX = Math.max(ARENA_LEFT + 22, Math.min(ARENA_RIGHT - 22, seg.headX));
    seg.headY = Math.max(22, Math.min(FLOOR_Y - 22, seg.headY));

    if (seg.hitFlash > 0) seg.hitFlash--;
    seg.animTimer++; if (seg.animTimer > 10) { seg.animTimer = 0; seg.animFrame++; }

    if (seg.attackBox) {
      seg.attackBox.x = seg.headX - 62; seg.attackBox.y = seg.headY - 47;
    }

    if (boss.eel2State !== 'active') continue;

    if (seg.pattern === 'idle') {
      seg.patternTimer--;
      if (seg.patternTimer <= 0) {
        if (Math.random() < 0.55) {
          // 경고 단계 진입 — 플레이어 방향 고정 후 50프레임 예고
          seg.pattern = 'eel2_bite_warn'; seg.biteTimer = 50;
          seg.biteAngle = Math.atan2(player.y + 28 - seg.coilCY, player.x + 20 - seg.coilCX);
          sndEelBite();
        } else {
          seg.pattern = 'eel2_fish'; seg.biteTimer = 45; sndEelFishSwarm();
        }
      }
    } else if (seg.pattern === 'eel2_bite_warn') {
      seg.biteTimer--;
      if (seg.biteTimer <= 0) {
        // 경고 끝 → 실제 발사
        seg.pattern = 'eel2_bite'; seg.biteHit = false; seg.biteTimer = 90;
        seg.coilSpeed *= 0.28;
      }
    } else if (seg.pattern === 'eel2_bite') {
      seg.biteTimer--;
      const elapsed = 90 - seg.biteTimer;
      if (elapsed < 22) {
        seg.biteOffset = elapsed * 17.5;
      } else if (elapsed < 55) {
        seg.biteOffset = 385;
        if (!seg.biteHit && !seg.attackBox) {
          seg.attackBox = { x: seg.headX - 62, y: seg.headY - 47, w: 124, h: 95, type: 'eel2_bite' };
        }
      } else {
        seg.biteOffset = Math.max(0, seg.biteOffset - 30);
        seg.attackBox = null;
      }
      if (seg.biteTimer <= 0) {
        seg.pattern = 'idle'; seg.patternTimer = 100 + (Math.random() * 100 | 0);
        seg.biteOffset = 0; seg.biteHit = false; seg.attackBox = null;
        seg.coilSpeed = 0.019 + Math.random() * 0.008;
      }
    } else if (seg.pattern === 'eel2_fish') {
      seg.biteTimer--;
      if (seg.biteTimer === 20) {
        const tx = player.x + player.w / 2, ty = player.y + player.h / 2;
        const dx = tx - seg.headX, dy = ty - seg.headY;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        seg.projectiles.push({
          type: 'fish', x: seg.headX, y: seg.headY,
          vx: dx / dist * 4.2, vy: dy / dist * 4.2,
          r: 15, rot: Math.atan2(dy, dx), life: 500, homeDelay: 12,
        });
      }
      if (seg.biteTimer <= 0) {
        seg.pattern = 'idle'; seg.patternTimer = 100 + (Math.random() * 100 | 0);
      }
    }

    for (let pi = seg.projectiles.length - 1; pi >= 0; pi--) {
      const p = seg.projectiles[pi];
      p.life--;
      const tx = player.x + player.w / 2, ty = player.y + player.h / 2;
      const dx2 = tx - p.x, dy2 = ty - p.y, dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) || 1;
      const str = (p.homeDelay > 0) ? (p.homeDelay -= 0.5, 0) : 0.22;
      p.vx += dx2 / dist2 * str; p.vy += dy2 / dist2 * str;
      const spd2 = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (spd2 > 6.0) { p.vx = p.vx / spd2 * 6.0; p.vy = p.vy / spd2 * 6.0; }
      p.rot = Math.atan2(p.vy, p.vx);
      p.x += p.vx; p.y += p.vy;
      if (p.x < ARENA_LEFT - 90 || p.x > ARENA_RIGHT + 90 || p.y < -120 || p.y > FLOOR_Y + 60 || p.life <= 0) {
        seg.projectiles.splice(pi, 1);
      }
    }
  }
}

function updateDragonBoss(dt) {
  if (boss.dragon2Active) { updateDragonP2(); return; }
  if (boss.stagger > 0) { boss.stagger--; return; }
  if (boss.stunned > 0) return;
  boss.animTimer++;
  if (boss.animTimer > 12) { boss.animTimer = 0; boss.animFrame++; }

  // 드래곤은 오른쪽 끝에 고정 (죽지 않은 한 이동 없음)
  boss.x = ARENA_RIGHT - 335;
  boss.y = FLOOR_Y - 350;
  boss.facing = -1;

  if (boss.hitFlash > 0) boss.hitFlash--;

  if (!boss.slowSkip) boss.patternTimer--;
  if (boss.patternTimer <= 0) {
    const hasFireballs = boss.dragonFireballs.length > 0;
    const roll = Math.random();
    if (!hasFireballs && roll < 0.34) startDragonFireball();
    else if (roll < (hasFireballs ? 0.5 : 0.67)) startDragonBite();
    else startDragonSlam();
  }

  // ── 불덩어리 차징 ──
  if (boss.pattern === 'dragon_fireball_windup') {
    boss.phaseTimer--;
    if (boss.phaseTimer % 7 === 0) {
      spawnParticles(boss.x - 180, boss.y + 100, '#f80', 5, 3, 16);
      spawnParticles(boss.x - 180, boss.y + 100, '#f40', 3, 2, 12);
    }
    if (boss.phaseTimer <= 0) {
      for (let k = 0; k < 4; k++) {
        boss.dragonFireballs.push({
          x: boss.x - 180, y: boss.y + 100 + k * 20,
          vx: -7.5 + k * 0.5, vy: -1.5 + k * 0.8,
          bounces: 0, maxBounces: 24, r: 14, life: 9999, rot: 0
        });
      }
      boss.pattern = 'dragon_fireball_active';
      boss.phaseTimer = easyMode ? 130 : 110;
      sndDragonFire();
    }
  }
  if (boss.pattern === 'dragon_fireball_active') {
    boss.phaseTimer--;
    if (boss.phaseTimer <= 0) {
      endDragonPattern(80 + Math.random() * 60);
    }
  }

  // ── 지면 강타 ──
  if (boss.pattern === 'dragon_slam_warn') {
    boss.phaseTimer--;
    if (boss.phaseTimer % 12 === 0) {
      spawnParticles(640 + (Math.random()-0.5)*200, FLOOR_Y - 20, '#f80', 4, 3, 22);
    }
    if (boss.phaseTimer <= 0) {
      boss.pattern = 'dragon_slam_explode';
      boss.phaseTimer = 28;
      boss.attackBox = { x: ARENA_LEFT, y: FLOOR_Y - 130, w: ARENA_RIGHT - ARENA_LEFT, h: 130, life: 22, type: 'slam' };
      for (let i = 0; i < 40; i++) spawnParticles(ARENA_LEFT + Math.random()*(ARENA_RIGHT-ARENA_LEFT), FLOOR_Y - Math.random()*140, '#f80', 3, 6, 38);
      for (let i = 0; i < 25; i++) spawnParticles(ARENA_LEFT + Math.random()*(ARENA_RIGHT-ARENA_LEFT), FLOOR_Y - Math.random()*100, '#ff4', 3, 8, 30);
      screenShake = { power: 20, dur: 32 };
      screenFlash = { color: '#f80', alpha: 0.8 };
      sndDragonSlam();
    }
  }
  if (boss.pattern === 'dragon_slam_explode') {
    boss.phaseTimer--;
    if (boss.attackBox) { boss.attackBox.life--; if (boss.attackBox.life <= 0) boss.attackBox = null; }
    if (boss.phaseTimer <= 0) endDragonPattern(140 + Math.random() * 70);
  }

  // ── 엇박자 물기 ──
  if (boss.pattern === 'dragon_bite') {
    boss.phaseTimer--;
    // 물기 히트박스 수명 감소
    for (let i = boss.biteBoxes.length - 1; i >= 0; i--) {
      boss.biteBoxes[i].life--;
      if (boss.biteBoxes[i].life <= 0) boss.biteBoxes.splice(i, 1);
    }

    if (boss.phase === 0 && boss.phaseTimer <= 0) {
      // 경고 → 실제 물기
      boss.biteBoxes.push({ x: boss.biteTargetX - 160, y: FLOOR_Y - 550, w: 320, h: 550, life: 12 });
      spawnParticles(boss.biteTargetX, FLOOR_Y - 55, '#f80', 16, 6, 22);
      spawnParticles(boss.biteTargetX, FLOOR_Y - 55, '#f40', 8, 4, 16);
      screenFlash = { color: '#f40', alpha: 0.2 };
      screenShake = { power: 6, dur: 8 };
      boss.biteStep++;
      if (boss.biteStep >= 4) {
        boss.phase = 2; boss.phaseTimer = 20;
      } else {
        boss.phase = 1;
        boss.phaseTimer = easyMode ? BITE_GAPS[boss.biteStep - 1] + 20 : BITE_GAPS[boss.biteStep - 1];
      }
    } else if (boss.phase === 1 && boss.phaseTimer <= 0) {
      // 간격 → 다음 경고
      boss.biteTargetX = player.x + player.w / 2;
      boss.phase = 0;
      boss.phaseTimer = BITE_WARN_TIMES[boss.biteStep];
      spawnParticles(boss.biteTargetX, FLOOR_Y - 10, '#f40', 5, 2, 14);
    } else if (boss.phase === 2 && boss.phaseTimer <= 0) {
      endDragonPattern(120 + Math.random() * 60);
    }
  }

  if (boss.attackBox && boss.attackBox.type !== 'slam') {
    boss.attackBox.life--;
    if (boss.attackBox.life <= 0) boss.attackBox = null;
  }
}

function startDragonFireball() {
  boss.pattern = 'dragon_fireball_windup';
  boss.phaseTimer = easyMode ? 65 : 60;
  boss.patternTimer = 99999;
}
function startDragonSlam() {
  boss.pattern = 'dragon_slam_warn';
  boss.phaseTimer = easyMode ? 150 : 130;
  boss.patternTimer = 99999;
  sndDragonRoar();
}
function startDragonBite() {
  boss.pattern = 'dragon_bite';
  boss.phase = 0;
  boss.biteStep = 0;
  boss.biteTargetX = player.x + player.w / 2;
  boss.phaseTimer = BITE_WARN_TIMES[0];
  boss.patternTimer = 99999;
  sndDragonRoar();
}
function endDragonPattern(nextTimer) {
  boss.pattern = 'idle';
  boss.patternTimer = easyMode ? nextTimer + 70 : nextTimer + 40;
  boss.attackBox = null;
  boss.biteBoxes = [];
}

// ══════════════════════════════════════════
//  드래곤 2페이즈 (세 개의 머리)
// ══════════════════════════════════════════
const D2_HEADS_DEF = [
  { bx: 11, by: 38, angle: -2.8  },
  { bx:  5, by: 48, angle:  Math.PI },
  { bx: 11, by: 60, angle:  2.8   },
];
const D2_NECK_LEN = 62;

function lerpRGB(r1,g1,b1,r2,g2,b2,t) {
  return `rgb(${~~(r1+(r2-r1)*t)},${~~(g1+(g2-g1)*t)},${~~(b1+(b2-b1)*t)})`;
}

function d2WorldHead(idx, growP, lungeExtra) {
  const o = D2_HEADS_DEF[idx];
  const grow = Math.min(1, Math.max(0, growP * 3 - idx));
  const len = (D2_NECK_LEN * grow + (lungeExtra || 0)) * 3.5;
  const lunge = boss.lungeData;
  const angle = (lunge && lunge.headIdx === idx && lunge.targetDir !== undefined) ? lunge.targetDir : o.angle;
  return {
    x: boss.x + o.bx * 3.5 + Math.cos(angle) * len,
    y: boss.y + o.by * 3.5 + Math.sin(angle) * len
  };
}

function drawD2Head(nx0, ny0, angle, neckLen, eyeGlow, jawOpen, wp, hc) {
  // 팔레트 (통일 2단계)
  const bc = hc ? '#ff8888' : lerpRGB(178,34,34,220,220,220,wp);
  const dc = bc;
  const sc = bc;
  // 픽셀 세그먼트 목 (smooth stroke 대신 fillRect 통일)
  const nkO = '#000';
  for (let s = 0; s < neckLen - 4; s += 9) {
    ctx.save();
    ctx.translate(nx0 + Math.cos(angle)*s, ny0 + Math.sin(angle)*s);
    ctx.rotate(angle);
    ctx.fillStyle = nkO; ctx.fillRect(-1,-6,11,12);
    ctx.fillStyle = bc;  ctx.fillRect(0,-5,9,10);
    ctx.restore();
  }
  ctx.save();
  ctx.translate(nx0+Math.cos(angle)*neckLen, ny0+Math.sin(angle)*neckLen);
  ctx.rotate(angle + Math.PI);
  ctx.fillStyle='#000'; ctx.fillRect(-8,-7,16,24); ctx.fillRect(-47,13,46,40);
  ctx.fillStyle=bc; ctx.fillRect(-7,-6,14,22); ctx.fillRect(-46,14,44,38);
  ctx.fillStyle=dc; ctx.fillRect(-44,16,40,32);
  ctx.fillStyle=sc; ctx.fillRect(-40,4,6,14); ctx.fillRect(-28,2,6,18);
  ctx.fillStyle='#222'; ctx.fillRect(-40,2,4,4); ctx.fillRect(-28,0,4,4);
  ctx.fillStyle=eyeGlow?'#fff700':(hc?'#fff':'#FFD700');
  ctx.fillRect(-40,20,12,9); ctx.fillStyle='#000'; ctx.fillRect(-38,22,8,5);
  if (eyeGlow) { ctx.fillStyle='rgba(255,220,0,0.65)'; ctx.fillRect(-44,16,20,16); }
  ctx.fillStyle='#000'; ctx.fillRect(-63,21,22,18);
  ctx.fillStyle=bc; ctx.fillRect(-62,22,20,16);
  ctx.fillStyle=dc; ctx.fillRect(-60,24,16,12);
  ctx.fillStyle='#000'; ctx.fillRect(-63,37+jawOpen,22,14);
  ctx.fillStyle=sc; ctx.fillRect(-62,38+jawOpen,20,12);
  ctx.fillStyle='#ddd';
  for (let i=0;i<4;i++) { ctx.fillRect(-60+i*5,36,3,6); ctx.fillRect(-59+i*5,38+jawOpen,3,6); }
  ctx.restore();
}

function drawDragonP2() {
  const whiteP = boss.dragon2WhiteP, growP = boss.dragon2GrowP;
  ctx.save();
  ctx.translate(boss.x, boss.y); ctx.scale(3.5, 3.5);
  const hc = boss.hitFlash > 0;
  const breathe = Math.sin(boss.animFrame * 0.12) * 1.5;
  // 원형 몸통 중심 (1페이즈 디자인 원형 재구성)
  const CX = 35, CY = 48 + breathe;

  // 팔레트 (1페이즈 붉은 → 희뿌연 변이)
  const bc   = hc ? '#ff8888' : lerpRGB(139,0,0, 210,210,210, whiteP);
  const dark = hc ? '#ff4444' : lerpRGB(80,0,0,  150,150,150, whiteP);
  const bl   = hc ? '#ffaaaa' : lerpRGB(165,50,50, 192,192,192, whiteP);
  const dBlack = hc ? '#ff2222' : '#1a0000';

  // ── 날개 (원 우상단에서 펼쳐짐) ──
  for (const [wx,wy,ww,wh] of [
    [CX+15,CY-25,7,20],[CX+22,CY-33,7,26],[CX+29,CY-40,8,32],
    [CX+37,CY-48,8,38],[CX+45,CY-54,8,44],[CX+53,CY-60,8,48],[CX+61,CY-65,9,52]
  ]) {
    ctx.fillStyle='#000'; ctx.fillRect(wx-1,wy-1,ww+2,wh+2);
    ctx.fillStyle=bc; ctx.fillRect(wx,wy,ww,wh);
  }
  // 하부 날개 (접힌 세그먼트)
  for (const [wx,wy,ww,wh] of [
    [CX+18,CY-10,7,14],[CX+24,CY-16,7,18],[CX+30,CY-21,6,22],[CX+36,CY-25,6,24]
  ]) {
    ctx.fillStyle='#000'; ctx.fillRect(wx-1,wy-1,ww+2,wh+2);
    ctx.fillStyle=hc?'#ffaaaa':lerpRGB(120,0,0,172,172,172,whiteP);
    ctx.fillRect(wx,wy,ww,wh);
  }
  // 날개뼈
  ctx.fillStyle=dark;
  ctx.fillRect(CX+14,CY-26,4,50); ctx.fillRect(CX+28,CY-42,4,22); ctx.fillRect(CX+43,CY-56,3,18);
  // 날개막 줄무늬
  ctx.fillStyle=lerpRGB(45,0,0,100,100,100,whiteP);
  for (let wi=0;wi<5;wi++) ctx.fillRect(CX+17+wi*9,CY-58+wi*11,2,34-wi*5);
  // 날개 끝 가시
  ctx.fillStyle=dBlack;
  ctx.fillRect(CX+67,CY-67,4,6); ctx.fillRect(CX+70,CY-55,4,5); ctx.fillRect(CX+72,CY-44,3,4);
  ctx.fillStyle='#444'; ctx.fillRect(CX+68,CY-68,2,2); ctx.fillRect(CX+71,CY-56,2,2);

  // ── 원형 몸통 외곽 테두리 ──
  ctx.fillStyle='#000';
  for (const [dy,hw] of [
    [-28,8],[-26,12],[-24,16],[-22,19],
    [-20,21],[-18,23],[-16,24],[-14,26],
    [-12,27],[-10,28],[-8,28],[-6,29],
    [-4,29],[-2,30],[0,30],[2,30],[4,29],[6,29],
    [8,28],[10,28],[12,27],[14,26],
    [16,24],[18,23],[20,21],[22,19],
    [24,16],[26,12],[28,8]
  ]) ctx.fillRect(CX-hw-1,CY+dy-1,(hw+1)*2,3);

  // ── 몸통 채우기 ──
  ctx.fillStyle=bc;
  for (const [dy,hw] of [
    [-28,7],[-26,11],[-24,15],[-22,18],
    [-20,20],[-18,22],[-16,23],[-14,25],
    [-12,26],[-10,27],[-8,27],[-6,28],
    [-4,28],[-2,29],[0,29],[2,29],[4,28],[6,28],
    [8,27],[10,27],[12,26],[14,25],
    [16,23],[18,22],[20,20],[22,18],
    [24,15],[26,11],[28,7]
  ]) ctx.fillRect(CX-hw,CY+dy,hw*2,2);

  // ── 비늘 패턴 (원 표면) ──
  for (let r=0;r<4;r++) {
    for (let c=0;c<4;c++) {
      const sx=CX-22+c*12, sy=CY-18+r*10;
      const ddx=(sx+5)-CX, ddy=(sy+4)-CY;
      if (ddx*ddx+ddy*ddy < 24*24) {
        ctx.fillStyle=dark;   ctx.fillRect(sx,sy,10,8);
        ctx.fillStyle=bc;     ctx.fillRect(sx+1,sy,8,3);
        ctx.fillStyle=lerpRGB(110,28,28,165,165,165,whiteP); ctx.fillRect(sx,sy+6,10,2);
        ctx.fillStyle=dBlack; ctx.fillRect(sx,sy,1,8); ctx.fillRect(sx+9,sy,1,8);
      }
    }
  }

  // ── 배갑 (원 하단 호) ──
  ctx.fillStyle=bl;
  for (const [dy,hw] of [[10,16],[12,19],[14,21],[16,21],[18,19],[20,15]])
    ctx.fillRect(CX-hw,CY+dy,hw*2,3);
  ctx.fillStyle=lerpRGB(100,22,22,155,155,155,whiteP);
  for (let bi=0;bi<4;bi++) ctx.fillRect(CX-18,CY+11+bi*3,36,1);
  ctx.fillStyle=hc?'#ffcccc':lerpRGB(190,62,62,202,202,202,whiteP);
  ctx.fillRect(CX-8,CY+10,16,20);
  ctx.fillStyle=hc?'#ffd8d8':lerpRGB(200,72,72,210,210,210,whiteP);
  ctx.fillRect(CX-5,CY+11,10,18);

  // ── 척추 가시 (원 상단~우상단 호) ──
  for (let si=0;si<7;si++) {
    const ang=-2.7+si*0.35;
    const bpx=Math.floor(CX+Math.cos(ang)*30), bpy=Math.floor(CY+Math.sin(ang)*30);
    const tpx=Math.floor(CX+Math.cos(ang)*40), tpy=Math.floor(CY+Math.sin(ang)*40);
    ctx.fillStyle=dBlack; ctx.fillRect(bpx-1,bpy-1,4,4); ctx.fillRect(tpx,tpy,2,2);
    ctx.fillStyle=dark;
    ctx.fillRect(Math.floor((bpx*2+tpx)/3)-1,Math.floor((bpy*2+tpy)/3)-1,3,3);
    ctx.fillRect(Math.floor((bpx+tpx*2)/3),Math.floor((bpy+tpy*2)/3),2,2);
  }
  ctx.fillStyle=lerpRGB(40,0,0,100,100,100,whiteP);
  for (let si=0;si<7;si++) {
    const ang=-2.7+si*0.35;
    ctx.fillRect(Math.floor(CX+Math.cos(ang)*31)-1,Math.floor(CY+Math.sin(ang)*31)-1,2,2);
  }

  // ── 다리/발톱 (원 하단에서 늘어짐) ──
  ctx.fillStyle='#000';
  ctx.fillRect(CX-16,CY+28,13,22); ctx.fillRect(CX+3,CY+28,13,22);
  ctx.fillStyle=bc;
  ctx.fillRect(CX-15,CY+29,11,20); ctx.fillRect(CX+4,CY+29,11,20);
  ctx.fillStyle=dark;
  ctx.fillRect(CX-15,CY+34,11,2); ctx.fillRect(CX+4,CY+34,11,2);
  ctx.fillRect(CX-15,CY+40,11,2); ctx.fillRect(CX+4,CY+40,11,2);
  ctx.fillStyle='#1a1a1a';
  for (const [tx,ty] of [[CX-19,CY+47],[CX-12,CY+48],[CX-6,CY+47],[CX+2,CY+47],[CX+9,CY+48],[CX+15,CY+47]])
    ctx.fillRect(tx,ty,7,6);
  ctx.fillStyle='#333';
  for (const [tx,ty] of [[CX-18,CY+46],[CX-11,CY+47],[CX-5,CY+46],[CX+3,CY+46],[CX+10,CY+47],[CX+16,CY+46]])
    ctx.fillRect(tx,ty,4,3);
  ctx.fillStyle='#555';
  for (const [tx,ty] of [[CX-17,CY+46],[CX-10,CY+47],[CX-4,CY+46],[CX+4,CY+46],[CX+11,CY+47],[CX+17,CY+46]])
    ctx.fillRect(tx,ty,2,2);

  // ── 꼬리 (원 우하단) ──
  ctx.fillStyle='#000';
  ctx.fillRect(CX+28,CY+5,12,18); ctx.fillRect(CX+35,CY+16,10,14); ctx.fillRect(CX+40,CY+24,8,10);
  ctx.fillStyle=bc;
  ctx.fillRect(CX+29,CY+6,10,16); ctx.fillRect(CX+36,CY+17,8,12); ctx.fillRect(CX+41,CY+25,6,8);
  ctx.fillRect(CX+29,CY+6,3,14);
  ctx.fillStyle=dark;
  ctx.fillRect(CX+44,CY+22,5,6); ctx.fillRect(CX+47,CY+18,4,7); ctx.fillRect(CX+49,CY+15,3,5);
  ctx.fillStyle=dBlack;
  ctx.fillRect(CX+47,CY+19,2,4); ctx.fillRect(CX+49,CY+16,2,3);
  ctx.fillStyle='#444'; ctx.fillRect(CX+48,CY+20,1,2);

  // ── 3개의 머리 (원 좌측에서 방사) ──
  const lunge = boss.lungeData, laserWarn = boss.d2LaserWarning;
  for (let i=0; i<3; i++) {
    const hGrow = Math.min(1, Math.max(0, growP*3-i));
    if (hGrow <= 0) continue;
    let lungeBonus = 0;
    if (lunge && lunge.headIdx === i) lungeBonus = lunge.progress * 80;
    const headAngle = (lunge && lunge.headIdx === i && lunge.targetDir !== undefined) ? lunge.targetDir : D2_HEADS_DEF[i].angle;
    const eyeGlow = (laserWarn && laserWarn.headIdx === i) || (lunge && lunge.headIdx === i && (lunge.phase === 'extend' || lunge.phase === 'hold'));
    drawD2Head(D2_HEADS_DEF[i].bx, D2_HEADS_DEF[i].by + breathe, headAngle, D2_NECK_LEN * hGrow + lungeBonus, eyeGlow, eyeGlow ? 10 : 2, whiteP, hc);
  }
  ctx.restore();

  // 경고: 레이저 예고선
  if (boss.d2LaserWarning) {
    const wIdx = boss.d2LaserWarning.headIdx;
    const tip = d2WorldHead(wIdx, growP, 0);
    const prog = 1 - boss.d2LaserWarning.life / 24;
    const pulse = 0.4 + 0.4 * Math.sin(Date.now() * 0.018);
    ctx.save();
    ctx.globalAlpha = prog * 0.7 * pulse;
    ctx.strokeStyle = '#ffe000'; ctx.lineWidth = 3;
    ctx.setLineDash([12, 8]);
    ctx.beginPath(); ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(player.x + player.w/2, player.y + player.h/2); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
  // 경고: 돌진 타겟
  if (boss.lungeData && boss.lungeData.phase === 'windup') {
    const pcx = player.x + player.w/2, pcy = player.y + player.h/2;
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.022);
    ctx.save();
    ctx.globalAlpha = 0.75 * pulse;
    ctx.strokeStyle = '#f80'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(pcx, pcy, 28 + pulse*12, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,100,0,0.18)';
    ctx.beginPath(); ctx.arc(pcx, pcy, 28 + pulse*12, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // 레이저 빔 (월드 좌표)
  for (const beam of boss.d2LaserBeams) {
    const tip = d2WorldHead(beam.headIdx, growP, 0);
    const a = beam.life / beam.maxLife;
    ctx.save(); ctx.globalAlpha = a;
    ctx.strokeStyle = '#fff700'; ctx.lineWidth = 3 + (1-a)*10;
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 16;
    ctx.beginPath(); ctx.moveTo(tip.x, tip.y); ctx.lineTo(beam.ex, beam.ey); ctx.stroke();
    ctx.restore();
  }

  // 불기둥
  for (const p of boss.d2FirePillars) {
    if (p.warning) {
      const a = Math.min(0.75, (p.warnMaxLife - p.warnLife) / (p.warnMaxLife * 0.5) * 0.75);
      ctx.fillStyle = `rgba(255,60,0,${a*0.35})`; ctx.fillRect(p.x-40,0,80,FLOOR_Y);
      ctx.fillStyle = `rgba(255,150,0,${a*0.8})`; ctx.fillRect(p.x-5,0,10,FLOOR_Y);
      ctx.fillStyle = `rgba(255,220,80,${a})`; ctx.fillRect(p.x-2,0,4,FLOOR_Y);
    } else {
      const a = p.strikeLife / p.strikeMaxLife;
      const grd = ctx.createLinearGradient(p.x-40,0,p.x+40,0);
      grd.addColorStop(0, `rgba(255,200,50,${a*0.2})`);
      grd.addColorStop(0.4, `rgba(255,120,0,${a*0.9})`);
      grd.addColorStop(0.5, `rgba(255,255,150,${a})`);
      grd.addColorStop(0.6, `rgba(255,120,0,${a*0.9})`);
      grd.addColorStop(1, `rgba(255,200,50,${a*0.2})`);
      ctx.fillStyle = grd; ctx.fillRect(p.x-40,0,80,FLOOR_Y);
    }
  }

  // 변신 오버레이
  if (boss.dragon2State === 'transform' && boss.dragon2Timer < 80) {
    ctx.fillStyle = `rgba(160,0,0,${(80-boss.dragon2Timer)/80*0.4})`;
    ctx.fillRect(0,0,1280,720);
  }
}

function startD2FirePillar() {
  boss.d2Pattern = 'd2_firepillar';
  boss.d2PillarCount = 0; boss.d2PillarNextTimer = 35;
  boss.d2PatternTimer = 99999;
}
function startD2Laser() {
  boss.d2Pattern = 'd2_laser';
  boss.d2LaserCount = 0; boss.d2LaserNextTimer = 60; boss.d2LaserWarning = null;
  boss.d2PatternTimer = 99999;
}
function startD2Lunge() {
  boss.d2Pattern = 'd2_lunge';
  boss.lungeData = { headIdx: Math.floor(Math.random()*3), phase: 'windup', progress: 0, timer: 55, targetDir: undefined };
  boss.d2PatternTimer = 99999;
  sndDragonRoar();

function endD2Pattern(nt) {

function updateDragonP2() {
  boss.animTimer++;
  if (boss.animTimer > 12) { boss.animTimer = 0; boss.animFrame++; }
  if (boss.hitFlash > 0) boss.hitFlash--;

  // 변신 단계
  if (boss.dragon2State === 'transform') {
    boss.dragon2Timer++;
    const t = boss.dragon2Timer;
    boss.dragon2WhiteP = Math.min(1, t / 200);
    boss.dragon2GrowP  = Math.min(1, Math.max(0, (t - 60) / 140));
    if (t % 5 === 0) {
      spawnParticles(boss.x + 122, boss.y + 168, '#600', 4, 3, 22);
      spawnParticles(boss.x + 122, boss.y + 168, '#f00', 2, 2, 14);
    }
    if (t > 240) {
      boss.dragon2State = 'active';
      boss.hp = 90; boss.maxHp = 90; boss.vulnerable = 0;
      boss.dragon2Timer = 0;
      boss.d2Pattern = 'idle'; boss.d2PatternTimer = 180;
      player.invincible = Math.max(player.invincible, 90);
      screenFlash = { color: '#fff', alpha: 1 };
      screenShake = { power: 22, dur: 35 };
      sndDragonRoar();
    }
    return;
  }
  if (boss.dragon2State !== 'active') return;

  boss.dragon2Timer++;
  boss.d2PatternTimer--;
  if (boss.d2PatternTimer <= 0 && boss.d2Pattern === 'idle') {
    const r = Math.random();
    if (r < 0.34) startD2FirePillar();
    else if (r < 0.67) startD2Laser();
    else startD2Lunge();
  }

  // 불기둥 패턴
  if (boss.d2Pattern === 'd2_firepillar') {
    boss.d2PillarNextTimer--;
    for (let i = boss.d2FirePillars.length-1; i >= 0; i--) {
      const p = boss.d2FirePillars[i];
      if (p.warning) {
        p.warnLife--;
        if (p.warnLife <= 0) {
          p.warning = false; p.strikeMaxLife = 14; p.strikeLife = 14;
          spawnParticles(p.x, FLOOR_Y-80, '#ff8', 20, 8, 28);
          spawnParticles(p.x, FLOOR_Y-80, '#f80', 14, 5, 20);
          screenShake = { power: 8, dur: 10 };
          sndDragonSlam();
        }
      } else {
        p.strikeLife--;
        if (p.strikeLife <= 0) boss.d2FirePillars.splice(i, 1);
      }
    }
    if (boss.d2PillarNextTimer <= 0 && boss.d2PillarCount < 10) {
      const targetX = player.x + player.w / 2;
      const spread = boss.d2PillarCount % 2 === 0 ? (Math.random() - 0.5) * 160 : (Math.random() - 0.5) * 300;
      const px = Math.max(ARENA_LEFT + 60, Math.min(ARENA_RIGHT - 60, targetX + spread));
      boss.d2FirePillars.push({ x: px, warning: true, warnMaxLife: 46, warnLife: 46 });
      boss.d2PillarCount++;
      boss.d2PillarNextTimer = 38;
    }
    if (boss.d2PillarCount >= 10 && boss.d2FirePillars.length === 0) endD2Pattern(100 + Math.random()*60);
  }

  // 레이저 패턴
  if (boss.d2Pattern === 'd2_laser') {
    boss.d2LaserNextTimer--;
    for (let i = boss.d2LaserBeams.length-1; i >= 0; i--) {
      boss.d2LaserBeams[i].life--;
      if (boss.d2LaserBeams[i].life <= 0) boss.d2LaserBeams.splice(i, 1);
    }
    if (boss.d2LaserWarning) {
      boss.d2LaserWarning.life--;
      if (boss.d2LaserWarning.life <= 0) {
        const wi = boss.d2LaserWarning.headIdx;
        const tip = d2WorldHead(wi, boss.dragon2GrowP, 0);
        const dx = (player.x+player.w/2) - tip.x, dy = (player.y+player.h/2) - tip.y;
        const dist = Math.sqrt(dx*dx+dy*dy) || 1;
        const angle = Math.atan2(dy, dx);
        boss.d2LaserBeams.push({ headIdx: wi, life: 22, maxLife: 22, angle, sx: tip.x, sy: tip.y, ex: tip.x+(dx/dist)*1100, ey: tip.y+(dy/dist)*1100 });
        spawnParticles(tip.x, tip.y, '#fff700', 14, 5, 20);
        boss.d2LaserWarning = null; boss.d2LaserCount++; boss.d2LaserNextTimer = 50;
        sndDragonFire();
      }
    }
    if (!boss.d2LaserWarning && boss.d2LaserNextTimer <= 0 && boss.d2LaserCount < 5) {
      boss.d2LaserWarning = { headIdx: Math.floor(Math.random()*3), life: 50 };
    }
    if (boss.d2LaserCount >= 5 && boss.d2LaserBeams.length === 0 && !boss.d2LaserWarning) endD2Pattern(100 + Math.random()*60);
  }

  // 돌진 패턴
  if (boss.d2Pattern === 'd2_lunge') {
    const l = boss.lungeData;
    if (!l) { endD2Pattern(60); return; }
    l.timer--;
    if (l.phase === 'windup') {
      if (l.timer <= 0) {
        l.phase = 'extend'; l.timer = 22;
        const tip0 = d2WorldHead(l.headIdx, boss.dragon2GrowP, 0);
        l.targetDir = Math.atan2((player.y+player.h/2)-tip0.y, (player.x+player.w/2)-tip0.x);
        spawnParticles(tip0.x, tip0.y, '#f80', 8, 4, 16);
      }
    } else if (l.phase === 'extend') {
      l.progress = 1 - (l.timer / 22);
      if (l.timer <= 0) { l.phase = 'hold'; l.progress = 1; l.timer = 18; }
    } else if (l.phase === 'hold') {
      if (l.timer <= 0) { l.phase = 'retract'; l.timer = 30; }
    } else if (l.phase === 'retract') {
      l.progress = l.timer / 30;
      if (l.timer <= 0) { boss.lungeData = null; endD2Pattern(100 + Math.random()*60); }
    }
  }
}
