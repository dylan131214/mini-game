}

// ── 샌드웜 머리 드로잉 (왼쪽 방향, sc=스케일) ──
function drawSwHead(cx, cy, mouthF, hf, sc=1) {
  ctx.save(); ctx.translate(cx, cy); if(sc!==1) ctx.scale(sc,sc);
  const base = hf>0 ? '#fff'    : '#c8973a';
  const mid  = hf>0 ? '#eee'    : '#a87828';
  const edge = hf>0 ? '#ccc'    : '#7a5010';
  const lite = hf>0 ? '#fff'    : '#d4a840';
  const dark = hf>0 ? '#aaa'    : '#5a3c08';

  // ── 목 연결 3레이어 ──
  ctx.fillStyle=mid;  ctx.fillRect(4,-30,34,60);
  ctx.fillStyle=lite; ctx.fillRect(4,-30, 6,60);       // 목 전면 하이라이트
  ctx.fillStyle=edge; ctx.fillRect(32,-30, 6,60);      // 목 후면 그림자
  ctx.strokeStyle=dark; ctx.lineWidth=2;
  for(let k=1;k<3;k++){ ctx.beginPath(); ctx.moveTo(4+k*11,-30); ctx.lineTo(4+k*11,30); ctx.stroke(); }

  // ── 머리 타원 다층 구조 ──
  ctx.fillStyle=dark; // 외피 어두운 테두리
  ctx.beginPath(); ctx.ellipse(-4,0,74,50,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=base; // 기본 색
  ctx.beginPath(); ctx.ellipse(-4,0,72,48,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=lite; // 상단 하이라이트 타원
  ctx.beginPath(); ctx.ellipse(-4,-16,66,28,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=base; // 하이라이트 위에 기본 색 겹쳐 부드럽게
  ctx.beginPath(); ctx.ellipse(-4,-12,62,24,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=mid;  // 하단 음영
  ctx.beginPath(); ctx.ellipse(-4,18,60,22,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=edge; ctx.lineWidth=3;
  ctx.beginPath(); ctx.ellipse(-4,0,72,48,0,0,Math.PI*2); ctx.stroke();

  // ── 분절 줄무늬 ──
  ctx.strokeStyle=hf>0?'rgba(180,180,180,0.35)':'rgba(90,58,8,0.28)'; ctx.lineWidth=1.8;
  for(let i=-3;i<=3;i++){ ctx.beginPath(); ctx.moveTo(i*18,-44); ctx.lineTo(i*18,44); ctx.stroke(); }
  ctx.strokeStyle=hf>0?'rgba(180,180,180,0.2)':'rgba(70,45,5,0.22)'; ctx.lineWidth=1.4;
  for(let j=-2;j<=2;j++){
    ctx.beginPath(); ctx.ellipse(-4,j*16,68-Math.abs(j)*5,9,0,0,Math.PI*2); ctx.stroke();
  }

  // ── 감각 구멍 패턴 (측선 기관) ──
  ctx.fillStyle=dark;
  for(let row=-1;row<=1;row+=2){
    for(let col=0;col<5;col++){
      const px=-46+col*18, py=row*26;
      ctx.beginPath(); ctx.arc(px,py,3.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=hf>0?'rgba(255,200,0,0.4)':'rgba(40,20,0,0.55)';
      ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=dark;
    }
  }

  // ── 눈 2개 (오른쪽) 4레이어 ──
  [[22,-20],[22,20]].forEach(([ex,ey])=>{
    ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(ex,ey,13,10,0,0,Math.PI*2); ctx.fill(); // 소켓
    ctx.fillStyle='#1e1808'; ctx.beginPath(); ctx.ellipse(ex,ey,11,8,0,0,Math.PI*2); ctx.fill(); // 공막
    ctx.fillStyle=hf>0?'#ffcc00':'#e8c020'; ctx.beginPath(); ctx.ellipse(ex,ey,7,5.5,0,0,Math.PI*2); ctx.fill(); // 홍채
    ctx.fillStyle=hf>0?'#ffaa00':'#c8a010'; ctx.beginPath(); ctx.ellipse(ex,ey,5,4,0,0,Math.PI*2); ctx.fill(); // 중간 홍채
    ctx.fillStyle='#100a04'; ctx.beginPath(); ctx.ellipse(ex,ey,2.5,5,0,0,Math.PI*2); ctx.fill(); // 동공
    ctx.fillStyle='rgba(255,248,190,0.8)'; ctx.beginPath(); ctx.arc(ex-2.5,ey-2.5,2.5,0,Math.PI*2); ctx.fill(); // 하이라이트
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(ex-2.5,ey-2.5,1.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(ex,ey+6,8,3.5,0,0,Math.PI*2); ctx.fill(); // 눈 아래 그림자
  });

  // ── 입 (왼쪽) ──
  const mH = 10+mouthF*28;
  ctx.fillStyle='#200e04'; // 외부
  ctx.beginPath(); ctx.ellipse(-58,0,13+mouthF*14,mH,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0408'; // 내부 더 어두운
  ctx.beginPath(); ctx.ellipse(-58,0,10+mouthF*10,mH*0.8,0,0,Math.PI*2); ctx.fill();
  if(mouthF>0.15){
    ctx.fillStyle=hf>0?'#eee':'#ccc4b0';
    for(let j=-1;j<=1;j+=2){
      ctx.beginPath();
      ctx.moveTo(-58+10,j*mH*0.55); ctx.lineTo(-58-18,j*(mH*0.55+5)); ctx.lineTo(-58-18,j*(mH*0.55-4));
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.55)'; // 이빨 하이라이트
      ctx.beginPath();
      ctx.moveTo(-58+8,j*mH*0.55); ctx.lineTo(-58-15,j*(mH*0.55+3)); ctx.lineTo(-58-14,j*(mH*0.55-2));
      ctx.closePath(); ctx.fill();
      ctx.fillStyle=hf>0?'#eee':'#ccc4b0';
      ctx.beginPath(); // 보조 이빨
      ctx.moveTo(-58+3,j*mH*0.42); ctx.lineTo(-58-12,j*(mH*0.42+3)); ctx.lineTo(-58-12,j*(mH*0.42-3));
      ctx.closePath(); ctx.fill();
    }
  }

  // ── 더듬이 4개 ── 관절 마디 추가
  [[-16,-52],[-40,-56],[16,-50],[38,-44]].forEach(([ax,ay])=>{
    const aStroke = hf>0?'#ff8':'#9a7820', aTip = hf>0?'#ff8':'#d4a030';
    ctx.strokeStyle=aStroke; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(ax*0.5,-40); ctx.quadraticCurveTo(ax*0.72,ay-6,ax,ay); ctx.stroke();
    // 관절 마디 (근사 위치 2개)
    const jx1=ax*0.65, jy1=-40+(ay+40)*0.3, jx2=ax*0.82, jy2=-40+(ay+40)*0.65;
    ctx.fillStyle=aTip;   ctx.beginPath(); ctx.arc(jx1,jy1,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=aStroke; ctx.beginPath(); ctx.arc(jx1,jy1,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=aTip;   ctx.beginPath(); ctx.arc(jx2,jy2,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=aStroke; ctx.beginPath(); ctx.arc(jx2,jy2,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=aTip; ctx.beginPath(); ctx.arc(ax,ay,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.6)'; ctx.beginPath(); ctx.arc(ax-1.5,ay-1.5,2,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ── 몸통 세그먼트 1개 드로잉 (타원 혹, 바닥 중심) ──
function drawSwSeg(cx, cy, sw, sh, hf) {
  const base = hf>0 ? '#fff'    : '#b88a30';
  const lite = hf>0 ? '#fff'    : '#d4a840';
  const mid  = hf>0 ? '#ddd'    : '#a07828';
  const dark = hf>0 ? '#bbb'    : '#6a4a10';
  const edge = hf>0 ? '#aaa'    : '#503808';

  // 외피 어두운 가장자리
  ctx.fillStyle=edge;
  ctx.beginPath(); ctx.ellipse(cx,cy,sw/2+3,sh/2+3,0,0,Math.PI*2); ctx.fill();
  // 베이스 색
  ctx.fillStyle=base;
  ctx.beginPath(); ctx.ellipse(cx,cy,sw/2,sh/2,0,0,Math.PI*2); ctx.fill();
  // 하단 음영
  ctx.fillStyle=mid;
  ctx.beginPath(); ctx.ellipse(cx,cy+sh/6,sw/2*0.92,sh/2*0.62,0,0,Math.PI*2); ctx.fill();
  // 상단 하이라이트
  ctx.fillStyle=lite;
  ctx.beginPath(); ctx.ellipse(cx,cy-sh/5,sw/2*0.78,sh/2*0.48,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=base;
  ctx.beginPath(); ctx.ellipse(cx,cy-sh/5,sw/2*0.58,sh/2*0.3,0,0,Math.PI*2); ctx.fill();

  // 테두리 선
  ctx.strokeStyle=dark; ctx.lineWidth=4;
  ctx.beginPath(); ctx.ellipse(cx,cy,sw/2,sh/2,0,0,Math.PI*2); ctx.stroke();

  // 세로 분절선 6개 (가운데쪽 길고 양끝 짧게)
  ctx.strokeStyle=hf>0?'rgba(140,140,140,0.35)':'rgba(72,44,5,0.32)'; ctx.lineWidth=2.5;
  for(let k=1;k<6;k++){
    const lx=cx-sw/2+sw/6*k, lh=sh/2-16-Math.abs(k-3)*5;
    ctx.beginPath(); ctx.moveTo(lx,cy-lh); ctx.lineTo(lx,cy+lh); ctx.stroke();
  }
  // 가로 분절선
  ctx.strokeStyle=hf>0?'rgba(140,140,140,0.2)':'rgba(72,44,5,0.2)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(cx,cy,sw/2*0.88,sh/5,0,0,Math.PI*2); ctx.stroke();

  // 측면 마디 이음새 돌기
  ctx.fillStyle=dark;
  ctx.beginPath(); ctx.ellipse(cx-sw/2+4,cy,6,sh/5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+sw/2-4,cy,6,sh/5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=mid;
  ctx.beginPath(); ctx.ellipse(cx-sw/2+4,cy,3,sh/8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+sw/2-4,cy,3,sh/8,0,0,Math.PI*2); ctx.fill();
}

// ── 샌드웜 2페이즈 드로잉 ──
function drawSandWormPhase2() {
  const p = boss.pattern;
  const hf = boss.hitFlash;
  const t = Date.now() * 0.001;
  const HX = 640, HY = FLOOR_Y - 220;

  // 몸통 세그먼트 (항상 표시)
  ctx.save(); ctx.beginPath(); ctx.rect(0, 0, 1280, FLOOR_Y); ctx.clip();
  const anim = Math.sin(t * 3) * 8;
  const bodyProg = p === 'sw2_enter' ? Math.max(0, 1 - boss.patternTimer / 160) : 1;
  for (let i = 0; i < 5; i++) {
    const sx = HX + 260 + i * 240;
    ctx.globalAlpha = Math.max(0, bodyProg - i * 0.18);
    drawSwSeg(sx, FLOOR_Y - 28 + anim * (i % 2 ? 1 : -1), 430, 270, hf);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // 머리
  if (p === 'sw2_enter') {
    const prog = Math.max(0, 1 - boss.patternTimer / 160);
    const emergeH = prog * 340;
    if (emergeH > 5) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, 0, 1280, FLOOR_Y); ctx.clip();
      ctx.translate(HX, FLOOR_Y - emergeH + 8);
      ctx.rotate(-Math.PI / 2);
      drawSwHead(0, 0, 0.2, hf, 3);
      ctx.restore();
    }
  } else {
    const mouthOpen = (p === 'sw2_beam' || p === 'sw2_beam_warn') ? 1.2 : 0.3;
    ctx.save(); ctx.translate(HX, HY);
    drawSwHead(0, 0, mouthOpen, hf, 3);
    ctx.restore();
  }

  // ── 꼬리 경고 ──
  if (p === 'sw2_tails_warn') {
    const pulse = (Math.sin(t * 12) + 1) / 2;
    ctx.strokeStyle = '#e8a020'; ctx.lineWidth = 3;
    for (const wx of boss.sw2TailWarnXs) {
      [28, 52, 76].forEach((r, i) => {
        ctx.globalAlpha = (0.65 - i * 0.18) * (0.45 + pulse * 0.5);
        ctx.beginPath(); ctx.arc(wx, FLOOR_Y, r, Math.PI, 0); ctx.stroke();
      });
      ctx.globalAlpha = 0.6 + pulse * 0.35;
      ctx.strokeStyle = '#ff5010'; ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(wx - 14, FLOOR_Y - 36); ctx.lineTo(wx + 14, FLOOR_Y - 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wx + 14, FLOOR_Y - 36); ctx.lineTo(wx - 14, FLOOR_Y - 8); ctx.stroke();
      ctx.strokeStyle = '#e8a020'; ctx.lineWidth = 3;
    }
    ctx.globalAlpha = 1;
  }

  // ── 꼬리 패턴 ──
  if (p === 'sw2_tails') {
    for (const tail of boss.sw2Tails) {
      if (tail.prog <= 0) continue;
      const th = tail.prog * 320;
      ctx.save(); ctx.beginPath(); ctx.rect(0, FLOOR_Y - th, 1280, th + 10); ctx.clip();
      drawSwSeg(tail.x, FLOOR_Y - th * 0.5, 160, th, hf);
      ctx.restore();
      if (tail.active) {
        ctx.globalAlpha = 0.15 + 0.08 * Math.sin(t * 9);
        ctx.fillStyle = '#ff6000';
        ctx.fillRect(tail.x - 80, FLOOR_Y - th, 160, th);
        ctx.globalAlpha = 1;
      }
    }
  }

  // ── 빔 경고 ──
  if (p === 'sw2_beam_warn') {
    const pulse = (Math.sin(t * 14) + 1) / 2;
    const bx = HX - 180, by = HY;
    ctx.globalAlpha = 0.4 + pulse * 0.5;
    ctx.strokeStyle = '#ff8000'; ctx.lineWidth = 5;
    [160, 280, 400].forEach((r, i) => {
      ctx.globalAlpha = (0.5 - i * 0.12) * (0.4 + pulse * 0.5);
      ctx.beginPath(); ctx.arc(bx, by, r, Math.PI * 0.6, Math.PI * 1.4); ctx.stroke();
    });
    ctx.globalAlpha = 0.7 + pulse * 0.3;
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(bx - 30, by - 60); ctx.lineTo(bx - 80, by); ctx.lineTo(bx - 30, by + 60); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── 모래 빔 ──
  if (p === 'sw2_beam' && boss.sw2Beam) {
    const beam = boss.sw2Beam;
    const bx = HX - 180, by = HY;
    const beamLen = 1000;
    const ex = bx + Math.cos(beam.angle) * beamLen;
    const ey = by + Math.sin(beam.angle) * beamLen;
    const g = ctx.createLinearGradient(bx, by, ex, ey);
    g.addColorStop(0, 'rgba(255,200,40,0.95)');
    g.addColorStop(0.3, 'rgba(220,140,20,0.75)');
    g.addColorStop(1, 'rgba(160,90,10,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 48; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,248,180,0.85)'; ctx.lineWidth = 14;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(ex, ey); ctx.stroke();
    // 빔 파티클 효과
    if (Math.random() < 0.4) {
      const dist = Math.random() * 600;
      const px = bx + Math.cos(beam.angle) * dist + (Math.random() - 0.5) * 30;
      const py = by + Math.sin(beam.angle) * dist + (Math.random() - 0.5) * 30;
      spawnParticles(px, py, '#d4a030', 1, 2, 8);
    }
  }

  // ── 유도 모래 투사체 ──
  for (const sp of boss.sw2BeamProj) {
    const a = t * 10 + sp.phase;
    ctx.fillStyle = '#ff8020'; ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#ffd060'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,200,0.7)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sp.x + Math.cos(a) * sp.r * 0.6, sp.y + Math.sin(a) * sp.r * 0.6);
    ctx.lineTo(sp.x - Math.cos(a) * sp.r * 0.6, sp.y - Math.sin(a) * sp.r * 0.6);
    ctx.stroke();
  }

  // ── 난사 모래 투사체 (기존 재활용) ──
  for (const sp of boss.swSandProj) {
    const a = t * 8 + sp.phase;
    ctx.fillStyle = '#d4a030'; ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#9a7020'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = '#e8c040'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sp.x + Math.cos(a) * sp.r * 0.62, sp.y + Math.sin(a) * sp.r * 0.62);
    ctx.lineTo(sp.x - Math.cos(a) * sp.r * 0.62, sp.y - Math.sin(a) * sp.r * 0.62);
    ctx.stroke();
  }
}

// ── 샌드웜 메인 드로잉 ──
function drawSandWorm() {
  const p = boss.pattern;
  const hf = boss.hitFlash;
  const t = Date.now()*0.001;
  if(boss.dead){
    // 죽음: 머리가 서서히 모래속으로
    const dp = Math.min(1, boss.deathAnim/90);
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,1280,FLOOR_Y); ctx.clip();
    drawSwHead(boss.x+boss.w/2, FLOOR_Y-80+dp*90, 0, 0, 3);
    ctx.restore(); return;
  }
  if (boss.sw2Active) { drawSandWormPhase2(); return; }
  // ── 경고 ──
  if(p==='sw_burrow_warn'){
    const wx=boss.swWarnX, pulse=(Math.sin(t*12)+1)/2;
    ctx.strokeStyle='#e8a020'; ctx.lineWidth=2.5;
    [84,156,228].forEach((r,i)=>{
      ctx.globalAlpha=(0.65-i*0.18)*(0.45+pulse*0.45);
      ctx.beginPath(); ctx.arc(wx,FLOOR_Y,r,Math.PI,0); ctx.stroke();
    });
    ctx.globalAlpha=0.65+pulse*0.3;
    ctx.strokeStyle='#ff5010'; ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.moveTo(wx-16,FLOOR_Y-40); ctx.lineTo(wx+16,FLOOR_Y-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx+16,FLOOR_Y-40); ctx.lineTo(wx-16,FLOOR_Y-8); ctx.stroke();
    ctx.globalAlpha=1;
    if(Math.random()<0.28) spawnParticles(wx+(Math.random()-0.5)*165,FLOOR_Y-Math.random()*18,'#d4a030',2,2,16);
  }
  // ── 튀어나오기 / 내려가기 ──
  if(p==='sw_burrow_active'||p==='sw_burrow_down'){
    const wx=boss.swWarnX;
    const elapsed=p==='sw_burrow_active'?(45-boss.patternTimer):45;
    const emergeH=p==='sw_burrow_down'?(boss.patternTimer/30)*330:Math.min(1,elapsed/18)*330;
    // 모래 구멍
    ctx.fillStyle='#6a4010'; ctx.beginPath(); ctx.ellipse(wx,FLOOR_Y,165,54,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a2008'; ctx.beginPath(); ctx.ellipse(wx,FLOOR_Y,120,33,0,0,Math.PI*2); ctx.fill();
    if(emergeH>5){
      // 머리를 위쪽으로 회전해서 표시
      ctx.save(); ctx.translate(wx,FLOOR_Y-emergeH+8);
      ctx.rotate(-Math.PI/2);
      drawSwHead(0,0,Math.min(1,elapsed/14)*(p==='sw_burrow_down'?0.2:1.4),hf,3);
      ctx.restore();
    }
    if(p==='sw_burrow_active'&&elapsed<10&&Math.random()<0.55)
      spawnParticles(wx+(Math.random()-0.5)*150,FLOOR_Y-8,'#c8a030',4,3,20);
  }
  // ── 지표면 단계 ──
  if(p==='sw_surface_enter'||p==='sw_surface_fire'||p==='sw_surface_exit'){
    const bod=boss.swBodyOffset;
    if(bod<=0) return;
    // 발판 (꼬리)
    if(boss.swPlatform){
      const pl=boss.swPlatform;
      // 꼬리 연결 (삼각형)
      ctx.fillStyle='#9a7228';
      ctx.beginPath(); ctx.moveTo(pl.x,pl.y+pl.h); ctx.lineTo(pl.x-55,FLOOR_Y); ctx.lineTo(pl.x+pl.w+30,FLOOR_Y); ctx.lineTo(pl.x+pl.w,pl.y+pl.h); ctx.closePath(); ctx.fill();
      // 발판 면
      ctx.fillStyle='#b08830';
      ctx.beginPath(); ctx.rect(pl.x,pl.y,pl.w,pl.h); ctx.fill();
      ctx.strokeStyle='#7a5810'; ctx.lineWidth=5;
      ctx.beginPath(); ctx.rect(pl.x,pl.y,pl.w,pl.h); ctx.stroke();
      ctx.strokeStyle='rgba(90,60,8,0.35)'; ctx.lineWidth=3;
      for(let k=1;k<7;k++){
        const lx=pl.x+pl.w/7*k;
        ctx.beginPath(); ctx.moveTo(lx,pl.y+4); ctx.lineTo(lx,pl.y+pl.h-4); ctx.stroke();
      }
    }
    // 몸통 세그먼트 11개 (전체 아레나, 5배 크기)
    const anim=Math.sin(t*3)*4;
    const segN=11;
    for(let i=0;i<segN;i++){
      const f=(i+0.5)/segN;
      const sx=ARENA_LEFT+f*(ARENA_RIGHT-ARENA_LEFT);
      const sa=Math.min(1, bod*(i<6?3:2)-i*0.06);
      if(sa<=0) continue;
      ctx.globalAlpha=Math.max(0,Math.min(1,sa));
      drawSwSeg(sx, FLOOR_Y-28+anim*(i%2?1:-1), 430, 270, hf);
    }
    ctx.globalAlpha=1;
    // 머리 (우측)
    const headAlpha=Math.min(1,bod*3);
    ctx.globalAlpha=headAlpha;
    const mF=p==='sw_surface_fire'?1.3:0.25;
    drawSwHead(1095, FLOOR_Y-78, mF, hf, 3);
    ctx.globalAlpha=1;
    // 장판기 표시
    if(p==='sw_surface_fire'&&boss.swDmgZone){
      const dz=boss.swDmgZone;
      const dPulse=0.14+0.07*Math.sin(t*8);
      ctx.globalAlpha=dPulse; ctx.fillStyle='#ff4000';
      ctx.fillRect(dz.x,dz.y,dz.w,dz.h);
      ctx.globalAlpha=1;
      ctx.strokeStyle=`rgba(255,80,0,${0.4+0.25*Math.sin(t*8)})`; ctx.lineWidth=2;
      ctx.strokeRect(dz.x,dz.y,dz.w,dz.h);
    }
  }
  // ── 경직 ──
  if(p==='sw_stagger'){
    const hCX=boss.x+boss.w/2, hCY=FLOOR_Y-190;
    const wob=Math.sin(t*10)*0.06;
    // 몸통 일부 노출 (머리 오른쪽)
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,1280,FLOOR_Y); ctx.clip();
    const bodyAnim=Math.sin(t*3)*4;
    for(let i=0;i<5;i++){
      const sx=hCX+140+(i*130);
      ctx.globalAlpha=Math.max(0,1-i*0.22);
      drawSwSeg(sx, FLOOR_Y-28+bodyAnim*(i%2?1:-1), 430, 270, hf);
    }
    ctx.globalAlpha=1;
    ctx.restore();
    // 머리
    ctx.save(); ctx.translate(hCX,hCY); ctx.rotate(wob);
    ctx.beginPath(); ctx.rect(-275,-175,550,335); ctx.clip();
    drawSwHead(0,0,0.2,hf,3);
    ctx.restore();
    // 별 이펙트
    [0,1,2].forEach(i=>{
      const ang=t*3+i*Math.PI*2/3;
      const sx=hCX+Math.cos(ang)*100, sy=hCY-90+Math.sin(ang)*30;
      ctx.font='20px serif'; ctx.fillStyle='#ffff00'; ctx.textAlign='center';
      ctx.fillText('★',sx,sy); ctx.textAlign='left';
    });
  }
  // 모래 투사체
  for(const sp of boss.swSandProj){
    const a=t*8+sp.phase;
    ctx.fillStyle='#d4a030'; ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#9a7020'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#e8c040'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(sp.x+Math.cos(a)*sp.r*0.62,sp.y+Math.sin(a)*sp.r*0.62);
    ctx.lineTo(sp.x-Math.cos(a)*sp.r*0.62,sp.y-Math.sin(a)*sp.r*0.62);
    ctx.stroke();
  }
}

// ══════════════════════════════════════════
//  배경 (석조 아레나)
// ══════════════════════════════════════════
function drawArena() {
  if (selectedBoss === 'dragon')   { drawDragonNestArena(); return; }
  if (selectedBoss === 'eel')      { drawUnderwaterBubbleArena(); return; }
  if (selectedBoss === 'sandworm') { drawDesertArena(); return; }
  // 배경
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, 1280, 720);

  // 먼 벽 그라디언트
  const wallGrad = ctx.createLinearGradient(0, 0, 0, 500);
  wallGrad.addColorStop(0, '#1a1a1a');
  wallGrad.addColorStop(1, '#0d0d0d');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, 1280, 600);

  // 벽 석조 패턴 - 상세 픽셀 아트
  for (let row = 0; row < 10; row++) {
    const offset = (row % 2) * 80;
    for (let col = -1; col < 17; col++) {
      const bx = col * 160 + offset;
      const by = row * 60;
      // 돌 기본면 (어두운 석재)
      ctx.fillStyle = '#1c1c1c'; ctx.fillRect(bx+1, by+1, 157, 57);
      // 상단 밝은 면 (광원: 위에서)
      ctx.fillStyle = '#252525'; ctx.fillRect(bx+2, by+2, 155, 5);
      ctx.fillStyle = '#222'; ctx.fillRect(bx+2, by+7, 155, 3);
      // 좌측 밝은 면
      ctx.fillStyle = '#212121'; ctx.fillRect(bx+2, by+2, 5, 55);
      // 하단 어두운 면
      ctx.fillStyle = '#131313'; ctx.fillRect(bx+2, by+50, 155, 7);
      // 우측 어두운 면
      ctx.fillStyle = '#151515'; ctx.fillRect(bx+152, by+2, 6, 55);
      // 모르타르 이음새
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(bx, by, 160, 1);
      ctx.fillRect(bx, by, 1, 60);
      // 돌 표면 질감 (불규칙한 밝기 변화)
      const t1 = (row * 11 + col * 7) % 3;
      if (t1 === 0) {
        ctx.fillStyle = '#1f1f1f'; ctx.fillRect(bx+30, by+15, 40, 20);
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(bx+70, by+25, 30, 15);
      } else if (t1 === 1) {
        ctx.fillStyle = '#1e1e1e'; ctx.fillRect(bx+10, by+20, 50, 18);
        ctx.fillStyle = '#1b1b1b'; ctx.fillRect(bx+80, by+10, 35, 25);
      } else {
        ctx.fillStyle = '#1d1d1d'; ctx.fillRect(bx+20, by+8, 45, 22);
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(bx+90, by+30, 28, 18);
      }
      // 이끼 (하단 절반 돌에만)
      if (row >= 5 && (row * 7 + col * 13) % 4 === 0) {
        ctx.fillStyle = '#151e15';
        const mx = bx + 15 + (col * 17) % 60;
        ctx.fillRect(mx, by+30, 4, 16);
        ctx.fillRect(mx+2, by+26, 2, 5);
        ctx.fillStyle = '#162016';
        ctx.fillRect(mx+1, by+31, 2, 12);
      }
      // 균열 (무작위)
      if ((row * 13 + col * 11) % 7 === 0) {
        ctx.fillStyle = '#0d0d0d';
        const cx2 = bx + 40 + (row * col * 3) % 60;
        ctx.fillRect(cx2, by+10, 1, 20);
        ctx.fillRect(cx2+1, by+18, 5, 1);
        ctx.fillRect(cx2+1, by+25, 3, 1);
      }
    }
  }

  // 횃불 효과 (양쪽)
  for (let i = 0; i < 2; i++) {
    const tx = i === 0 ? 120 : 1160;
    const ty = 200;
    // 횃불 빛
    const grd = ctx.createRadialGradient(tx, ty, 10, tx, ty, 120);
    grd.addColorStop(0, 'rgba(255,140,0,0.3)');
    grd.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(tx, ty, 120, 0, Math.PI * 2);
    ctx.fill();
    // 횃불 몸체 - 상세 픽셀 아트
    ctx.fillStyle = '#332'; ctx.fillRect(tx-5, ty, 10, 32);
    ctx.fillStyle = '#443'; ctx.fillRect(tx-4, ty+2, 8, 28);
    ctx.fillStyle = '#554'; ctx.fillRect(tx-3, ty+4, 6, 24);
    ctx.fillStyle = '#332'; ctx.fillRect(tx-4, ty, 2, 30);
    // 나무 나이테 (목재 질감)
    ctx.fillStyle = '#2a2a1a';
    ctx.fillRect(tx-3, ty+6, 6, 1); ctx.fillRect(tx-3, ty+14, 6, 1); ctx.fillRect(tx-3, ty+22, 6, 1);
    // 횃불 받침 금속링
    ctx.fillStyle = '#666'; ctx.fillRect(tx-6, ty-2, 12, 5);
    ctx.fillStyle = '#888'; ctx.fillRect(tx-5, ty-2, 10, 3);
    ctx.fillStyle = '#aaa'; ctx.fillRect(tx-4, ty-2, 8, 1);
    ctx.fillStyle = '#444'; ctx.fillRect(tx-6, ty+2, 12, 1);
    // 불꽃 (다층 구조)
    const ft = Date.now() * 0.006;
    const fl = Math.sin(ft) * 1.5;
    ctx.fillStyle = '#622'; ctx.fillRect(tx-5, ty-10+fl, 10, 12);
    ctx.fillStyle = '#a40'; ctx.fillRect(tx-4, ty-14+fl, 8, 10);
    ctx.fillStyle = '#e60'; ctx.fillRect(tx-3, ty-18+fl, 6, 8);
    ctx.fillStyle = '#f80'; ctx.fillRect(tx-2, ty-21+fl, 4, 7);
    ctx.fillStyle = '#fa0'; ctx.fillRect(tx-1, ty-23+fl, 2, 5);
    ctx.fillStyle = '#ff6'; ctx.fillRect(tx-1, ty-24+fl, 2, 3);
    ctx.fillStyle = '#fff'; ctx.fillRect(tx, ty-23+fl, 1, 2);
    // 불꽃 주변 glow
    ctx.fillStyle = 'rgba(255,160,0,0.12)';
    ctx.fillRect(tx-8, ty-22, 16, 24);
  }

  // 바닥
  const floorGrad = ctx.createLinearGradient(0, FLOOR_Y-20, 0, 720);
  floorGrad.addColorStop(0, '#2a2a2a');
  floorGrad.addColorStop(0.3, '#222');
  floorGrad.addColorStop(1, '#111');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(ARENA_LEFT, FLOOR_Y, ARENA_RIGHT - ARENA_LEFT, 720 - FLOOR_Y);

  // 바닥 타일 - 상세 픽셀 아트
  const tileW = (ARENA_RIGHT - ARENA_LEFT) / 18;
  for (let col = 0; col < 18; col++) {
    const tx2 = ARENA_LEFT + col * tileW;
    for (let row = 0; row < 4; row++) {
      const ty2 = FLOOR_Y + row * 30;
      // 타일 본체
      ctx.fillStyle = row % 2 === col % 2 ? '#262626' : '#222';
      ctx.fillRect(tx2+1, ty2+1, tileW-2, 28);
      // 상단 하이라이트
      ctx.fillStyle = '#2e2e2e'; ctx.fillRect(tx2+1, ty2+1, tileW-2, 3);
      // 하단 그림자
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(tx2+1, ty2+26, tileW-2, 3);
      // 줄눈
      ctx.fillStyle = '#111';
      ctx.fillRect(tx2, ty2, 1, 30); ctx.fillRect(tx2, ty2, tileW, 1);
      // 타일 균열 (일부)
      if ((row * 7 + col * 5) % 11 === 0) {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(tx2 + tileW*0.3, ty2+8, 1, 12);
        ctx.fillRect(tx2 + tileW*0.3, ty2+14, 4, 1);
      }
      // 이끼 점 (하단 쪽)
      if ((row * 9 + col * 3) % 7 === 0 && row >= 2) {
        ctx.fillStyle = '#1a201a'; ctx.fillRect(tx2+10, ty2+20, 3, 3);
      }
    }
  }
  // 바닥 상단 라인 (두꺼운 경계)
  ctx.fillStyle = '#555'; ctx.fillRect(ARENA_LEFT, FLOOR_Y-3, ARENA_RIGHT-ARENA_LEFT, 2);
  ctx.fillStyle = '#444'; ctx.fillRect(ARENA_LEFT, FLOOR_Y-1, ARENA_RIGHT-ARENA_LEFT, 3);
  ctx.fillStyle = '#333'; ctx.fillRect(ARENA_LEFT, FLOOR_Y+1, ARENA_RIGHT-ARENA_LEFT, 2);
}

// ══════════════════════════════════════════
//  UI
// ══════════════════════════════════════════
function drawHUD() {
  // 플레이어 체력 (하트)
  ctx.font = pixelFont(14);
  ctx.fillStyle = '#fff';
  ctx.fillText('HP', 20, 36);
  for (let i = 0; i < player.maxHp; i++) {
    const hx = 60 + i * 44;
    const filled = i < player.hp;
    drawHeart(hx, 18, filled);
  }

  // 갑옷 HUD
  if (selectedArmor) {
    const armorDef = ARMORS.find(a => a.id === selectedArmor);
    if (armorDef) {
      const ax = 20, ay = 54;
      ctx.fillStyle = armorDef.color + '22'; ctx.fillRect(ax - 2, ay - 2, 180, 18);
      ctx.strokeStyle = player.goldShield ? '#FFD700' : armorDef.color + '66';
      ctx.lineWidth = 1; ctx.strokeRect(ax - 2, ay - 2, 180, 18);
      ctx.font = pixelFont(10); ctx.fillStyle = player.goldShield ? '#FFD700' : armorDef.color;
      ctx.textAlign = 'left';
      ctx.fillText('▣ ' + armorDef.name + '  ' + armorDef.desc, ax + 2, ay + 11);
    }
  }

  // 보스 체력 바
  if (!boss.dead && !boss.phase2Active && !boss.eel2Active) {
    const barW = 500, barH = 22;
    const barX = (1280 - barW) / 2;
    const barY = 16;
    ctx.fillStyle = '#111';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    ctx.fillStyle = '#300';
    ctx.fillRect(barX, barY, barW, barH);
    const fillW = (boss.hp / boss.maxHp) * barW;
    const hpGrad = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
    if (boss.isPhase2) {
      hpGrad.addColorStop(0, '#600'); hpGrad.addColorStop(0.5, '#a00'); hpGrad.addColorStop(1, '#d00');
    } else {
      hpGrad.addColorStop(0, '#f00'); hpGrad.addColorStop(0.5, '#d40'); hpGrad.addColorStop(1, '#f80');
    }
    ctx.fillStyle = hpGrad;
    ctx.fillRect(barX, barY, fillW, barH);
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 50; i++) {
      const tx = barX + (i / 50) * barW;
      ctx.beginPath(); ctx.moveTo(tx, barY); ctx.lineTo(tx, barY + barH); ctx.stroke();
    }
    ctx.strokeStyle = boss.isPhase2 ? '#822' : '#555';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.font = pixelFont(13);
    ctx.fillStyle = selectedBoss === 'dragon' ? '#e03030' : selectedBoss === 'eel' ? '#00bcd4' : selectedBoss === 'sandworm' ? '#d4a030' : (boss.isPhase2 ? '#f44' : '#DAA520');
    ctx.textAlign = 'center';
    ctx.fillText(selectedBoss === 'dragon' ? (boss.dragon2Active ? '붉은 비룡  [세 개의 머리]' : '붉은 비룡')
      : selectedBoss === 'eel' ? '심해 곰치'
      : selectedBoss === 'sandworm' ? (boss.sw2Active ? '샌드 웜  [2페이즈]' : boss.pattern === 'sw_stagger' ? '샌드 웜  [경직 중]' : '샌드 웜')
      : (boss.isPhase2 ? '흑화 도끼왕  [2페이즈]' : '황금 기사 도끼왕'), 640, barY + barH + 16);
    ctx.textAlign = 'left';
  } else if (boss.phase2Active) {
    // 변신 중 메시지
    ctx.font = pixelFont(20);
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255,220,80,${0.6 + 0.4 * Math.sin(Date.now() * 0.008)})`;
    ctx.fillText('─── 변신 중 ───', 640, 40);
    ctx.textAlign = 'left';
  } else if (boss.eel2Active) {
    const liveSegs = boss.eel2Segments.filter(s => !s.dead).length;
    const totalSegs = boss.eel2TotalSegs || 1;
    const barW = 500, barH = 22;
    const barX = (1280 - barW) / 2;
    const barY = 16;
    ctx.fillStyle = '#111';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    ctx.fillStyle = '#001a1a';
    ctx.fillRect(barX, barY, barW, barH);
    const fillW = (liveSegs / totalSegs) * barW;
    const hpGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    hpGrad.addColorStop(0, '#006064'); hpGrad.addColorStop(0.5, '#00acc1'); hpGrad.addColorStop(1, '#00e5ff');
    ctx.fillStyle = hpGrad;
    ctx.fillRect(barX, barY, fillW, barH);
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 50; i++) {
      const tx = barX + (i / 50) * barW;
      ctx.beginPath(); ctx.moveTo(tx, barY); ctx.lineTo(tx, barY + barH); ctx.stroke();
    }
    ctx.strokeStyle = '#006064';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.font = pixelFont(13);
    ctx.fillStyle = '#00bcd4';
    ctx.textAlign = 'center';
    ctx.fillText(`심해 곰치  [분열체: ${liveSegs}]`, 640, barY + barH + 16);
    ctx.textAlign = 'left';
  }

  // 아이템 슬롯 (하단)
  drawItemSlot();

  // 치트 표시
  ctx.font = pixelFont(12);
  ctx.textAlign = 'right';
  let cheatY = 718;
  if (cheatAutoParry) {
    ctx.fillStyle = `rgba(255,80,255,${0.7 + 0.3 * Math.sin(Date.now() * 0.01)})`;
    ctx.fillText('AUTO PARRY [CHEAT]', 1268, cheatY);
    cheatY -= 16;
  }
  if (cheatInfiniteItems) {
    ctx.fillStyle = `rgba(80,255,255,${0.7 + 0.3 * Math.sin(Date.now() * 0.013)})`;
    ctx.fillText('INFINITE ITEMS [CHEAT]', 1268, cheatY);
  }
  ctx.textAlign = 'left';
}

function drawHeart(x, y, filled) {
  // 상세 픽셀 하트 (빛/그림자/윤곽)
  const cS=filled?'#900':'#1a1a1a', c1=filled?'#c00':'#2a2a2a';
  const c2=filled?'#e00':'#333', c3=filled?'#f33':'#444';
  const c4=filled?'#f66':'#555', c5=filled?'#f99':'#666';
  // 상단 두 봉우리
  ctx.fillStyle=c2; ctx.fillRect(x+4,y,8,2); ctx.fillRect(x+16,y,8,2);
  ctx.fillStyle=c1; ctx.fillRect(x+2,y+2,12,2); ctx.fillRect(x+14,y+2,12,2);
  // 가운데 넓은 부분
  ctx.fillStyle=c1; ctx.fillRect(x,y+4,28,4);
  ctx.fillStyle=c2; ctx.fillRect(x+2,y+4,24,4);
  ctx.fillStyle=c1; ctx.fillRect(x+2,y+8,24,4);
  ctx.fillStyle=c2; ctx.fillRect(x+3,y+8,22,4);
  // 아래로 좁아지는 부분
  ctx.fillStyle=c1; ctx.fillRect(x+4,y+12,20,3);
  ctx.fillStyle=c1; ctx.fillRect(x+6,y+15,16,3);
  ctx.fillStyle=c1; ctx.fillRect(x+8,y+18,12,2);
  ctx.fillStyle=c1; ctx.fillRect(x+10,y+20,8,2);
  ctx.fillStyle=cS; ctx.fillRect(x+12,y+22,4,2);
  if (filled) {
    // 하이라이트 (상단 좌측 빛반사)
    ctx.fillStyle=c4; ctx.fillRect(x+5,y+1,4,2); ctx.fillRect(x+17,y+1,4,2);
    ctx.fillStyle=c3; ctx.fillRect(x+3,y+4,8,3);
    ctx.fillStyle=c5; ctx.fillRect(x+5,y+5,4,2); ctx.fillRect(x+17,y+5,4,2);
    ctx.fillStyle='#fcc'; ctx.fillRect(x+5,y+5,2,2); ctx.fillRect(x+17,y+5,2,2);
    ctx.fillStyle='#fee'; ctx.fillRect(x+6,y+5,1,1); ctx.fillRect(x+18,y+5,1,1);
    // 그림자 (하단)
    ctx.fillStyle=cS; ctx.fillRect(x+10,y+18,8,2); ctx.fillRect(x+12,y+20,4,4);
    ctx.fillStyle='#600'; ctx.fillRect(x+14,y+21,2,2);
    // 외곽 어두운 테두리
    ctx.fillStyle=cS;
    ctx.fillRect(x+2,y+2,2,2); ctx.fillRect(x+24,y+2,2,2);
    ctx.fillRect(x,y+4,2,2); ctx.fillRect(x+26,y+4,2,2);
  }
}

function drawItemSlot() {
  const sy = 670, sw = 120, sh = 44;
  const napalNames = { invincible: '무적의 나팔', heal: '치유의 나팔', venom_horn: '독 나팔', iron_wall: '철갑 나팔', rage_horn: '분노 나팔', tide_horn: '조류 나팔' };
  const bowNames   = { bow_normal: '일반 활', bow_heavy: '중 활', bow_homing: '유도 활', stun_flute: '취관' };

  // ── 나팔 슬롯 (E키) ──
  if (selectedItem) {
    const sx = 430;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx - 4, sy - 4, sw + 8, sh + 8);
    ctx.strokeStyle = player.invincible > 100 ? '#88f' : (player.ironWall > 0 ? '#b0c0d8' : (player.rageFrenzy > 0 ? '#ff5010' : (player.tideActive > 0 ? '#00e5ff' : '#666')));
    ctx.lineWidth = 2;
    ctx.strokeRect(sx - 4, sy - 4, sw + 8, sh + 8);

    drawItemIcon(sx, sy, selectedItem, player.itemCd > 0);

    ctx.font = pixelFont(11);
    ctx.fillStyle = player.itemCd > 0 ? '#888' : '#ff8';
    ctx.textAlign = 'center';
    ctx.fillText(napalNames[selectedItem] || selectedItem, sx + 60, sy + 14);
    ctx.fillStyle = '#aaa';
    ctx.fillText(`남은 횟수: ${player.itemUses}  [E]`, sx + 60, sy + 30);

    if (player.invincible > 100) {
      ctx.fillStyle = 'rgba(100,100,255,0.25)';
      ctx.fillRect(sx-4, sy-4, sw+8, sh+8);
    }
    if (player.ironWall > 0) {
      ctx.fillStyle = 'rgba(176,192,216,0.28)';
      ctx.fillRect(sx-4, sy-4, sw+8, sh+8);
    }
    if (player.rageFrenzy > 0) {
      ctx.fillStyle = 'rgba(255,80,16,0.25)';
      ctx.fillRect(sx-4, sy-4, sw+8, sh+8);
    }
    if (player.tideActive > 0) {
      ctx.fillStyle = 'rgba(0,229,255,0.2)';
      ctx.fillRect(sx-4, sy-4, sw+8, sh+8);
    }
    ctx.textAlign = 'left';
  }

  // ── 활 슬롯 (R키) ──
  if (selectedBow) {
    const sx = 730;
    const onCd = player.bowCd > 0;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx - 4, sy - 4, sw + 8, sh + 8);
    ctx.strokeStyle = onCd ? '#555' : '#666';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx - 4, sy - 4, sw + 8, sh + 8);

    drawItemIcon(sx, sy, selectedBow, onCd);

    ctx.font = pixelFont(11);
    ctx.fillStyle = onCd ? '#888' : '#ff8';
    ctx.textAlign = 'center';
    ctx.fillText(bowNames[selectedBow], sx + 60, sy + 14);
    ctx.fillStyle = '#aaa';
    ctx.fillText(`남은 횟수: ${player.bowUses}  [Q]`, sx + 60, sy + 30);
    if (boss.stunned > 0) {
      ctx.fillStyle = 'rgba(200,150,255,0.25)';
      ctx.fillRect(sx-4, sy-4, sw+8, sh+8);
    }
    ctx.textAlign = 'left';
  }

  // ── 마법 슬롯 (R키) ──
  if (selectedMagic) {
    const mdef = magics.find(m => m.id === selectedMagic);
    if (mdef) {
      const sx = 570, onCd = player.magicCd > 0;
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(sx - 4, sy - 4, sw + 8, sh + 8);
      ctx.strokeStyle = onCd ? '#555' : mdef.color; ctx.lineWidth = 2;
      ctx.strokeRect(sx - 4, sy - 4, sw + 8, sh + 8);
      if (player.magicEffects.some(e => e.type === selectedMagic || (selectedMagic === 'black_hole' && e.type === 'black_hole'))) {
        ctx.fillStyle = mdef.color + '22'; ctx.fillRect(sx - 4, sy - 4, sw + 8, sh + 8);
      }
      ctx.save(); ctx.translate(sx + 4, sy + 4); ctx.scale(1.1, 1.1);
      drawMagicIcon(0, 0, selectedMagic); ctx.restore();
      ctx.font = pixelFont(11); ctx.fillStyle = onCd ? '#555' : mdef.color; ctx.textAlign = 'center';
      ctx.fillText(mdef.name, sx + 60, sy + 14);
      ctx.fillStyle = '#aaa';
      if (onCd) {
        ctx.fillText(`쿨타임: ${Math.ceil(player.magicCd / 60)}초`, sx + 60, sy + 30);
      } else {
        ctx.fillText('사용 가능  [R]', sx + 60, sy + 30);
      }
      ctx.textAlign = 'left';
    }
  }
}

function drawItemIcon(x, y, type, greyed) {
  ctx.save();
  if (greyed) ctx.globalAlpha = 0.4;
  if (type === 'invincible') {
    ctx.fillStyle = '#66f';
    ctx.fillRect(x+2, y+6, 8, 32);
    ctx.fillRect(x+14, y+6, 8, 32);
    ctx.fillStyle = '#aaf';
    ctx.fillRect(x+2, y+2, 8, 8);
    ctx.fillRect(x+14, y+2, 8, 8);
    ctx.fillStyle = '#88f';
    ctx.beginPath(); ctx.arc(x+6, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(x+18, y+4, 6, Math.PI, 0); ctx.fill();
  } else if (type === 'venom_horn') {
    ctx.fillStyle = '#4a8020';
    ctx.fillRect(x+2, y+6, 8, 28); ctx.fillRect(x+14, y+6, 8, 28);
    ctx.fillStyle = '#80e040';
    ctx.fillRect(x+2, y+2, 8, 8); ctx.fillRect(x+14, y+2, 8, 8);
    ctx.fillStyle = '#a0f060';
    ctx.beginPath(); ctx.arc(x+6, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(x+18, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#60b030'; ctx.fillRect(x+2, y+20, 20, 4);
  } else if (type === 'iron_wall') {
    ctx.fillStyle = '#607890';
    ctx.fillRect(x+2, y+6, 8, 28); ctx.fillRect(x+14, y+6, 8, 28);
    ctx.fillStyle = '#b0c0d8';
    ctx.fillRect(x+2, y+2, 8, 8); ctx.fillRect(x+14, y+2, 8, 8);
    ctx.fillStyle = '#90a8c0';
    ctx.beginPath(); ctx.arc(x+6, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(x+18, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#d0e0f0'; ctx.fillRect(x+2, y+20, 20, 4);
    ctx.fillStyle = '#405060'; ctx.fillRect(x+4, y+21, 2, 2); ctx.fillRect(x+10, y+21, 2, 2); ctx.fillRect(x+16, y+21, 2, 2);
  } else if (type === 'rage_horn') {
    ctx.fillStyle = '#cc3000';
    ctx.fillRect(x+2, y+6, 8, 28); ctx.fillRect(x+14, y+6, 8, 28);
    ctx.fillStyle = '#ff5010';
    ctx.fillRect(x+2, y+2, 8, 8); ctx.fillRect(x+14, y+2, 8, 8);
    ctx.fillStyle = '#ff7030';
    ctx.beginPath(); ctx.arc(x+6, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(x+18, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#ff4'; ctx.fillRect(x+4, y-4, 4, 6); ctx.fillRect(x+16, y-4, 4, 6);
    ctx.fillStyle = '#f80'; ctx.fillRect(x+2, y+22, 20, 4);
  } else if (type === 'tide_horn') {
    ctx.fillStyle = '#006898';
    ctx.fillRect(x+2, y+6, 8, 28); ctx.fillRect(x+14, y+6, 8, 28);
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(x+2, y+2, 8, 8); ctx.fillRect(x+14, y+2, 8, 8);
    ctx.fillStyle = '#40eeff';
    ctx.beginPath(); ctx.arc(x+6, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(x+18, y+4, 6, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#29b6f6'; ctx.fillRect(x+2, y+20, 20, 4);
    ctx.fillStyle = '#80deea'; ctx.fillRect(x+4, y+22, 4, 2); ctx.fillRect(x+12, y+22, 4, 2);
  } else if (type === 'heal') {
    ctx.fillStyle = '#4d4';
    ctx.fillRect(x+4, y+4, 8, 36);
    ctx.fillStyle = '#8f8';
    ctx.fillRect(x+4, y, 8, 8);
    ctx.fillStyle = '#afa';
    ctx.fillRect(x, y+10, 16, 8);
    ctx.fillRect(x, y+24, 16, 8);
  } else if (type === 'bow_normal' || type === 'bow_heavy' || type === 'bow_homing') {
    const bc = type==='bow_normal' ? '#8af' : type==='bow_heavy' ? '#fa8' : '#af8';
    const ac = type==='bow_homing' ? '#af8' : '#ddd';
    // 활 몸통 (픽셀 곡선)
    ctx.fillStyle = bc;
    ctx.fillRect(x+16, y+2,  4, 4);
    ctx.fillRect(x+14, y+6,  4, 4);
    ctx.fillRect(x+12, y+10, 4, 6);
    ctx.fillRect(x+12, y+16, 4, 6);
    ctx.fillRect(x+12, y+22, 4, 6);
    ctx.fillRect(x+14, y+28, 4, 4);
    ctx.fillRect(x+16, y+32, 4, 4);
    // 시위
    ctx.fillStyle = '#ccc';
    ctx.fillRect(x+18, y+2,  2, 4);
    ctx.fillRect(x+8,  y+16, 10, 2);
    ctx.fillRect(x+18, y+32, 2, 4);
    ctx.fillRect(x+6,  y+7,  4, 22);
    // 화살
    ctx.fillStyle = ac;
    ctx.fillRect(x, y+17, 12, 2);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+11, y+15, 4, 6);
    ctx.fillRect(x, y+15, 2, 2);
    ctx.fillRect(x, y+19, 2, 2);
    if (type === 'bow_homing') {
      // 유도 화살: 초록 빛 파티클 표시
      ctx.fillStyle = '#4f8'; ctx.fillRect(x+4, y+8, 3, 3); ctx.fillRect(x+6, y+28, 3, 3);
    }
    if (type === 'bow_heavy') {
      ctx.fillStyle = '#fa8'; ctx.fillRect(x, y+16, 12, 4);
    }
  } else if (type === 'stun_flute') {
    // 취관 - 둥글고 짧은 관
    ctx.fillStyle = '#c8f';
    ctx.fillRect(x+2, y+10, 26, 10);
    ctx.fillStyle = '#a6d';
    ctx.fillRect(x+2, y+10, 6, 10);
    ctx.fillStyle = '#e8f';
    for (let i=0; i<3; i++) ctx.fillRect(x+10+i*6, y+12, 4, 6);
    ctx.fillStyle = '#80b'; ctx.fillRect(x+26, y+8, 4, 14);
    // 별 모양 효과
    ctx.fillStyle = '#fff'; ctx.fillRect(x+12, y+2, 4, 4); ctx.fillRect(x+10, y+4, 2, 2); ctx.fillRect(x+16, y+4, 2, 2);
  }
  ctx.restore();
}

// ══════════════════════════════════════════
//  보스 선택 화면
// ══════════════════════════════════════════
const bossSelectHover = { hover: false };
function drawBossSelect() {
  // 배경 (스크롤 무관)
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 1280, 720);

  // 스크롤 보정된 마우스 Y
  const amy = mouse.y + bossSelectScroll;

  ctx.save();
  ctx.translate(0, -bossSelectScroll);

  // 제목
  ctx.font = pixelFont(52);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#DAA520';
  ctx.fillText('DONG RPG', 640, 100);
  ctx.font = pixelFont(20);
  ctx.fillStyle = '#888';
  ctx.fillText('보스를 선택하세요', 640, 148);
  ctx.font = pixelFont(13);
  ctx.fillStyle = '#555';
  ctx.fillText('ver 2', 640, 172);

  function drawBossClears(bossId, centerX, y) {
    const c = clearData[bossId] || {};
    const marks = [];
    if (c.easy)   marks.push('#00e060');
    if (c.normal) marks.push('#ffffff');
    if (c.hard)   marks.push('#ff4040');
    if (!marks.length) return;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    const spacing = 22;
    const startX = centerX - (marks.length - 1) * spacing / 2;
    marks.forEach((col, i) => {
      ctx.fillStyle = col;
      ctx.fillText('✓', startX + i * spacing, y);
    });
    ctx.textAlign = 'center';
  }

  const cardW = 255, cardH = 380, cardGap = 20;
  const cx4 = (1280 - cardW*4 - cardGap*3) / 2;
  const cx1 = cx4 + cardW + cardGap;
  const cx2 = cx1 + cardW + cardGap;
  const cx3 = cx2 + cardW + cardGap;
  const cy = 200;
  const unlockKnight = isBossCleared('sandworm');
  const unlockDragon = isBossCleared('knight');
  const unlockEel    = isBossCleared('dragon');

  function drawLockOverlay(cx, cy) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.font = 'bold 38px sans-serif';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.fillText('🔒', cx + cardW/2, cy + cardH/2 - 10);
    ctx.font = pixelFont(13);
    ctx.fillStyle = '#aaa';
    ctx.fillText('이전 보스 클리어 필요', cx + cardW/2, cy + cardH/2 + 26);
    ctx.textAlign = 'center';
  }

  // ── 보스 카드 1: 황금 기사 ──
  const hov1 = unlockKnight && mouse.x > cx1 && mouse.x < cx1+cardW && amy > cy && amy < cy+cardH;
  const sel1 = selectedBoss === 'knight';
  ctx.fillStyle = hov1 || sel1 ? '#1a1400' : '#111';
  ctx.fillRect(cx1, cy, cardW, cardH);
  ctx.strokeStyle = sel1 ? '#DAA520' : (hov1 ? '#aa8010' : '#444');
  ctx.lineWidth = sel1 ? 4 : 2;
  ctx.strokeRect(cx1, cy, cardW, cardH);
  if (sel1) { ctx.fillStyle = 'rgba(218,165,32,0.08)'; ctx.fillRect(cx1,cy,cardW,cardH); }

  ctx.save(); ctx.translate(cx1 + cardW/2 - 30, cy + 65); ctx.scale(1.4, 1.4);
  drawBoss(0, 0, -1, 0, 0, 0, 'idle');
  ctx.restore();

  ctx.font = pixelFont(18); ctx.fillStyle = '#DAA520'; ctx.textAlign = 'center';
  ctx.fillText('황금 기사 도끼왕', cx1 + cardW/2, cy + 292);
  ctx.font = pixelFont(12); ctx.fillStyle = '#f88';
  ctx.fillText('위험도: ★★★★☆', cx1 + cardW/2, cy + 316);
  drawBossClears('knight', cx1 + cardW/2, cy + 338);
  if (hov1 || sel1) {
    ctx.font = pixelFont(14); ctx.fillStyle = sel1 ? '#DAA520' : '#ff8';
    ctx.fillText(sel1 ? '▶ 선택됨' : '[ 클릭하여 선택 ]', cx1 + cardW/2, cy + 364);
  }
  if (!unlockKnight) drawLockOverlay(cx1, cy);

  // ── 보스 카드 2: 붉은 비룡 ──
  const hov2 = unlockDragon && mouse.x > cx2 && mouse.x < cx2+cardW && amy > cy && amy < cy+cardH;
  const sel2 = selectedBoss === 'dragon';
  ctx.fillStyle = hov2 || sel2 ? '#140a00' : '#111';
  ctx.fillRect(cx2, cy, cardW, cardH);
  ctx.strokeStyle = sel2 ? '#c02020' : (hov2 ? '#882010' : '#444');
  ctx.lineWidth = sel2 ? 4 : 2;
  ctx.strokeRect(cx2, cy, cardW, cardH);
  if (sel2) { ctx.fillStyle = 'rgba(180,20,20,0.08)'; ctx.fillRect(cx2,cy,cardW,cardH); }

  ctx.save();
  ctx.translate(cx2 + 140, cy + 74); ctx.scale(0.35, 0.35);
  drawDragon(0, 0, 0, 'idle', 0, 999, 0);
  ctx.restore();
  ctx.globalAlpha = 1;

  ctx.font = pixelFont(18); ctx.fillStyle = '#c03030'; ctx.textAlign = 'center';
  ctx.fillText('붉은 비룡', cx2 + cardW/2, cy + 280);
  ctx.font = pixelFont(12); ctx.fillStyle = '#f88';
  ctx.fillText('위험도: ★★★★★', cx2 + cardW/2, cy + 304);
  drawBossClears('dragon', cx2 + cardW/2, cy + 326);
  if (hov2 || sel2) {
    ctx.font = pixelFont(14); ctx.fillStyle = sel2 ? '#c03030' : '#ff8';
    ctx.fillText(sel2 ? '▶ 선택됨' : '[ 클릭하여 선택 ]', cx2 + cardW/2, cy + 364);
  }
  if (!unlockDragon) drawLockOverlay(cx2, cy);

  // ── 보스 카드 3: 심해 곰치 ──
  const hov3 = unlockEel && mouse.x > cx3 && mouse.x < cx3+cardW && amy > cy && amy < cy+cardH;
  const sel3 = selectedBoss === 'eel';
  ctx.fillStyle = hov3 || sel3 ? '#001820' : '#111';
  ctx.fillRect(cx3, cy, cardW, cardH);
  ctx.strokeStyle = sel3 ? '#00bcd4' : (hov3 ? '#007c91' : '#444');
  ctx.lineWidth = sel3 ? 4 : 2;
  ctx.strokeRect(cx3, cy, cardW, cardH);
  if (sel3) { ctx.fillStyle = 'rgba(0,188,212,0.07)'; ctx.fillRect(cx3,cy,cardW,cardH); }

  // 곰치 미리보기 (실제 drawEel 사용)
  ctx.save();
  ctx.beginPath(); ctx.rect(cx3, cy, cardW, cardH - 100); ctx.clip();
  ctx.translate(cx3 + 98, cy + 148);
  ctx.scale(0.8, 0.8);
  ctx.translate(-EEL_BASE_X, -EEL_BASE_Y);
  drawEel(0, 0, 'idle', 0, Math.PI);
  ctx.restore();

  ctx.font = pixelFont(16); ctx.fillStyle = '#00bcd4'; ctx.textAlign = 'center';
  ctx.fillText('심해 곰치', cx3 + cardW/2, cy + 282);
  ctx.font = pixelFont(12); ctx.fillStyle = '#80deea';
  ctx.fillText('위험도: ★★★★★★', cx3 + cardW/2, cy + 306);
  drawBossClears('eel', cx3 + cardW/2, cy + 328);
  if (hov3 || sel3) {
    ctx.font = pixelFont(14); ctx.fillStyle = sel3 ? '#00bcd4' : '#ff8';
    ctx.fillText(sel3 ? '▶ 선택됨' : '[ 클릭하여 선택 ]', cx3 + cardW/2, cy + 364);
  }
  if (!unlockEel) drawLockOverlay(cx3, cy);

  // ── 보스 카드 4: 샌드 웜 ──
  const hov4 = mouse.x > cx4 && mouse.x < cx4+cardW && amy > cy && amy < cy+cardH;
  const sel4 = selectedBoss === 'sandworm';
  ctx.fillStyle = hov4 || sel4 ? '#1a1200' : '#111';
  ctx.fillRect(cx4, cy, cardW, cardH);
  ctx.strokeStyle = sel4 ? '#d4a030' : (hov4 ? '#906820' : '#444');
  ctx.lineWidth = sel4 ? 4 : 2;
  ctx.strokeRect(cx4, cy, cardW, cardH);
  if (sel4) { ctx.fillStyle = 'rgba(212,160,48,0.08)'; ctx.fillRect(cx4,cy,cardW,cardH); }

  // 샌드 웜 머리 미리보기 (실제 drawSwHead 사용)
  ctx.save();
  ctx.beginPath(); ctx.rect(cx4, cy, cardW, cardH - 100); ctx.clip();
  ctx.translate(cx4 + cardW/2 + 15, cy + 200);
  drawSwHead(0, 0, 0, 0, 1.3);
  ctx.restore();

  ctx.font = pixelFont(16); ctx.fillStyle = '#d4a030'; ctx.textAlign = 'center';
  ctx.fillText('샌드 웜', cx4 + cardW/2, cy + 282);
  ctx.font = pixelFont(12); ctx.fillStyle = '#f0c040';
  ctx.fillText('위험도: ★★', cx4 + cardW/2, cy + 306);
  drawBossClears('sandworm', cx4 + cardW/2, cy + 328);
  if (hov4 || sel4) {
    ctx.font = pixelFont(14); ctx.fillStyle = sel4 ? '#d4a030' : '#ff8';
    ctx.fillText(sel4 ? '▶ 선택됨' : '[ 클릭하여 선택 ]', cx4 + cardW/2, cy + 364);
  }
  bossSelectHover.hover = hov1 || hov2 || hov3 || hov4;

  // 쉬움 모드 토글 버튼
  const bx = 490, by = cy + cardH + 22, bw = 300, bh = 44;
  const bHover = mouse.x > bx && mouse.x < bx+bw && amy > by && amy < by+bh;
  ctx.fillStyle = easyMode ? '#0a2a0a' : (bHover ? '#1a1a1a' : '#111');
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = easyMode ? '#4d4' : (bHover ? '#aaa' : '#444');
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.font = pixelFont(15);
  ctx.fillStyle = easyMode ? '#4f4' : (bHover ? '#ccc' : '#777');
  ctx.fillText(easyMode ? '쉬움 모드  ON  ✓' : '쉬움 모드  OFF', 640, by + bh/2 + 6);

  ctx.font = pixelFont(12);
  ctx.fillStyle = '#555';
  ctx.fillText('보스 HP 30 · 패턴 느려짐 · 이동 속도 감소', 640, by + bh + 18);

  // 어려움 모드 버튼
  const hbx = 490, hby = by + bh + 50, hbw = 300, hbh = 44;
  const hbHover = mouse.x > hbx && mouse.x < hbx+hbw && amy > hby && amy < hby+hbh;
  ctx.fillStyle = hardMode ? '#1a0505' : (hbHover ? '#1a1a1a' : '#111');
  ctx.fillRect(hbx, hby, hbw, hbh);
  ctx.strokeStyle = hardMode ? '#c33' : (hbHover ? '#888' : '#444');
  ctx.lineWidth = 2;
  ctx.strokeRect(hbx, hby, hbw, hbh);
  ctx.font = pixelFont(15);
  ctx.fillStyle = hardMode ? '#f44' : (hbHover ? '#ccc' : '#777');
  ctx.fillText(hardMode ? '어려움 모드  ON  ✓' : '어려움 모드  OFF', 640, hby + hbh/2 + 6);
  ctx.font = pixelFont(12);
  ctx.fillStyle = '#553333';
  ctx.fillText('보스 2페이즈 · 검은 갑주 · 반투명 금색 날개', 640, hby + hbh + 18);

  // ── 대장간 버튼 ──
  {
    const smX = 820, smY = by, smW = 420, smH = 152;
    const smHov = mouse.x > smX && mouse.x < smX+smW && amy > smY && amy < smY+smH;
    ctx.fillStyle = smHov ? 'rgba(30,14,8,0.97)' : 'rgba(18,8,4,0.92)';
    ctx.fillRect(smX, smY, smW, smH);
    ctx.strokeStyle = smHov ? '#a05030' : '#442210';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(smX, smY, smW, smH);
    if (smHov) { ctx.fillStyle='rgba(120,60,20,0.07)'; ctx.fillRect(smX,smY,smW,smH); }

    ctx.font = pixelFont(13); ctx.fillStyle = smHov ? '#f0a060' : '#a06030'; ctx.textAlign = 'left';
    ctx.fillText('대장간', smX + 10, smY + 18);
    ctx.font = pixelFont(11); ctx.fillStyle = smHov ? '#f08040' : '#604020'; ctx.textAlign = 'right';
    ctx.fillText('▶ 소재로 장비 제작', smX + smW - 8, smY + 18);
    ctx.strokeStyle = '#2a1800'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(smX+6, smY+25); ctx.lineTo(smX+smW-6, smY+25); ctx.stroke();

    // 장착 갑옷 표시
    if (selectedArmor) {
      const armorDef = ARMORS.find(a => a.id === selectedArmor);
      if (armorDef) {
        ctx.font = pixelFont(11); ctx.fillStyle = armorDef.color; ctx.textAlign = 'center';
        ctx.fillText('장착: ' + armorDef.name, smX + smW/2, smY + 50);
        ctx.font = pixelFont(10); ctx.fillStyle = '#888';
        ctx.fillText(armorDef.desc, smX + smW/2, smY + 68);
      }
    } else {
      ctx.font = pixelFont(11); ctx.fillStyle = '#554'; ctx.textAlign = 'center';
      ctx.fillText('갑옷 없음', smX + smW/2, smY + 60);
    }

    // 제작 가능한 레시피 수 표시
    let craftable = 0;
    for (const [bk, recipes] of Object.entries(SMITHY_RECIPES)) {
      for (const rec of Object.values(recipes)) {
        if (!craftedItems?.[rec.id] && canCraftRecipe(rec)) craftable++;
      }
    }
    if (craftable > 0) {
      ctx.font = pixelFont(11); ctx.fillStyle = '#f0a030'; ctx.textAlign = 'center';
      ctx.fillText('제작 가능: ' + craftable + '개', smX + smW/2, smY + smH - 16);
    } else {
      ctx.font = pixelFont(10); ctx.fillStyle = '#443'; ctx.textAlign = 'center';
      ctx.fillText('소재를 모아 장비를 제작하세요', smX + smW/2, smY + smH - 16);
    }
    ctx.textAlign = 'center';
  }

  // ── 인벤토리 패널 ──
  {
    const ivX = 40, ivY = by, ivW = 420, ivH = 152;
    const ivHov = mouse.x > ivX && mouse.x < ivX+ivW && amy > ivY && amy < ivY+ivH;
    ctx.fillStyle = ivHov ? 'rgba(14,14,30,0.97)' : 'rgba(8,8,18,0.92)';
    ctx.fillRect(ivX, ivY, ivW, ivH);
    ctx.strokeStyle = ivHov ? '#556' : '#333';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ivX, ivY, ivW, ivH);
    if (ivHov) { ctx.fillStyle='rgba(80,80,120,0.07)'; ctx.fillRect(ivX,ivY,ivW,ivH); }

    ctx.font = pixelFont(13);
    ctx.fillStyle = ivHov ? '#ddd' : '#aaa';
    ctx.textAlign = 'left';
    ctx.fillText('인벤토리', ivX + 10, ivY + 18);
    // 클릭 힌트
    ctx.font = pixelFont(11);
    ctx.fillStyle = ivHov ? '#88aaff' : '#445';
    ctx.textAlign = 'right';
    ctx.fillText('▶ 소재 창고 보기', ivX + ivW - 8, ivY + 18);

    ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(ivX+6, ivY+25); ctx.lineTo(ivX+ivW-6, ivY+25); ctx.stroke();

    // 드롭 안내
    ctx.font = pixelFont(10);
    ctx.fillStyle = '#444';
    ctx.textAlign = 'right';
    ctx.fillText('쉬움: 일반×3  /  일반: +희귀  /  어려움: +전설  /  6%: 극희귀', ivX + ivW - 6, ivY + 18);

    // 소재 목록
    const allMats = Object.values(BOSS_MATERIALS).flat();
    const owned = allMats.filter(m => inventory[m.id] > 0);
    if (owned.length === 0) {
      ctx.font = pixelFont(12);
      ctx.fillStyle = '#444';
      ctx.textAlign = 'center';
      ctx.fillText('보스 클리어 시 소재 획득', ivX + ivW/2, ivY + 88);
    } else {
      const cols = 3, colW = (ivW - 12) / cols, rowH = 20;
      owned.forEach((m, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const ix = ivX + 6 + col * colW;
        const iy = ivY + 36 + row * rowH;
        // 색상 아이콘
        ctx.fillStyle = m.color;
        ctx.fillRect(ix, iy - 9, 10, 10);
        // 희귀도별 테두리
        const rarityCol = m.rarity === '극희귀' ? '#ea80fc' : m.rarity === '전설' ? '#ff2060' : m.rarity === '희귀' ? '#b0b0c8' : '#888';
        ctx.strokeStyle = rarityCol; ctx.lineWidth = 1;
        ctx.strokeRect(ix, iy - 9, 10, 10);
        // 이름 + 수량
        ctx.font = pixelFont(11);
        ctx.fillStyle = '#ccc';
        ctx.textAlign = 'left';
        ctx.fillText(`${m.name} ×${inventory[m.id]}`, ix + 14, iy);
      });
    }
    ctx.textAlign = 'center';
  }

  ctx.textAlign = 'left';
  ctx.restore();

  // 스크롤바 (콘텐츠가 넘칠 때)
  if (BOSS_SELECT_MAX_SCROLL > 0) {
    const sbH = Math.round(720 * 720 / (720 + BOSS_SELECT_MAX_SCROLL));
    const sbY = Math.round((720 - sbH) * bossSelectScroll / BOSS_SELECT_MAX_SCROLL);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(1272, 0, 6, 720);
    ctx.fillStyle = 'rgba(218,165,32,0.7)';
    ctx.fillRect(1272, sbY, 6, sbH);
  }
}

function drawInventoryScreen() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, 1280, 720);

  // 제목
  ctx.font = pixelFont(32); ctx.textAlign = 'center';
  ctx.fillStyle = '#8899cc';
  ctx.fillText('소재 창고', 640, 62);
  ctx.font = pixelFont(12); ctx.fillStyle = '#334';
  ctx.fillText('보스를 클리어하면 소재를 획득합니다', 640, 88);
  ctx.strokeStyle = '#223'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40, 100); ctx.lineTo(1240, 100); ctx.stroke();

  // 뒤로가기 버튼
  const backW = 110, backH = 38, backX = 20, backY = 20;
  const backHov = mouse.x > backX && mouse.x < backX+backW && mouse.y > backY && mouse.y < backY+backH;
  ctx.fillStyle = backHov ? '#1a1a2a' : '#10101a'; ctx.fillRect(backX, backY, backW, backH);
  ctx.strokeStyle = backHov ? '#8899cc' : '#334'; ctx.lineWidth = 2;
  ctx.strokeRect(backX, backY, backW, backH);
  ctx.font = pixelFont(14); ctx.fillStyle = backHov ? '#aabbff' : '#556'; ctx.textAlign = 'center';
  ctx.fillText('◀ 뒤로', backX + backW/2, backY + backH/2 + 5);

  // 드롭 안내
  ctx.font = pixelFont(11); ctx.fillStyle = '#445'; ctx.textAlign = 'right';
  ctx.fillText('쉬움: 일반×3  /  일반: +희귀  /  어려움: +전설  /  6%: 극희귀', 1240, 88);

  // 스크롤 가능 영역
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 104, 1280, 616); ctx.clip();
  ctx.translate(0, -inventoryScroll);

  const bossKeys = ['sandworm', 'knight', 'dragon', 'eel'];
  const itemW = 280, itemH = 64, cols = 4, colGap = 10;
  const rowW = cols * itemW + (cols-1) * colGap;
  const startX = Math.floor((1280 - rowW) / 2);
  let curY = 116;

  for (const bossKey of bossKeys) {
    const mats = BOSS_MATERIALS[bossKey];
    const label = BOSS_LABELS[bossKey];
    // 보스 이름 헤더
    ctx.font = pixelFont(15); ctx.textAlign = 'left';
    ctx.fillStyle = label.color;
    ctx.fillText(label.name, startX, curY + 14);
    // 클리어 여부
    if (isBossCleared(bossKey)) {
      ctx.font = pixelFont(11); ctx.fillStyle = '#3a3';
      ctx.fillText(' ✓ 클리어', startX + 160, curY + 14);
    } else {
      ctx.font = pixelFont(11); ctx.fillStyle = '#554';
      ctx.fillText(' 미클리어', startX + 160, curY + 14);
    }
    curY += 22;

    // 소재 카드
    for (let ci = 0; ci < mats.length; ci++) {
      const m = mats[ci];
      const cx = startX + ci * (itemW + colGap);
      const cy = curY;
      const owned = (inventory[m.id] || 0) > 0;
      const rc = RARITY_COLOR[m.rarity];

      ctx.fillStyle = owned ? 'rgba(12,12,28,0.97)' : 'rgba(8,8,16,0.7)';
      ctx.fillRect(cx, cy, itemW, itemH);
      ctx.strokeStyle = owned ? rc : '#222';
      ctx.lineWidth = owned ? 1.5 : 1;
      ctx.strokeRect(cx, cy, itemW, itemH);
      if (owned) { ctx.fillStyle = rc + '18'; ctx.fillRect(cx, cy, itemW, itemH); }

      // 색상 아이콘
      ctx.fillStyle = owned ? m.color : '#2a2a2a';
      ctx.fillRect(cx + 12, cy + 14, 22, 22);
      ctx.strokeStyle = owned ? rc : '#333'; ctx.lineWidth = 1;
      ctx.strokeRect(cx + 12, cy + 14, 22, 22);
      if (owned) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(cx+12, cy+14, 22, 6);
      }

      // 이름
      ctx.font = pixelFont(13); ctx.textAlign = 'left';
      ctx.fillStyle = owned ? '#ddd' : '#3a3a3a';
      ctx.fillText(m.name, cx + 42, cy + 24);

      // 희귀도
      ctx.font = pixelFont(10);
      ctx.fillStyle = owned ? rc : '#2a2a2a';
      ctx.fillText(m.rarity, cx + 42, cy + 40);

      // 수량
      if (owned) {
        const qty = inventory[m.id];
        ctx.font = pixelFont(16); ctx.textAlign = 'right';
        ctx.fillStyle = '#ccd';
        ctx.fillText(`×${qty}`, cx + itemW - 10, cy + 30);
        ctx.font = pixelFont(9); ctx.fillStyle = '#556';
        ctx.fillText('보유', cx + itemW - 10, cy + 44);
      } else {
        ctx.font = pixelFont(12); ctx.textAlign = 'right';
        ctx.fillStyle = '#2a2a2a';
        ctx.fillText('미획득', cx + itemW - 10, cy + 36);
      }
    }
    curY += itemH + 24;
  }

  ctx.restore();

  // 스크롤바
  if (INV_MAX_SCROLL > 0) {
    const totalH = 720 + INV_MAX_SCROLL;
    const sbH = Math.round(720 * 616 / (totalH));
    const sbY = 104 + Math.round((616 - sbH) * inventoryScroll / INV_MAX_SCROLL);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(1274, 104, 6, 616);
    ctx.fillStyle = 'rgba(136,153,204,0.5)'; ctx.fillRect(1274, sbY, 6, sbH);
  }
}

function drawItemCardRow(rowItems, cy, isNapal, amy) {
  const cw = 276, ch = 178;

    const item = rowItems[j];

    const hover = !disabled && mouse.x > cx && mouse.x < cx + cw && amy > cy && amy < cy + ch;
    const selected = isNapal ? (selectedItem === item.id) : (selectedBow === item.id);
    const bgSel = isNapal ? '#0c0c22' : '#0a1a0a';
    const bgHov = isNapal ? '#14140e' : '#0e140e';
    ctx.fillStyle = selected ? bgSel : (hover ? bgHov : '#111');
    ctx.fillRect(cx, cy, cw, ch);
    ctx.strokeStyle = selected ? item.color : (hover ? '#666' : '#333');

    ctx.fillText(item.desc1, cx + 88, cy + 58);

}

//  대장간 화면
// ══════════════════════════════════════════
function drawSmithyScreen() {
  ctx.fillStyle = '#090807';
  ctx.fillRect(0, 0, 1280, 720);

  const cW = 280, cH = 196, gap = 12;
  const sX = Math.floor((1280 - (cW*4 + gap*3)) / 2);
  const bossKeys = ['sandworm','knight','dragon','eel'];
  const tierLabels = { armor:'방어구', item:'아이템', weapon:'무기', magic:'마법' };
  const tierColors = { armor:'#c0a000', item:'#4aaaf0', weapon:'#e06060', magic:'#a060f0' };
  const recipeIds = ['armor','item','weapon','magic'];

  ctx.save();
  ctx.translate(0, -smithyScroll);

  let secY = 90;
  for (const bk of bossKeys) {
    const label = BOSS_LABELS[bk];
    // 보스 섹션 헤더
    ctx.font = pixelFont(16); ctx.fillStyle = label.color; ctx.textAlign = 'left';
    ctx.fillText('▶ ' + label.name, sX, secY + 28);
    ctx.strokeStyle = label.color + '55'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sX, secY + 34); ctx.lineTo(sX + cW*4 + gap*3, secY + 34); ctx.stroke();
    secY += 50;

    for (let ti = 0; ti < recipeIds.length; ti++) {
      const tier = recipeIds[ti];
      const recipe = SMITHY_RECIPES[bk][tier];
      const cx = sX + ti * (cW + gap), cy = secY;
      const crafted = !!(craftedItems && craftedItems[recipe.id]);
      const canDo = !crafted && canCraftRecipe(recipe);
      const isArmorEquipped = selectedArmor === recipe.id;
      const hover = mouse.x > cx && mouse.x < cx+cW && (mouse.y + smithyScroll) > cy && (mouse.y + smithyScroll) < cy+cH;

      // 카드 배경
      ctx.fillStyle = hover && (canDo || (crafted && recipe.type==='armor')) ? '#1a1008' : '#111';
      ctx.fillRect(cx, cy, cW, cH);
      ctx.strokeStyle = crafted ? recipe.color+'aa' : (canDo ? recipe.color+'66' : '#333');
      ctx.lineWidth = crafted ? 2 : 1.5;
      ctx.strokeRect(cx, cy, cW, cH);

      // 티어 태그
      ctx.font = pixelFont(10);
      ctx.fillStyle = tierColors[tier];
      ctx.textAlign = 'left';
      ctx.fillText('[' + tierLabels[tier] + ']', cx + 8, cy + 14);

      // 아이템 이름
      ctx.font = pixelFont(14); ctx.fillStyle = recipe.color;
      ctx.fillText(recipe.name, cx + 8, cy + 34);

      // 설명
      ctx.font = pixelFont(10); ctx.fillStyle = '#999';
      ctx.fillText(recipe.desc, cx + 8, cy + 50);

      // 재료 비용
      let matY = cy + 68;
      for (const [mid, needed] of Object.entries(recipe.cost)) {
        const mat = getMatById(mid);
        if (!mat) continue;
        const owned = inventory[mid] || 0;
        const ok = owned >= needed;
        ctx.fillStyle = mat.color;
        ctx.fillRect(cx + 8, matY - 9, 8, 8);
        ctx.strokeStyle = RARITY_COLOR[mat.rarity]; ctx.lineWidth = 0.8;
        ctx.strokeRect(cx + 8, matY - 9, 8, 8);
        ctx.font = pixelFont(10);
        ctx.fillStyle = ok ? '#aaa' : '#e05050';
        ctx.fillText(mat.name + ' × ' + needed + '  (보유 ' + owned + ')', cx + 20, matY);
        matY += 16;
      }

      // 상태 / 버튼
      const btnY = cy + cH - 28;
      if (recipe.type === 'armor' && crafted) {
        const eqHov = hover;
        ctx.fillStyle = isArmorEquipped ? '#1a1000' : (eqHov ? '#1a1800' : '#151510');
        ctx.fillRect(cx + 8, btnY, cW - 16, 22);
        ctx.strokeStyle = isArmorEquipped ? '#FFD700' : (eqHov ? '#aaa' : '#444');
        ctx.lineWidth = 1.5; ctx.strokeRect(cx + 8, btnY, cW - 16, 22);
        ctx.font = pixelFont(11); ctx.fillStyle = isArmorEquipped ? '#FFD700' : (eqHov ? '#fff' : '#aaa');
        ctx.textAlign = 'center';
        ctx.fillText(isArmorEquipped ? '▶ 장착 중  (클릭: 해제)' : '[ 장착 ]', cx + cW/2, btnY + 15);
      } else if (crafted) {
        ctx.font = pixelFont(11); ctx.fillStyle = '#4a8'; ctx.textAlign = 'center';
        ctx.fillText('✔ 제작 완료', cx + cW/2, btnY + 14);
      } else if (canDo) {
        ctx.fillStyle = hover ? '#1a3010' : '#121a0a';
        ctx.fillRect(cx + 8, btnY, cW - 16, 22);
        ctx.strokeStyle = hover ? '#8f4' : '#4a2'; ctx.lineWidth = 1.5;
        ctx.strokeRect(cx + 8, btnY, cW - 16, 22);
        ctx.font = pixelFont(11); ctx.fillStyle = hover ? '#aff' : '#8f8'; ctx.textAlign = 'center';
        ctx.fillText('[ 제작 ]', cx + cW/2, btnY + 15);
      } else {
        ctx.font = pixelFont(10); ctx.fillStyle = '#554'; ctx.textAlign = 'center';
        ctx.fillText('재료 부족', cx + cW/2, btnY + 14);
      }
    }
    secY += cH + 30;
  }

  ctx.restore();

  // 고정 헤더
  ctx.fillStyle = '#090807'; ctx.fillRect(0, 0, 1280, 78);
  ctx.font = pixelFont(32); ctx.textAlign = 'center'; ctx.fillStyle = '#f0a060';
  ctx.fillText('대장간', 640, 50);
  ctx.font = pixelFont(12); ctx.fillStyle = '#664422';
  ctx.fillText('소재를 사용해 장비를 제작합니다  ·  갑옷: 배틀 중 패시브 효과', 640, 70);

  if (selectedArmor) {
    const ad = ARMORS.find(a => a.id === selectedArmor);
    if (ad) {
      ctx.font = pixelFont(11); ctx.fillStyle = ad.color; ctx.textAlign = 'right';
      ctx.fillText('장착: ' + ad.name + '  [' + ad.desc + ']', 1260, 20);
    }
  }

  // 뒤로가기 버튼
  const backW = 110, backH = 38, backX = 20, backY = 20;
  const backHov = mouse.x > backX && mouse.x < backX+backW && mouse.y > backY && mouse.y < backY+backH;
  ctx.fillStyle = backHov ? '#1a1a1a' : '#111'; ctx.fillRect(backX, backY, backW, backH);
  ctx.strokeStyle = backHov ? '#a06030' : '#442210'; ctx.lineWidth = 2;
  ctx.strokeRect(backX, backY, backW, backH);
  ctx.font = pixelFont(14); ctx.fillStyle = backHov ? '#f0a060' : '#a06030'; ctx.textAlign = 'center';
  ctx.fillText('◀ 뒤로', backX + backW/2, backY + backH/2 + 5);

  // 스크롤바
  if (SMITHY_MAX_SCROLL > 0) {
    const totalH = 720 + SMITHY_MAX_SCROLL;
    const sbH = Math.round(720 * 720 / totalH);
    const sbY = Math.round((720 - sbH) * smithyScroll / SMITHY_MAX_SCROLL);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(1274, 0, 6, 720);
    ctx.fillStyle = 'rgba(200,120,60,0.5)'; ctx.fillRect(1274, sbY, 6, sbH);
  }
  ctx.textAlign = 'left';
}

function drawMagicIcon(x, y, id) {
  ctx.save();
  if (id === 'fire_pillar') {
    for (let i = 0; i < 5; i++) {
      const hy = y + 30 - i * 6;
      const a = 0.4 + i * 0.12;
      ctx.globalAlpha = a;
      ctx.fillStyle = i < 2 ? '#f42' : i < 4 ? '#f84' : '#ff8';
      ctx.fillRect(x + 10 + i, hy, 14 - i * 2, 8);
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#f20'; ctx.fillRect(x + 11, y + 30, 12, 4);
    ctx.fillStyle = '#888'; ctx.fillRect(x + 8, y + 34, 18, 3);
  } else if (id === 'ice_spear') {

    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(x + 30, y + 17); ctx.lineTo(x + 38, y + 12); ctx.lineTo(x + 38, y + 22); ctx.closePath(); ctx.fill();

    ctx.globalAlpha = 0.5; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(x + 22, y + 4); ctx.lineTo(x + 16, y + 16); ctx.lineTo(x + 20, y + 16); ctx.lineTo(x + 14, y + 28); ctx.lineTo(x + 24, y + 16); ctx.lineTo(x + 19, y + 16); ctx.lineTo(x + 26, y + 4); ctx.closePath(); ctx.fill();

    ctx.strokeStyle = '#c8f'; ctx.lineWidth = 1.5;

    ctx.beginPath(); ctx.moveTo(x+8, y+26); ctx.lineTo(x+17, y+38); ctx.lineTo(x+26, y+26); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#c08020';
    ctx.beginPath(); ctx.moveTo(x+10, y+26); ctx.lineTo(x+17, y+36); ctx.lineTo(x+24, y+26); ctx.closePath(); ctx.fill();

  } else if (id === 'divine_wrath') {

    ctx.fillStyle = '#80deea'; ctx.fillRect(x+6, y+16, 8, 4); ctx.fillRect(x+18, y+12, 12, 6);

  } else if (id === 'thunder_god') {

    ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.7; ctx.fillRect(x+14,y+4,5,18);

  } else if (id === 'dark_bomb') {
    for (let r2 = 14; r2 > 4; r2 -= 4) {
      ctx.globalAlpha = 0.2+(14-r2)*0.08; ctx.fillStyle='#86f';
      ctx.beginPath(); ctx.arc(x+17,y+20,r2,0,Math.PI*2); ctx.fill();

    ctx.strokeStyle='#a8f'; ctx.lineWidth=1.5;
    for (let a2=0; a2<6; a2++) {

      ctx.beginPath(); ctx.moveTo(x+17+Math.cos(ang)*9,y+20+Math.sin(ang)*9); ctx.lineTo(x+17+Math.cos(ang)*15,y+20+Math.sin(ang)*15); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawMagicCard(m, cx, cy, cw, ch) {
  const hover = mouse.x > cx && mouse.x < cx + cw && mouse.y > cy && mouse.y < cy + ch;
  const sel = selectedMagic === m.id;
  ctx.fillStyle = sel ? '#0a0a1e' : (hover ? '#10100e' : '#111');
  ctx.fillRect(cx, cy, cw, ch);
  ctx.strokeStyle = sel ? m.color : (hover ? '#666' : '#333');
  ctx.lineWidth = sel ? 3 : 2;
  ctx.strokeRect(cx, cy, cw, ch);
  if (sel) { ctx.fillStyle = m.color + '22'; ctx.fillRect(cx, cy, cw, ch); }
  const sc = ch / 110;
  ctx.save(); ctx.translate(cx + cw/2 - 17*sc, cy + ch*0.08); ctx.scale(sc, sc);
  drawMagicIcon(0, 0, m.id); ctx.restore();
  const lineH = Math.round(14 * ch / 220);
  ctx.textAlign = 'center';
  ctx.font = pixelFont(Math.round(13 * ch / 220)); ctx.fillStyle = m.color;
  ctx.fillText(m.name, cx + cw/2, cy + ch*0.52);
  ctx.font = pixelFont(Math.max(7, Math.round(9 * ch / 220))); ctx.fillStyle = '#bbb';
  const words = m.desc1.split(' · ');
  words.forEach((w, wi) => ctx.fillText(w, cx + cw/2, cy + ch*0.60 + wi*lineH));
  ctx.fillStyle = '#555';
  ctx.fillText(m.desc2, cx + cw/2, cy + ch*0.60 + words.length*lineH + 4);
  if (sel) {
    ctx.font = pixelFont(Math.round(10 * ch / 220)); ctx.fillStyle = m.color;
    ctx.fillText('▶ 선택됨', cx + cw/2, cy + ch - 8);
  } else if (hover) {
    ctx.font = pixelFont(Math.round(10 * ch / 220)); ctx.fillStyle = '#ff8';
    ctx.fillText('[ 클릭 ]', cx + cw/2, cy + ch - 8);
  }
  const magicLocked = !isItemUnlocked(m.id);
  if (magicLocked) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(cx, cy, cw, ch);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.strokeRect(cx, cy, cw, ch);
    ctx.font = pixelFont(Math.round(11 * ch / 220)); ctx.fillStyle = '#555'; ctx.textAlign = 'center';
    ctx.fillText('🔒 대장간 제작 필요', cx + cw/2, cy + ch/2 - 6);
    for (const [bk, recipes] of Object.entries(SMITHY_RECIPES)) {
      if (recipes.magic?.id === m.id) {
        ctx.font = pixelFont(Math.round(10 * ch / 220)); ctx.fillStyle = BOSS_LABELS[bk].color;
        ctx.fillText(BOSS_LABELS[bk].name + ' 소재', cx + cw/2, cy + ch/2 + 10);
        break;
      }
    }
  }
  ctx.textAlign = 'left';
}

    const row = Math.floor(i / cols), col = i % cols;

  ctx.font = pixelFont(12); ctx.fillStyle = '#555';
  ctx.fillText('마법 1개를 선택할 수 있습니다  (선택 없이도 시작 가능)  [R]', 640, 68);

function drawWeaponSelect() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 1280, 720);

  ctx.font = pixelFont(36);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText('무기 선택', 640, 78);
  ctx.font = pixelFont(15);
  ctx.fillStyle = '#888';
  ctx.fillText('전투에서 사용할 무기를 선택하세요', 640, 116);

  const cardW = 192, cardH = 270, gap = 8;
  const wStatTbl = {
    sword:       { dmg:2, spd:3, rng:2 },
    spear:       { dmg:2, spd:3, rng:4 },
    greatsword:  { dmg:4, spd:1, rng:2 },
    dagger:      { dmg:1, spd:4, rng:1 },
    trident:     { dmg:2, spd:3, rng:3 },
    scythe:      { dmg:3, spd:2, rng:3 },
    war_axe:     { dmg:4, spd:1, rng:2 },
    flame_sword: { dmg:2, spd:4, rng:2 },
    harpoon:     { dmg:2, spd:3, rng:4 },
  };
  const wRows = [weapons.slice(0, 5), weapons.slice(5)];
  const wRowY = [126, 126 + cardH + 10];

  for (let ri = 0; ri < wRows.length; ri++) {
    const row = wRows[ri];
    const cy = wRowY[ri];
    const rowW = cardW * row.length + gap * (row.length - 1);
    const startX = Math.floor((1280 - rowW) / 2);

    for (let i = 0; i < row.length; i++) {
      const w = row[i];
      const locked = !isItemUnlocked(w.id);
      const cx = startX + i * (cardW + gap);
      const hover = !locked && mouse.x > cx && mouse.x < cx+cardW && mouse.y > cy && mouse.y < cy+cardH;

      ctx.fillStyle = hover ? '#0d0d18' : '#111';
      ctx.fillRect(cx, cy, cardW, cardH);
      ctx.strokeStyle = selectedWeapon === w.id ? w.color : (hover ? w.color+'88' : '#444');
      ctx.lineWidth = selectedWeapon === w.id ? 3 : 2;
      ctx.strokeRect(cx, cy, cardW, cardH);

      ctx.save();
      ctx.translate(cx + cardW/2, cy + 70);
      ctx.scale(1.8, 1.8);
      drawWeaponIcon(0, 0, w.id);
      ctx.restore();

      ctx.font = pixelFont(15);
      ctx.fillStyle = w.color;
      ctx.textAlign = 'center';
      ctx.fillText(w.name, cx + cardW/2, cy + 136);

      ctx.font = pixelFont(9);
      ctx.fillStyle = '#aaa';
      ctx.fillText(w.desc, cx + cardW/2, cy + 153);

      const sv = wStatTbl[w.id] || { dmg:2, spd:2, rng:2 };
      [{ label:'데미지', val:sv.dmg }, { label:'속도', val:sv.spd }, { label:'거리', val:sv.rng }].forEach((s, si) => {
        const sy = cy + 176 + si * 20;
        ctx.font = pixelFont(9); ctx.fillStyle = '#888'; ctx.textAlign = 'left';
        ctx.fillText(s.label, cx + 10, sy);
        for (let b = 0; b < 4; b++) {
          ctx.fillStyle = b < s.val ? w.color : '#222';
          ctx.fillRect(cx + 52 + b * 14, sy - 10, 10, 10);
        }
      });

      if (hover || selectedWeapon === w.id) {
        ctx.font = pixelFont(11); ctx.textAlign = 'center';
        ctx.fillStyle = selectedWeapon === w.id ? w.color : '#ff8';
        ctx.fillText(selectedWeapon === w.id ? '▶ 선택됨' : '[ 선택 ]', cx + cardW/2, cy + cardH - 12);
      }

      if (locked) {
        ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(cx, cy, cardW, cardH);
        ctx.font = pixelFont(11); ctx.fillStyle = '#555'; ctx.textAlign = 'center';
        ctx.fillText('🔒 대장간 제작 필요', cx + cardW/2, cy + cardH/2 - 10);
        for (const [bk, recipes] of Object.entries(SMITHY_RECIPES)) {
          if (recipes.weapon?.id === w.id) {
            ctx.font = pixelFont(9); ctx.fillStyle = BOSS_LABELS[bk].color;
            ctx.fillText(BOSS_LABELS[bk].name + ' 소재', cx + cardW/2, cy + cardH/2 + 10);
            break;
          }
        }
      }
    }
  }
  // 뒤로가기 버튼
  const backW = 110, backH = 38, backX = 20, backY = 20;
  const backHov = mouse.x > backX && mouse.x < backX+backW && mouse.y > backY && mouse.y < backY+backH;
  ctx.fillStyle = backHov ? '#1a1a1a' : '#111';
  ctx.fillRect(backX, backY, backW, backH);
  ctx.strokeStyle = backHov ? '#aaa' : '#555';
  ctx.lineWidth = 2;
  ctx.strokeRect(backX, backY, backW, backH);
  ctx.font = pixelFont(14);
  ctx.fillStyle = backHov ? '#fff' : '#888';
  ctx.textAlign = 'center';
  ctx.fillText('◀ 뒤로', backX + backW/2, backY + backH/2 + 5);

  ctx.textAlign = 'left';
}

function drawCountdown() {
  drawArena();
  drawPlayer(player.x, player.y, player.facing, 0, 0, false, 0, 0, 0, selectedWeapon);
  if (selectedBoss === 'dragon') {
    drawDragon(boss.x, boss.y, 0, 'idle', 0, 999, 0);
  } else if (selectedBoss === 'eel') {
    drawEel(0, 0, 'idle', 0);
  } else if (selectedBoss === 'sandworm') {
    drawSandWorm();
  } else {
    drawBoss(boss.x, boss.y, boss.facing, 0, 0, 0, 'idle');
  }

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, 1280, 720);

  const txt = countdownVal > 0 ? String(countdownVal) : 'START!';
  const size = countdownVal > 0 ? 180 : 80;
  ctx.font = pixelFont(size);
  ctx.textAlign = 'center';
  // 처음 20프레임 fade-in, 마지막 20프레임 fade-out
  const alpha = Math.min(1, Math.min((60 - countdownTimer) / 20, countdownTimer / 20));
  ctx.fillStyle = countdownVal > 0 ? `rgba(255,220,0,${alpha})` : `rgba(100,255,100,${alpha})`;
  ctx.fillText(txt, 640, 400);
  ctx.textAlign = 'left';
}

function updateBattle(dt) {
  // 사망 후에도 파티클·플래시는 계속 업데이트
  updateParticles(dt);
  if (screenFlash.alpha > 0) screenFlash.alpha -= 0.05;

  if (player.dead) return;

  // 보스 사망 쓰러지기 애니메이션
  if (boss.dead) {
    boss.deathAnim++;
    if (boss.deathAnim === 66) {
      // 바닥에 쓰러지는 충격 - 먼지 파티클
      const impactX = boss.x + (boss.facing === 1 ? boss.w + 60 : -20);
      spawnParticles(impactX, FLOOR_Y - 2, '#888', 16, 4, 35);
      spawnParticles(impactX, FLOOR_Y - 2, '#aaa', 8, 6, 25);
      screenFlash = { color: '#888', alpha: 0.25 };
    }
    if (boss.deathAnim >= 110) {
      recordClear();
      state = STATE.WIN;
      winTimer = 0;
      sndWin();
    }
    return;
  }

  updatePlayer(dt);
  updateBoss(dt);
  updateArrows();
  updateProjectiles(dt);
  checkCollisions();

  if (player.hp <= 0 && !player.dead) {
    player.dead = true;
    player.invincible = 0;
    spawnParticles(player.x+20, player.y+28, '#f44', 20, 5, 40);
    stopBGM(0.8);
    setTimeout(() => { state = STATE.GAMEOVER; sndGameOver(); }, 800);
  }
  if (boss.hp <= 0 && !boss.dead && !boss.phase2Active && !boss.eel2Active && !(boss.dragon2Active && boss.dragon2State === 'transform')) {
    if (selectedBoss === 'dragon' && hardMode && !boss.dragon2Active) {
      boss.dragon2Active = true;
      boss.dragon2State = 'transform';
      boss.dragon2Timer = 0;
      boss.dragon2WhiteP = 0; boss.dragon2GrowP = 0;
      boss.hp = 1; boss.stagger = 0;
      boss.pattern = 'idle'; boss.patternTimer = 99999;
      boss.attackBox = null; boss.dragonFireballs = []; boss.biteBoxes = [];
      player.invincible = 300;
      screenFlash = { color: '#f00', alpha: 0.85 };
      screenShake = { power: 28, dur: 40 };
      spawnParticles(boss.x - 20, boss.y + 50, '#f00', 30, 8, 40);
      spawnParticles(boss.x - 20, boss.y + 50, '#800', 20, 5, 30);
      sndDragonRoar();
    } else if (hardMode && !boss.isPhase2 && selectedBoss !== 'dragon' && selectedBoss !== 'eel' && selectedBoss !== 'sandworm') {
      boss.phase2Active = true;
      boss.phase2State = 'moving';
      boss.phase2Timer = 0;
      boss.hp = 1;
      boss.stagger = 0;
      boss.pattern = 'idle';
      boss.patternTimer = 99999;
      boss.attackBox = null;
      boss.shockwaves = [];
      boss.axeProjectiles = [];
      boss.laserProjectiles = [];
      screenFlash = { color: '#fff', alpha: 0.5 };
      sndP2Launch();
    } else if (selectedBoss === 'sandworm' && hardMode && !boss.sw2Active) {
      boss.sw2Active = true;
      boss.hp = boss.maxHp; boss.stagger = 0; boss.attackBox = null;
      boss.swSandProj = []; boss.swBodyOffset = 0; boss.swPlatform = null; boss.swDmgZone = null;
      boss.sw2Tails = []; boss.sw2Beam = null; boss.sw2BeamProj = []; boss.sw2ScatterTimer = 0;
      boss.sw2BeamDmgCd = 0; boss.sw2TailCd = 0;
      boss.pattern = 'sw2_enter'; boss.patternTimer = 160;
      boss.x = 290; boss.y = FLOOR_Y - 590; boss.w = 700; boss.h = 560;
      player.invincible = 210;
      screenFlash = { color: '#d4a030', alpha: 0.95 };
      screenShake = { power: 28, dur: 50 };
      spawnParticles(640, FLOOR_Y - 80, '#d4a030', 35, 8, 55);
      spawnParticles(640, FLOOR_Y - 80, '#fff', 20, 6, 35);
      sndSwStagger();
    } else if (selectedBoss === 'eel' && hardMode && !boss.eel2Active) {
      boss.eel2Active = true; boss.eel2State = 'intro'; boss.eel2Timer = 0;
      boss.hp = 999; boss.pattern = 'idle'; boss.patternTimer = 99999;
      boss.eelBiteOffset = 0; boss.eelBiteAngle = Math.PI; boss.attackBox = null;
      boss.eelProjectiles = []; boss.eelWhale = null;
      boss.eel2Segments = [makeEel2Seg(ARENA_RIGHT + 100, 310)];
      boss.eel2TotalSegs = 1; boss.eel2TotalKills = 0; boss.eel2KillsNeeded = easyMode ? 3 : 6;
      player.invincible = 180;
      screenShake = { power: 22, dur: 45 };
      screenFlash = { color: '#00e5ff', alpha: 0.9 };
      spawnParticles(640, 310, '#00e5ff', 40, 10, 55);
      spawnParticles(640, 420, '#ffffff', 25, 7, 45);
    } else {
      boss.dead = true;
      boss.deathAnim = 0;
      spawnParticles(boss.x+30, boss.y+40, '#DAA520', 30, 6, 60);
      spawnParticles(boss.x+30, boss.y+40, '#fff', 20, 8, 50);
      screenFlash = { color: '#ff0', alpha: 1 };
      stopBGM(1.5);
    }
  }
}

function useMagic(id) {
  const bx = boss.x + boss.w / 2, by = boss.y + boss.h / 2;
  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  if (id === 'fire_pillar') {
    player.magicEffects.push({ type: 'fire_pillar', x: bx, life: 220, tick: 0, dmgLeft: 40 });
    screenFlash = { color: '#f60', alpha: 0.5 };
    screenShake = { power: 10, dur: 16 };
    sndDragonFire();
  } else if (id === 'ice_spear') {
    const dx = bx - px, dy = by - py, dist = Math.sqrt(dx*dx+dy*dy)||1;
    player.magicEffects.push({ type: 'ice_spear', x: px, y: py, vx: dx/dist*18, vy: dy/dist*18, life: 120, tick: 0, hit: false });
    screenFlash = { color: '#8cf', alpha: 0.35 };
    tone(180,'sine',0,0.3,0.4,90); tone(260,'sine',0.05,0.2,0.35,130);
  } else if (id === 'lightning') {
    // 보스 위에서 대각선으로 떨어짐
    const sx = bx - 200, sy = -60;
    const tx = bx, ty = by;
    const dx2 = tx - sx, dy2 = ty - sy, dist2 = Math.sqrt(dx2*dx2+dy2*dy2)||1;
    player.magicEffects.push({ type: 'lightning', x: sx, y: sy, vx: dx2/dist2*22, vy: dy2/dist2*22, life: 120, tick: 0, hit: false });
    screenFlash = { color: '#ff8', alpha: 0.4 };
    tone(440,'square',0,0.5,0.08,880); tone(220,'sawtooth',0.02,0.6,0.12,110); nz(0,0.4,0.1,2000,'bandpass');
  } else if (id === 'holy_light') {
    // 10발 부채꼴 분산
    for (let i = 0; i < 10; i++) {
      const angle = -Math.PI/2 + (Math.random()-0.5) * Math.PI * 0.8;
      const spd = 8 + Math.random() * 6;
      player.magicEffects.push({ type: 'holy_orb', x: px, y: py - 20, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 99999, tick: 0, hit: false });
    }
    player.hp = Math.min(player.maxHp, player.hp + 2);
    screenFlash = { color: '#fff', alpha: 0.5 };
    spawnParticles(px, py, '#ffd', 20, 5, 30);
    [523,659,784,1047,1319].forEach((f,i)=>tone(f,'sine',i*0.06,0.15,0.2));
  } else if (id === 'black_hole') {
    player.magicEffects.push({ type: 'black_hole', x: bx, y: by - 40, life: 600, tick: 0, dmgLeft: 10 });
    screenFlash = { color: '#a6f', alpha: 0.6 };
    screenShake = { power: 14, dur: 20 };
    tone(44,'sawtooth',0,1.2,0.4,22); tone(66,'sawtooth',0.1,1.0,0.3,33); nz(0.2,0.8,0.3,80,'lowpass');
  } else if (id === 'phoenix') {
    player.phoenixForm = 600; // 10초
    player.invincible = 300;
    screenFlash = { color: '#f84', alpha: 0.6 };
    screenShake = { power: 12, dur: 18 };
    spawnParticles(px, py, '#f84', 30, 8, 40);
    spawnParticles(px, py, '#ff8', 20, 5, 30);
    tone(220,'sine',0,0.6,0.5,440); tone(330,'sine',0.1,0.5,0.4,660); tone(440,'sine',0.2,0.4,0.3,880);
  } else if (id === 'thunder_god') {
    player.thunderForm = 3600; // 60초
    player.maxHp++;
    player.hp = Math.min(player.hp + 1, player.maxHp);
    player.speed = 6;
    screenFlash = { color: '#aff', alpha: 0.5 };
    spawnParticles(px, py, '#ff4', 30, 8, 40);
    spawnParticles(px, py, '#aff', 20, 5, 30);
    tone(440,'square',0,0.5,0.1,880); tone(220,'sawtooth',0.05,0.6,0.15,110); nz(0,0.3,0.08,2000,'bandpass');
  } else if (id === 'ice_arrows') {
    // 등 뒤에서 40발 유도 화살
    for (let i2 = 0; i2 < 40; i2++) {
      const spread = (Math.random() - 0.5) * Math.PI * 0.6;
      const ang = Math.PI * (player.facing === 1 ? 1 : 0) + spread;
      const spd = 4 + Math.random() * 3;
      player.magicEffects.push({ type: 'ice_arrow_orb', x: px - player.facing * 20, y: py, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2, life: 99999, tick: 0, hit: false });

    tone(220,'triangle',0,0.5,0.6);
  } else if (id === 'dark_bomb') {

      nz(0,0.6,0.3,100,'lowpass');
    }
  } else if (id === 'sand_burial') {
